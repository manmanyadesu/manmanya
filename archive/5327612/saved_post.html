(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Mat
