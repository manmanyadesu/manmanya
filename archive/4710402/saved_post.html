것도 어째 여류 작가가 서술하는 것 같습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vufjrR4y2SedeDoI7emxCMxXLt8Degzf", "date": "06.08 01:36"}, {"writer": "하수의극에달한", "text": "푹신푹신한 개가 뿌꾸보다 커서 잘 때 기대기 좋은 것도 어째 여류 작가 취향 같습니다.사치코 씨가 만화를 좋아하는 것은 여류 작가 자신의 자화상인지?번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vufjrR4y2SedeDoI7emxCMxXLt8Degzf", "date": "06.08 01:44"}, {"writer": "Embrio", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1iM7MgksgPBQVxnRQndjlBv8YX6H0fBWD", "comment_img": "https://lh3.googleusercontent.com/d/1vufjrR4y2SedeDoI7emxCMxXLt8Degzf", "date": "06.08 01:51"}, {"writer": "ㅇㅇ(211.205) (211.205)", "text": "두치와 뿌꾸 생각한 건 나 뿐만이 아니었구나", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.08 02:23"}, {"writer": "ㅇㅇ", "text": "이거는 장기연재 못하고 출하각 잡히겠네", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1nJyef4Kn04poEKqKOQdNqTsUZZEQOuCK", "date": "06.08 03:50"}, {"writer": "ㅇㅇ(211.104) (211.104)", "text": "재밌다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.08 05:25"}, {"writer": "피노", "text": "학교에선 요망해지는 저주구나!", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/13W9mrsun_tcRZ9PKDSZQD2qZ3EETQGAq", "date": "06.08 05:49"}, {"writer": "ㅇㅇ(218.150) (218.150)", "text": "판촉용으로 억지로 거유캐 하나 넣긴 했지만 작가가 거유에 전혀 애정 없는티가 남", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.08 05:54"}, {"writer": "수류탄이야", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1RNAKy6dPGsji5h5STBZHi1sk35kQBW2C", "comment_img": "https://lh3.googleusercontent.com/d/13W9mrsun_tcRZ9PKDSZQD2qZ3EETQGAq", "date": "06.08 05:58"}, {"writer": "ㅇㅇ(163.152) (163.152)", "text": "잘 읽히는데 재미는 없네요", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.08 10:42"}, {"writer": "유스티티아", "text": "미친 착정여고생이다", "is_reply": false, "dccon": "", "comment_img": "https://lh rrentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
