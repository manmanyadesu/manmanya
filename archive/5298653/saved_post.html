썰렁한 스펙 초능력 허세물 \"원펀맨\"을 언급하는데", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:12", "comment_id": "comment_li_18102664", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "본햏은 그보다는 \"괴수 8호\" 시노미야 키코루가 해석된 것이 아닌가 하고 의심하고 있습니다.시노미야 키코루라는 여자아이는 겉으로는 허세를 부리지만 능력 있고 주인공에게 바가지를 박박 긁고 엄마 컴플렉스가 있고 고생 많이 합니다.작가가 소류 아스카 랑그레이를 의식했는지?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:17", "comment_id": "comment_li_18102798", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "만화 갤러리에서는 \"괴수 8호\"를 욕하지만 본햏이 보아하니 스펙 초능력 허세를 빼면 남는 것이 없는 \"원펀맨\"보다야 낫습니다.반사회적이고 사회에 적응할 능력이 없는 만화 갤러리라서 배신 타락 살인 료나계는 아닌 \"괴수 8호\"를 욕하나 봅니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:19", "comment_id": "comment_li_18102854", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"1등 정체를 어디서 들킨 거지?69위 쟤는 모르지 않았나\"", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:20", "comment_id": "comment_li_18102876", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "69위라고 무시할 일이 아닙니다. 시노미야 키코루를 해석했다면 보통 집념이 아닌 캐릭터일 것입니다.\"저 세포를 지가 쓰려다 흑화하는 루트 가겠구만아님 그냥 개그+착각물 전개 따라서 깔끔히 포기하려나\"\"오랜 만에 봐서 저 괴물세포를 언제 얻은 건지 기억도 안 나네\"", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:24", "comment_id": "comment_li_18103019", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "시노미야 키코루는 괴수를 재료로 삼은 슈트를 통제하면서 싸웁니다.본 게시 글에서 번역된 만화가 \"괴수 8호\"보다 수준이 떨어지는 유치한 착각물이라서 69위를 희화화하는 것으로만 끝나는 \"원펀맨\" 썰렁한 전개로 나갈 수도 있겠습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:27", "comment_id": "comment_li_18103094", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "히로인 여자아이가 고토 히토리를 의식해서 설정된 것 같기는 한데고토 히토리는 스펙 초능력을 거저 얻은 것도 아니고 노력을 했고 대인 기피증에 시달리면서 좋은 친구들과 극복해나가는데 작가가 고토 히토리를 해석할 능력이 안 되는 것 같습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:31", "comment_id": "comment_li_18103220", "parent_comment_id": ""}, {"writer": "가이너", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1bWH6J30KU43wxOey4lM9Uo_wQh6VVb7J", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:33", "comment_id": "comment_li_18103244", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "그나마 \"원펀맨\" 주인공처럼 거만하고 허세 떠는 것으로 일관하는 것 보다야 낫습니다. 만화 갤러리야 \"원펀맨\" \"헬싱\" 따위가 어울리지만 말입니다.만화 갤러리가 욕하는 \"괴수 8호\" 작가라면 본 게시 글에서 번역된 만화를 더 잘 그리겠지만 만화 갤러리는 그 정도 생각을 할 지능이 안 됩니다.번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:35", "comment_id": "comment_li_18103308", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "조금 더 적습니다.\"원펀맨\" 소재로 그린 만화로는 아마도 여류 작가가 그렸을 \"선생님, 마왕을 죽여줘\" \"구세주 《메시아》 ~이세계를 구한 전 용사가 마물이 넘쳐나는 현실세계를 무쌍한다~\"가 낫습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 02:40", "comment_id": "comment_li_18103454", "parent_comment_id": ""}, {"writer": "하무열", "text": "One펀맨 >>>>>> 봇펀맨 > 무라타맨", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 03:07", "comment_id": "comment_li_18104229", "parent_comment_id": ""}, {"writer": "마르코반바스텐", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/19xIDN40uS1kBdzqcv3E-EMzD5L1s6SiA", "date": "07.16 07:52", "comment_id": "comment_li_18108890", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "이 만화는 원펀맨 컨셉 잡아놓고 실제로 하는건 괴수 8호 마냥 군중극에 가까워서 둘의 단점만 빼온거 같음", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1X0CSXIcIxPLPDSF5pomMnt830J_mOQq2", "date": "07.16 10:07", "comment_id": "comment_li_18112191", "parent_comment_id": ""}, {"writer": "ㅇㅇ(211.185) (211.185)", "text": "이 만화 특징여주가 존나 귀여움", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.16 10:15", "comment_id": "comment_li_18112451", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1X0CSXIcIxPLPDSF5pomMnt830J_mOQq2", "date": "07.16 12:03", "comment_id": "comment_li_18116064", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "에이리가 누군가 했더니 1화까지 가봐야 알수있네 ㅋㅋ진짜 다 까먹었구나", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1X0CSXIcIxPLPDSF5pomMnt830J_mOQq2", "date": "07.16 12:34", "comment_id": "comment_li_18117100", "parent_comment_id": ""}, {"writer": "ㅇㅇ81t4f(210.204) (210.204)", "text": "원펀맨의 143배 정도의 만력", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.16 14:37", "comment_id": "comment_li_18120516", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
