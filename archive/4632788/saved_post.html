ment_img": "", "date": "06.03 06:51"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@구히히아저씨 남들이 맞을 수도 있다는 걸 인정하고 살아야지 너 잘났다고 살고 싶다는거야 뭐야 뭔 소리를 하고 싶은거임 비주류 가설이다가 정설이 된건 다 남들이 맞을수도 있다는 거잖아", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 06:54"}, {"writer": "구히히아저씨", "text": "@ㅇㅇ(223.38) 비주류 연구하는 사람들은 자기가 옳다고 확신을 하니까 계속 연구하는 거지. 학계 전체에선 남이 옳을 수도 있다고 가정하는 게 미덕이지만 한사람 한사람은 고집불통이어도 이상할 거 없음. 초끈이론 연구하는 사람들이 뭐 남들 말 들으면서 연구하겠냐고.  - dc App", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OmcDIrQU5ZGzihgIvK_zRetmbm_fQFnn", "date": "06.03 06:57"}, {"writer": "구히히아저씨", "text": "@구히히아저씨 예를 들어 아인슈타인도 양자역학 개같이 반대했는데 그건 확신이 아니냐는 거임  - dc App", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OmcDIrQU5ZGzihgIvK_zRetmbm_fQFnn", "date": "06.03 07:02"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@구히히아저씨 확신이 아니지 결국 양자역학 개소리라는 거 증명 못 했잖아 그럼 가설이고 가정이지 왜 자꾸 확신이랑 가정이랑 동일시 하는거임", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 07:07"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@구히히아저씨 비주류 연구가들도 확신이 아니라 내가 맞을 거라는 가정을 하고서 틀리면 돌아서는거지", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 07:08"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@구히히아저씨 그러니까 둘이 분리해서 생각하면 내 말은 쟤네는 직접 쏴서 탐사하지도 않아놓고 왜 진공일 거라고 가정을 하지? 가 아니라 왜 진공이라고 확신을 하지? 란 거임", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 07:11"}, {"writer": "구히히아저씨", "text": "@ㅇㅇ(223.38) 무슨 말이 하고싶은 건진 아는데. 그러니까 그런 확신을 갖는 태도 자체는 이상하지 않다는 거임. 고집불통 과학자들 많잖아.  - dc App", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OmcDIrQU5ZGzihgIvK_zRetmbm_fQFnn", "date": "06.03 07:13"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@구히히아저씨 고집불통 과학자는 팀에 못 들어감 너도 우주 = 진공 이란 공식 안에서 사니까 안 이상해보이지 아니라고 하고 봐봐 만약 진공이 아니고 이상한 물질로 차있었으면 진공을 가정하고 만들었더니 개판나서 꼬라박는데 로켓이 뭐 한두푼 짜리야? 거기에 고집불통 과학자를 꽂아 넣어서 생긴 일이다?", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 07:16"}, {"writer": "ㅇㅇ(223.38) (223.3 /lh3.googleusercontent.com/d/1OmcDIrQU5ZGzihgIvK_zRetmbm_fQFnn", "date": "06.03 07:51"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(223.38) 에테르의 부존재는 로켓으로 우주에 나가서 알아낸 게 아니라 지상에서 실험해서 알아낸 거임실험을 통한 진공상태의 생성은 1600년대에 이미 성공했는데 그 진공에서도 빛은 전파되기 때문에 빛 외의 그 어떤 것과도 서로 상호작용하지 않는 매질인 에테르라는 개념이 나온 거고 그런 게 없다는 것 또한 최초의 로켓이 발명되기도 전에 실험으로 재현 가능했음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 07:59"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@ㅇㅇ(211.234) 에테르의 부존재를 로켓이 증명했단게 아니라 우주공간이 진공이라는 설득력있는 주류 가설을 정설로 만든게 로켓이란 얘기긴 함", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 08:07"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@ㅇㅇ(211.234) 근데 뭐 위에서 소련미국 얘기한거 보니까 그전에 둘이서 탄도미사일 존나 만들었는데 그때 지구 탈출까진 안 했어도 알았을거 같긴 하네", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 08:07"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@ㅇㅇ(223.38) 탄도미사일이 딱 외우주 밖에선 어떻게 움직여야 할지 고민 안 해도 됨 + 상대방 개조질려고 높이를 올려 가다 보니까 유의미할 정도로 지구 밖이 진공임이 확인됨 더블 달성이네 아마 이 과정에서 진공일때 달라지는 물리 특성들까지 시행착오 겪어가면서 노하우 얻었을텐데 얘네는 이전화에서 성층권까지 가본 적은 있나 모르겠네", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 08:17"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(223.38) 우주공간이 사실상 진공이란 건 로켓 발명 전에도 설득력있는 주류 가설 정도가 아니라 관측된 사실이었음1930년대 이미 고고도 수소풍선을 이용해 외우주에 나가기도 전에 성층권 초입 단계에서 이미 지상과 비교하면 대기가 거의 없어짐을 알 수 있었고 천문학에서도 (에테르를 제외한)물질이 우주공간에 유의미하게 차 있지 않다는 걸 광학적으로 분석 가능했음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 08:37"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@ㅇㅇ(223.38) 아무튼 현실에선 로켓이란건 당연하다면 당연하게도 기술적 문제라든지 해서 우주 진공 상태를 신경 쓸 이유가 없었고 점진적으로 그 높이가 증가하면서 진공에 가까운 상태가 찾아 와 로켓에 악영향을 미쳐 그제서야 신경을 쓰게 되는 부수적인 문제라면 본문은 지들은 지들 별에서조차 어느 속도로 나가야 할지 이제서야 속도 얘길 듣고 거품 무는 새끼들이 우주는 진공인데 어케움직임 힝힝 거리는 촌극이 발생한 장면인거네", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 08:47"}, {"writer": "만갤러19(106.101) (106.101)", "text": "당장 블랙홀만 해도 옛날부터 유명했지만 실제 관측한건 2019년임...", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 08:57"}, {"writer": "ㅇㅇ(220.71) (220.71)", "text": "이새낀 그럼 사람들이 로켓쏴 올려서 우주 날아간뒤 문열고 보니까 공기 없어서 숨막혀 죽고 그걸 알았다고 생각한거임?", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 09:22"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "아스퍼거 새끼들아 제발 SF 공상과학 만화보고 현실적으로 이랗고 저렇고 개씹 퍼거소리 좀 안나게하면 죽는 병이라도 걸렸냐??만화는 그냥 만화로좀 봐라 시발 이게 다큐야?? SF에 F가 무슨 약자인지 모름??", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 09:45"}, {"writer": "ㅇㅇ", "text": "@ㅇㅇ(118.235) [충격] 오세훈 캠프 '댓글 여론전' 모의 현장 육성 대화 공개 https://youtu.be/cO5zfea3KSE?si=ToZRNCdgxFcyWiio", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OmcDIrQU5ZGzihgIvK_zRetmbm_fQFnn", "date": "06.03 09:57"}, {"writer": "ㅇㅇ(125.143) (125.143)", "text": "그딴거 논할시간에 가축이 왜 이족보행하고 옷을 입고있는지부터 좀 논해보는게 어떰?", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:04"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "@ㅇㅇ(118.235) SF는 과학에 근거한 고증을 거친 픽션을 말하는 거야스토리가 다큐가 아닐 뿐이지 과학적인 이론이 기반이 돼야 SF고 그게 무너진 건 스타워즈 같은 스페이스 오페라인거다결론은 니가 틀렸음괜히 인터스텔라나 나비효과 가지고 과학적 논리 검증하고 그러는 게 아님", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:07"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "@ㅇㅇ(125.143) 무한히 넓은 우주 안에서 발견한 지구와 유사한 조건의 행성을 찾아온 것이고 비슷한 진화과정을 거쳐 포유류들이 생겨나고 인간과 수렴진화했다는 설정인거지 그정도는 과학적으로 문제 없다 오히려 지구와 거의 유사한 지하자원과 세균 바이러스 문제가 안 일어나고 식물도 유사한 조건 하에서 최상위 고등동물의 최종형태가 인류와 비슷하지 않으면 그게 더 이상한 거다", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:13"}, {"writer": "ㅇㅇ(14.58) (14.58)", "text": "@ㅇㅇ(123.111) 이런 기반 따지는건 하드SF나 하는거고 스페이스 오페라까지 갈것도 없이 절대다수 SF는 그딴거 신경안써 가오갤에서 워프하는 원리 과학적 고증 근거함?? 듄에서 실드 생성원리 과학적으로 고증된 이론 기반 장치임?? 결론은 아무대나 하드SF 잦대 들이대는 니가 들렸음 ㅇㅇ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:20"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "@ㅇㅇ(14.58) 가오갤은 스타워즈 처럼 스페이스 오페라지 SF가 아님듄 역시 마찬가지로 스페이스 오페라다난 듄 소설로 읽었는데 정치 종교에 관한 가상역사이고 과학적인 내용은 거의 없다 주로 초능력이지", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:24"}, {"writer": "ㅇㅇ(14.58) (14.58)", "text": 18.235) 이새끼 첫 댓글만 써놓고 여태 설득했다는 거 보니 1인2역 한거네? 그냥 니가 분탕 맞네스페이스 오페라는 그냥 판타지 활극을 설정과 배경만 우주로 바꾼 것 뿐임 과학적 고증은 무시된다 스타워즈에서 포스를 쓰고 광선검으로 광선총을 막는 그런 거 그냥 판타지지가오갤이 스페이스 오페라가 아니라고 우기다 발려놓고 졸렬하게 설득할 가치 운운한 거 보니까 알만하네", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:47"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "@ㅇㅇ(123.111) ?? 폰으로 건물 IP 쓰다 밖에나와서 LTE쓰는거야 병신아 진정해", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:48"}, {"writer": "ㅇㅇ(121.139) (121.139)", "text": "@ㅇㅇ(223.38) 진공 이라는 매질이 없는 상태에서 힘을 전달하는 수단이 힘들다는 건 지구역사에선 아이작 뉴턴이 이미 추론을 통해 알아냈음.지금 만화 설정 대충 보면 대전기가 없는 근대 이전, 인간 역사로 따지면 벨 에포크를 모티브로 하고 있음. 그 증거로 이미 무선통신도 있고, 세계 박람회도 있고. 단지 거기서 인간 역사에서 대전기 시절에 밝혀낸 지식들만 빠진 상태임.너 생각보다 인간의 지식은 증명하기보다 가설을 먼저 만들고 한참 나중에 다시 증명하는 식으로 밝혀낸 것들이 ㅈㄴ 많음. 지금도 그런 가설을 진실이라 간주하고 그에 맞춰서 기술을 개발하고 있음. 특히 반도체쪽", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:50"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "@ㅇㅇ(118.235) 이 만화에서 활극이 나오냐 아니면 과학적인 논리를 작가 나름대로 맞추려는 시도 위주로 진행하냐 뭘 읽더라도 기본적인 판단을 하고 읽어 청맹과니도 아니고 말이지 우긴다고 다가 아니고 남들 재미있게 얘기하는데 끼어들어서 막말이나 하면서 산통 좀 깨지 마라 너 친구 없지?", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:50"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "@ㅇㅇ(118.235) 다들 진지하고 재미있게 얘기중인데 혼자 발광하고 혼자 악을 쓰다 쿠사리 먹고 나서는 정신승리 하는 걸 보니까 불쌍하네넌 평생 그렇게 살아라", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:52"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "@ㅇㅇ(123.111) 그럼 더 문은? 팬도럼은? 애드아스트라는? 승리호는? 미키17은? 에일리언 시리즈는? 선샤인은? 솔라리스는? 아니아라는? 패신저스는? 이벤트호라이즌은? 우주전쟁은? 등등등등은?저것들 전부 하드 SF도 아니고 스페이스 오페라도아닌 그냥 SF인데 이것도 다 과학적 고증에 입각해 제작됬냐? 제발 하드SF OR 스오페 라는 이분법 시각에서 벗어나 그니까 퍼거소리", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:54"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "@ㅇㅇ(123.111) 듣는거야", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.03 10:54"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "@ㅇㅇ(123.111) 이제 퍼거마냥 이제 슬슬 알아먹으라고 예시로 든거 저거 하나하나 다 반박할거냐? ㅋㅋㅋㅋㅋㅋ 야 그럴거면 인류 역사상 존재한 모 w') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
