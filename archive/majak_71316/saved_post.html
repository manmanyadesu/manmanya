9:48", "comment_id": "comment_li_178433", "parent_comment_id": ""}, {"writer": "Amestia", "text": "수고했어", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1S6v6ESLFlXv6z0kAnFyIp0CnTZ9A_ilI", "date": "11.16 10:07", "comment_id": "comment_li_178435", "parent_comment_id": ""}, {"writer": "Lmm(121.165) (121.165)", "text": "말발굽ㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "11.16 11:32", "comment_id": "comment_li_178437", "parent_comment_id": ""}, {"writer": "댓글돌이", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Ro39IipOtHMDUidm7Ikt48Ovrbcl3rv1", "date": "", "comment_id": "comment_li_0", "parent_comment_id": ""}, {"writer": "Saki.M", "text": "애니에서는 전투기에서 손흔들면서 돌아오던데 ㅋㅋㅋㅋ 역시 원작은 다르군", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1S6v6ESLFlXv6z0kAnFyIp0CnTZ9A_ilI", "date": "11.16 12:19", "comment_id": "comment_li_178438", "parent_comment_id": ""}, {"writer": "TO-T", "text": "애초에 애니는 쭉만들라고 한게 아닐테니까", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1S6v6ESLFlXv6z0kAnFyIp0CnTZ9A_ilI", "date": "11.16 15:18", "comment_id": "comment_li_178493", "parent_comment_id": ""}, {"writer": "ㅇㅇ(59.151) (59.151)", "text": "미래에서 왔습니다 아베도 한번 죽고 각성했던 것이군요 크킄..", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.02 20:25", "comment_id": "comment_li_591978", "parent_comment_id": ""}, {"writer": "ㅁㄴㅇㄹ(220.126) (220.126)", "text": "아베사망 ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "08.04 05:46", "comment_id": "comment_li_1216583", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(firstBtn);

                const prevBlockBtn = document.createElement('button');
                prevBlockBtn.className = 'page-btn';
                prevBlockBtn.innerText = '<';
                prevBlockBtn.onclick = () => { currentPage = startPage - 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBlockBtn = document.createElement('button');
                nextBlockBtn.className = 'page-btn';
                nextBlockBtn.innerText = '>';
                nextBlockBtn.onclick = () => { currentPage = endPage + 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.innerText = '>>';
                lastBtn.onclick = () => { currentPage = totalPages; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(lastBtn);
            }
        } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
