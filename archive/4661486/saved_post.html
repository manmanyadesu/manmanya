3.googleusercontent.com/d/1J8WAeqBm7ZYnOptglIhGWHQX9-e0dwZT", "date": "06.04 22:50"}, {"writer": "ㅇㅇ(211.235) (211.235)", "text": "솔직히 이젠 다른 년들한테 기웃거리면서 개ㅈㄹ염병 안하고 루나코 한명만 보려는 노력이라도 보이는 것 같아서 그동안 대놓고 칠꿉 시식코너 찍먹 뇌절만 무한반복하던 때에 비하면 훨씬 나음 그래봤자 진작에 좆쓰레기만화 된 쓰레기지만 ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.04 23:35"}, {"writer": "하수의극에달한", "text": "하버드 의대생들이 저렇게 공부한다던가...츠키미 루나는 철저한 프로페셔널입니다. 시험 족보가 없으면 아무 것도 못 하는 소위 \"헬조선\" 무능한 의료인들보다 낫습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1d-2XoZ2Tgq-SQbQuYwmxjA9UkskB0IqC", "date": "06.04 23:46"}, {"writer": "하수의극에달한", "text": "원래는 책임감이 강한 주인공의 성격 서술이 이상하게 뒤틀리고 여자아이들 장래도 배배꼬인 것이 이상하지만작가가 캐릭터를 버리려는 의도가 있었던 것이 아닐 수도 있겠습니다.번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1d-2XoZ2Tgq-SQbQuYwmxjA9UkskB0IqC", "date": "06.04 23:50"}, {"writer": "ㅇㅇ", "text": "트위터에서 그려도 호응 별로 없어서 슬픈 작가는 개추 ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1faFrBDiqTYPo0gK-hLGJRmWsxzgWy733", "date": "06.05 01:25"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
