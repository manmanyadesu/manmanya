"https://lh3.googleusercontent.com/d/19GUAblGzcwyLPNXEH-WDsFRlKa9Ng4lA", "comment_img": "https://lh3.googleusercontent.com/d/1NxznjHBVT2gPMi_LAF91IE_0gJxqw-Gc", "date": "06.21 00:29"}, {"writer": "Al", "text": "슨상님이 니 친구 어쩌구", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1qmsuA7hIEpvnNPSSdx_e3JLdAGEFdzYy", "date": "06.21 00:31"}, {"writer": "만갤러7(58.125) (58.125)", "text": "진짜 씨발 좆같은 만화다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.21 00:39"}, {"writer": "invalid", "text": "옥문강ㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1qmsuA7hIEpvnNPSSdx_e3JLdAGEFdzYy", "date": "06.21 01:31"}, {"writer": "하수의극에달한", "text": "\"식당물을 하고싶으면 요리에 힘을 쓰던가 그냥 식당은 대충이고 악역 영애물 편승해서 연재나 따려고 만든 거 X나 티남\"그러나", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1qmsuA7hIEpvnNPSSdx_e3JLdAGEFdzYy", "date": "06.21 01:35"}, {"writer": "하수의극에달한", "text": "요리로 고객을 홀리는 것이 여자의 본능이니 어쩌겠습니까.여류 작가가 본능만 밝히는 것이 유치해 보일 수야 있지만 본능 따라 그리겠다는데 뭐라 할 수도 없고...번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1qmsuA7hIEpvnNPSSdx_e3JLdAGEFdzYy", "date": "06.21 01:38"}, {"writer": "ㅇㅇ", "text": "느검마", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1NxznjHBVT2gPMi_LAF91IE_0gJxqw-Gc", "date": "06.21 03:30"}, {"writer": "ㅇㅇ(1.239) (1.239)", "text": "슨상님 맛", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.21 01:47"}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1riydbepLuZuLRiPpDp0L9urjbTeeiPiY", "comment_img": "https://lh3.googleusercontent.com/d/1NxznjHBVT2gPMi_LAF91IE_0gJxqw-Gc", "date": "06.21 02:17"}, {"writer": "ㅇㅇ", "text": "근데 김대중이 북핵빼면 진짜 정치인 goat긴함", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1NxznjHBVT2gPMi_LAF91IE_0gJxqw-Gc", "date": "06.21 03:08"}, {"writer": "ㅇㅇ", "text": "이상적이고 모범적인 eArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
