e, "dccon": "", "comment_img": "", "date": "05.31 01:29"}, {"writer": "별랜", "text": "아니 씨발 진짜 사기잖아 시발년아ㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EC8f-arshYk1ZUcBB_QXuCrhz96uMb5S", "date": "05.31 01:31"}, {"writer": "ㅇㅇ(220.90) (220.90)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1xXvnagd3-N3GBfeakD4a1bB6MjJ62CRJ", "comment_img": "", "date": "05.31 01:33"}, {"writer": "ㅇㅇ(14.50) (14.50)", "text": "히로이 이 미친새끼", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.31 01:33"}, {"writer": "만갤러6(125.186) (125.186)", "text": "얼마나 대단한 실력이 있어야 저 ㅈㄹ 하는데 안 헤어지고 계속 같이 밴드를 해 주는거지", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.31 01:34"}, {"writer": "ㅇㅇ(175.200) (175.200)", "text": "작사 작곡 보컬 베이스 혼자 다 하는 슈퍼 스타임", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 01:50"}, {"writer": "ㅇㅇ(147.47) (147.47)", "text": "밴드에서 역할만 치면 히로이가 나머지 둘 꼴리는대로 갈아치워도 암말 못할수준이라는데", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 02:07"}, {"writer": "만갤러10(1.224) (1.224)", "text": "링고 스타=시마   - dc App", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 02:11"}, {"writer": "만갤러10(1.224) (1.224)", "text": "히로이 = 비틀즈 나머지 멤버 전부 - dc App", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 02:12"}, {"writer": "만갤러12(112.165) (112.165)", "text": "작중내 실력 원탑을 꼽으라면 단연 히로이새끼임작곡, 베이스, 보컬도 되는데 실력도 도내 최상위", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 02:14"}, {"writer": "만갤러12(112.165) (112.165)", "text": "일라이자 시마는 그냥 히로이 똥닦개 정도의 역할임", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 02:16"}, {"writer": "ㅇㅇ(121.159) (121.159)", "text": "태초에 볼빨기 사춘기의 기타좌가 있었다", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 02:45"}, {"writer": "ㅇㅇ", "text": "보컬하는데 베이스하고 작곡하고 밴드얼굴마담이자 액션담당,욕받이까지 전부 혼자 다함", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OjONSejtcNkiwJuTDfMJkGM8Rpkd6cFk", "date": "05.31 03:13"}, {"writer": "Xent", "text": "히로이가 마잭이고 나머지가 형제들임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EC8f-arshYk1ZUcBB_QXuCrhz96uMb5S", "date": "05.31 04:14"}, {"writer": "만갤러19(119.192) (119.192)", "text": "저새끼가 밴드 본체라서 어쩔수업슴", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 07:20"}, {"writer": "만갤러11(211.185) (211.185)", "text": "@ㅇㅇ ㅋㅋㅋㅋㅋ ㅋㅋㅋㅋ ㅋㅋㅋㅋ ㅋㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 08:03"}, {"writer": "ㅇㅇ", "text": "하지만 시마가 없으면 히로이는 베이스도 뺏기고 시부야 역에서 노숙하고 있을듯", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OjONSejtcNkiwJuTDfMJkGM8Rpkd6cFk", "date": "05.31 09:39"}, {"writer": "ㅇㅇㅇ(110.46) (110.46)", "text": "자동차로 비유하면 클락션, 와이퍼, 에어컨 제외한 모든게 히로이 인거임.  - dc App", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 10:03"}, {"writer": "ㅇㅇ(59.20) (59.20)", "text": "그래도 일라이자는 재즈 베이스로 다져진 유니크한 기타라 어느정도는 대체가 안된다는데 시마는 갈아치워도 무방. 사실상 드럼 겸 매니저지  - dc App", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.31 10:31"}, {"writer": "ㅇㅇ", "text": "맨 처음에 술먹고 각성하기 전엔 일라이자가 원톱이었고 나머지둘은 그냥저냥 이런평가였음 각성하곤 히로이 원탑 그다음 일라이자 그다음 시마인듯", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OjONSejtcNkiwJuTDfMJkGM8Rpkd6cFk", "date": "05.31 11:40"}, {"writer": "ㅇㅇ", "text": "작사 작곡 보컬 베이스 히로이가 혼자 하는데 나머지 둘은 병풍임걍 히로이 혼자 밴드 나가면 자동해산임 대체가 안됨", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OjONSejtcNkiwJuTDfMJkGM8Rpkd6cFk", "date": "05.31 15:22"}, {"writer": "SL", "text": "시마도 사람 좋고 작중 정상급 드럼에드럼이 선호도가 낮아서 저런 급 인재가 유니크한건 맞는데 냉정히 대체가 안되는 레벨은 아님작사 작곡 보컬 베이스를 혼자 다 하는데 작중 정상급 밴드다? 걍 신", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1OjONSejtcNkiwJuTDfMJkGM8Rpkd6cFk", "date": "05.31 17:31"}, {"writer": "코이", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1BlTn_q0YjdJTEBDFdl4Gt6FxO46hwIhV", "comment_img": "https://lh3.googleusercontent.com/d/1EC8f-arshYk1ZUcBB_QXuCrhz96uMb5S", "date": "05.31 01:37"}, {"writer": "ㅇㅇ(182.230) (182.230)", "text": "멤버 둘이서 사인까지 박아서 파는거면 평범한 굿즈잖아 ㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.31 01:37"}, {"writer": "ㅇㅇ", "text": "", "is_reply": true, "dccon": "https://lh3.googleusercontent.com/d/1vYfYeRM7w2kfk7AbADKk896QN5EVoMV8", "comment_img": "https://lh3.googleusercontent.com/d/1OjONSejtcNkiwJuTDfMJkGM8Rpkd6cFk", "date": "06.01 09:55"}, {"writer": "Byul", "text": "스니칭을 하다니이이잇", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EC8f-arshYk1ZUcBB_QXuCrhz96uMb5S", "date": "05.31 01:37"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
