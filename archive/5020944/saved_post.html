ter": "o o(211.106) (211.106)", "text": "한국내공산/사회주의 이념표방 정당과 더불빨갱이당 지지/선출하는 무개념 정신나간 연령불문 한국국민들, 특히 한국여성들 보라. 너희한국적화되면 북한 중공 빨갱이들의 성노예됨. 또한 적화되면 한국전국민 개죽음학살당함. 지금 한국적화 코앞임.나는 솔로 갤러리 의사도 헬트한테 안되는거봐라 섹션에 초등생이상정상／상식수준지능있다면아주이해하기쉽게３-１０분분량적어두었으니 \"한국적화위기경고\"글 최대한 널리 빨리 많이 한국전국민들이 단1명도 예외없이 볼 수 있도록 한국내 모든 인터넷 사이트, 모든 국민들에게 전파하라. 자유냐 공산이냐=사느냐 죽느냐문제임． 중간없고 시간없다.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:38", "comment_id": "comment_li_17163545", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "북한 중공내 한국간첩실증명단 확보발표시 수십년간 전국민 우롱하며, 적화로 5천만 한국국민들 죽이려한 너희， 전세계 어디도 도망칠곳없다.한국내”소수“반국가세력너희가전국민적화로죽이려했듯，너희가반드시그꼴될것임．５천만국민들의극대노공분을어찌피할수있으랴．너희가자초한참혹한최후인데누굴탓할수있으랴．절대추호도용서없다．각오들하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:38", "comment_id": "comment_li_17163553", "parent_comment_id": ""}, {"writer": "ㅇㅇ(39.125) (39.125)", "text": "이거 여캐 잘 뽑는듯 다들 이쁨 다른데선 메인캐해도 될정ㄷ도", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:39", "comment_id": "comment_li_17163578", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 소수 반국가세력[빨갱이/간첩-이들은 한국국민 절대 아님]을 5천만 한국국민들 너희가 피아식별 못하면, 전국민 개죽음학살당함. 자유월남은 국가내 반국가세력때문에 무너진 것임. 명심하라.이미 한국내 거의 모든 빨갱이들 드러난 상황임. 왜 모름? 정상/상식적 국가관으로 조금 관심있게 살펴보면 그들을 바보 아닌 이상, 누구나 거의 어느 정도 식별가능함. 무관심했던 너희 탓일뿐임”유사시“는군경이한국국민모두보호못함．\"유사시\"때는 각개인 일반국민들모두 살기위해 물리력총동원해싸워야함. 누가 아군인지 적인지 그때모른다면,개죽음당함．그동안뭐한것임？그것을경고하기위함임．절대글지우지마라．정신 못차린 한국5천만국민들 봐야하기때문임", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:39", "comment_id": "comment_li_17163581", "parent_comment_id": ""}, {"writer": "의미없는존재", "text": "꿀쥠 ㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1U1JEIFv19WdHcsvi0isi7UPJa_gF2mHy", "date": "06.26 23:40", "comment_id": "comment_li_17163682", "parent_comment_id": ""}, {"writer": "ㅇㅇ(58.226) (58.226)", "text": "작가는 어떤 사람이기에 이런 캐릭터가 나오는걸까 - dc App", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.2 ng(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = docume
