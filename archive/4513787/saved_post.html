권등달린심각하고충격적인내용임．이내용잘숙지하고살면평생고생안해도되게，초등생이상정상지능있다면，아주이해하기쉽게해설함．반국가세력＝빨갱이／간첩，북한중공４천만댓글부대가이“한국적화위기경고”글한국국민들모르도록，삭제／차단중인심각한현실임．그러니본즉시복사후최대한널리빨리많이무작위로전파할것．자유대한민국심각한적화코앞상황이자현실임．어린이／학생들은친구，부모들과이정보필히공유하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "이재명 김일성장학생 글로벌디펜스뉴스!한국 정상적국가관지닌 국민들중“김일성장학생”이 반국가세력임을 극구 부정할자,숨기려하는자,누구인가.그럼에도 극구 열성적으로 지지할수있을까.지지하는 그들?반국가세력=빨갱이/간첩임.정상/상식적국가관지닌 한국국민으로서,어찌 반국가세력“김일성장학생”을 옹호/지지할수있음?김일성장학생1800여명이라함.유튜브 신인균국방티비 증언내용임.이들이 한국입법/사법/행정부 어디침투해 한국적화공작하는지,악의적 적화흐름조장하는 그들행보,철저히 조사/색출하라. 한국전국민들이 김일성장학생+\"소수\"반국가세력때문에 적화로 개죽음당해서야 되겠음?유튜브장현식김일성 장학생! 대한민국의 헌법을 파괴하고, 국가에 반역하는 대역 죄인들입니다.애국청년들께서는 잊지마시고 이들을 반드시 심판하시기 바랍니다－명단나옴．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "유튜브 장현식2 삭제 전 필수 시청!! 곽종근은 왜 토사구팽 당하나? CIA 녹취록 공개 (증거 동영상: 4분 46초, 출처: 미 정보국 첩보자료)- 과연 어느당, 누가 반국가세력인가. 이래도 모를 수 있을까. 이번 비상계엄의 내란세력이 과연 누구였느냐? 보고 듣고 정상 상식적 국가관으로 판단하라. 방송언론계 침투한 민노총 산하 언론노조 빨갱이/간첩들이 장악한 방송언론에 농락당하지만 말고. 진정 누가 어느당들이 반국가세력인가.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "한국국민들은 한국이 \"자유만 사라질뿐\"인 적화되면 어떻게 되는지 모름?그렇다면 한국적화되지 않도록 막는 것이 최선아님?공산/사회주의자들이 전세계 및 한국내에서 수십년간 주장한 지상낙원,천국이 바로 지금의 공산/사회주의체제 국가현실임.한국국민들은 북한,중공등의 공산/사회주의체제국가모습이 과연 그들주장처럼 지상낙원이자,천국으로 보임?공개처형,강제수용소,성노예화등 일상인 그들국가현실임.그들주장이 얼마나 터무니없는 거짓말인지 금방 알수 있지않음?왜 그조차 상식적으로 생각도 못함?결국 국가체제만 바뀔뿐,전국민생활상은 더욱 참혹해지기만한 현실아님?한국국민들 너희가 얼마나 배운것없고,기껏 배운바조차도 얼마나 쉽게 망각하는 금붕어들인지 너희가 세뇌/선동당하는 모습만으로도 충분함.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "자유대한민국 적화되면,한국5천만 전국민들은 어찌되나.일베 (폭로) 중국과 북한, 남한공산화후 천만명 학살 비밀계획 누출,일베 적화통일 후 민주당원들 모습 검색-가족포함 제일먼저 제거됨.빨갱이들에게 철저히 이용만당하다 제거됨.이외 한국전국민의 모든 자유,재산,기본인권 등 모두박탈됨.호러블한 지금의 북한생활상 그대로됨.후덜덜하지?수십년째 왜 술취한 듯 오락가락하며 잊기만 함? 국가체제 핵심 기본원칙만 지키며 살아도 한국 사회전분야 선동하는 빨갱이/간첩=반국가세력 한눈에 파악할 수 있음. 유권자로서 너희가 선택한 역대선거결과만 보더라도,한국국민들인 너희가 너희현실과 미래에 얼마나 무관심한 바보들인지만 드러난것뿐임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "유튜브에서 북한에 관한 오토웜비어 사건,청소년 공개처형, 북한 중공 강제수용소,성노예화 현실,북한실체다룬 실화 비욘드유토피아 예고편,도토리 예고편만보라.한국국민들인 너희가 정신 안차리고, 못차리다,한국적화 완성되면 공포영화같이역겹도록 기괴한현실,너희눈앞에 곧바로 전개됨.문제는그런현실이언제끝날지모른다는점임．윤대통령이 왜 비상계엄을 시행할 수 밖에 없었는지,분단이후 한국사회전분야 암약했던 반국가세력실체와 역사적 배경을 그때까지,지금까지도 모른 바보들임?너희가 얼마나 세뇌/선동만 당할뿐인 무개념／무지성임이 충분히,명백히 드러난 이번비상계엄사태임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "너희가 한국국적지닌 국민으로 사는 한,한국적화에 혈안인 북한,중공등 공산/사회주의국가의 각종 도발과 적화공작도 끊임없이 계속되니,정신 똑바로 차리고 살것.“휴전”분단 현실임.한국적화되면 전국민 생활상과 그결과는 이미 공산/사회주의국가 생활상으로 검증된 귀착임.절대 망각치말고,“한국적화 막으라.”탈북자들이 왜 숱하게 목숨걸고 탈북하나.한국에서 목숨걸고 북한 갈 사람 몇이나 되겠나.그렇다면 상식적으로 “국가체제 비교우위”는 명확히 검증된것 아닌가.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "이하한국적화중인충격적인자세한내용은”디시인사이드 치지직마이너갤러리[일반]여캠 노예계약 근황［https://gall.dcinside.com/mgallery/board/view?id=chzzk&no=10759480］동일맥락장문댓글에있으니，적화싫고자유가좋은한국５천만국민들은필히보고최소１０인이상에게 무조건 최대한 널리/많이/빨리 전파하라．자유냐공산이냐＝사느냐죽느냐임．중간없고시간없다．이”한국적화위기경고“장문댓글적화싫고자유가좋다면，절대지우지마라．지금껏수없이한국적화혈안인반국가세력＝빨갱이／간첩, 북한,중공4천만 댓글부대들이삭제／차단해옴．왜？이”사실＆현실“을한국５천만국민들이모두알게되면，한국적화에방해되기때문이지．다른이유전혀없음．왜모름？전파할 자유가 그나마있는 이시간 즉각 전파할것", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "o o(211.106) (211.106)", "text": "이 글 본 즉시，”있는내용그대로만“ 복사 전파하라. 한국５천만전국민개죽음학살되는한국적화혈안인 빨갱이/간첩들 또한 한국５천만전국민들이심각한현실과사실을모르도록，이 \"한국 적화위기경고글\"을본 즉시 빛삭/삭제/차단중인 현실임.안믿겨지나．글 쓰는 도중 또는 전체글 작성후 삭제/차단/빛삭 등 목격한 한국국민 최소한 수백명이상임. 그들이 증언해 줄 것임.적화된후 전국민 개죽음학살된다음에야 정신차릴 것이냐.이 멍청한 한국국민들아.왜전파않고멀뚱멀뚱하기만함？", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.26 23:34"}, {"writer": "ㅇㅇ", "text": "바로 들어서", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1aMHyyyjizzn91hWgOh1ECeo7-N3mZ1fH", "date": "05.27 00:40"}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1lrPMSnclr7U9wilP_Q-6qBB0EdmHi1B_", "comment_img": "https://lh3.googleusercontent.com/d/1aMHyyyjizzn91hWgOh1ECeo7-N3mZ1fH", "date": "05.27 14:58"}, {"writer": "무노", "text": "항상 다니던 단골이었는데 맛이 달라졌네요...", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1aMHyyyjizzn91hWgOh1ECeo7-N3mZ1fH", "date": "05.28 21:42"}, {"writer": "아쎄이", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1nN2pHq6BHHE70gF5TcU-87R60rj-cxBB", "comment_img": "https://lh3.googleusercontent.com/d/1VTN9GNuH4A84-vpZRKeOb2dRqK04rqU-", "date": "05.29 19:58"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
