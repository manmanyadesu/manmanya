comment_id": "comment_li_18183954"}, {"writer": "만갤러35(39.124) (39.124)", "text": "그게 가능했던 게 마법 잃기전의 만능이라는 이명을 가진 주인공이지 않았을까? 저 대마도사는 공격력이 졸라 세고 방어력은 그만큼 못 따라가나봄?", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.17 23:07", "comment_id": "reply_li_18186655", "parent_comment_id": "comment_li_18183954"}, {"writer": "ㅇㅇ(220.76) (220.76)", "text": "작화만 좋고 좆같이 재미가 없네", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.17 22:25", "comment_id": "comment_li_18184796", "parent_comment_id": ""}, {"writer": "ㅇㅇ(222.101) (222.101)", "text": "여~태 6화뿐이 없냐? 더 열심히 연재하거라 주간으로", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.18 01:05", "comment_id": "comment_li_18192470", "parent_comment_id": ""}, {"writer": "ㅇ?ㅈ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1w5I1atDMrGcOHbHueBmnW_BJ5x_ZgfbH", "comment_img": "https://lh3.googleusercontent.com/d/1kLB6Jht3xNG20k_lI_YvhLTKsYNwg4tB", "date": "07.18 01:51", "comment_id": "comment_li_18194456", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"그림도 이쁘고 캐디도 좋음, 근데 내용은 건강한 이야기를 하려는 거 같은데 그걸 잘 못 푸는 거 같으이\"", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kLB6Jht3xNG20k_lI_YvhLTKsYNwg4tB", "date": "07.18 04:51", "comment_id": "comment_li_18200453", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "저번 연재 분과 이번 화만 보고 하는 말인데어째 그림 잘 그리는 여류 작가가 스펙 초능력 허세 오덕물을 소재로 그리는데 서툴러서 잘 안 풀리는 것 같습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kLB6Jht3xNG20k_lI_YvhLTKsYNwg4tB", "date": "07.18 04:53", "comment_id": "comment_li_18200502", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "본햏이 작가의 신상명세 성별을 확인할 수는 없으나 캐릭터는 여류 작가가 좋아할 캐릭터 같습니다.소위 \"보추\"처럼 생기고 TS 당해서 여자아이로 된 것 같은 학장님에 착한 할아버지인 부학장님에 조만간 다크 엘프 애완동물로 전락할 \"먼 하늘의 여왕님\"이니 말입니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kLB6Jht3xNG20k_lI_YvhLTKsYNwg4tB", "date": "07.18 04:59", "comment_id": "comment_li_18200672", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"그게 가능했던 게 마법 잃기 전의 만능이라는 이명을 가진 주인공이지 않았을까? 저 대마도사는 공격력이 졸라 세고 방어력은 그만큼 못 따라가나 봄?\"여류 작가가 그리는 만화는 캐릭터 귀여운 맛으로 보는 것이니 설정 충돌이야 만화적 허용으로 봅시다", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kLB6Jht3xNG20k_lI_YvhLTKsYNwg4tB", "date": "07.18 05:00", "comment_id": "comment_li_18200746", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"내 마음은 아저씨다\"라는 만화에서도 다크 엘프가 등장하는데 스토리 전개는 저 쪽이 덜 서툰 것 같습니다.번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kLB6Jht3xNG20k_lI_YvhLTKsYNwg4tB", "date": "07.18 05:02", "comment_id": "comment_li_18200788", "parent_comment_id": ""}, {"writer": "ㅇㅇ(1.253) (1.253)", "text": "스토리 산으로 갈것 같은데? 작화야 잘 그리는 만화가 차고 넘치는데 작화만으로 승부 볼려다간 조기 출하 당할 듯.  - dc App", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.18 05:59", "comment_id": "comment_li_18202222", "parent_comment_id": ""}, {"writer": "ㅇㅇ(118.127) (118.127)", "text": "진짜 하나부터 열까지 다 재미없는데 작화 차력쇼만 남음ㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.18 06:23", "comment_id": "comment_li_18202603", "parent_comment_id": ""}, {"writer": "만갤러40(123.254) (123.254)", "text": "흑깐프가 조금만 더 예뻤더라면 하는 아쉬움이 내내", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.18 07:26", "comment_id": "comment_li_18203656", "parent_comment_id": ""}, {"writer": "ㅇㅇ(59.16) (59.16)", "text": "걍 언럭키 무라타노 ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.18 10:46", "comment_id": "comment_li_18207524", "parent_comment_id": ""}, {"writer": "ㅇㅇ(106.101) (106.101)", "text": "그래도 졸반 일격에 죽인다 해놓고 괴물새가 뚫어버리는 전개는 아니라 체면은 지켰네", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.18 15:45", "comment_id": "comment_li_18218169", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
