iter": "ㅇㅇ(1.250) (1.250)", "text": "쟤는 최하급달인정도 되려냐? 상황이 맞으면 아슬아슬하게 묘수나 제자급 합공으로 최하급 달인은 잡는데 쟤들은 죄다 묘수급이니 합공으로 잡을수있나?", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.15 22:19", "comment_id": "comment_li_18093708", "parent_comment_id": ""}, {"writer": "만갤러13(211.234) (211.234)", "text": "저 여자연합 거의 다 묘수급들이라 중급 달인정도도 때려잡음. 중급달인 = 달인들 사이에 이름이 조금 알려진 네임드. (킥의 마수, 차크람, 삽자루 달인)", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.16 07:31", "comment_id": "reply_li_18108529", "parent_comment_id": "comment_li_18093708"}, {"writer": "ㅇㅇ", "text": "@만갤러13(211.234) 저 여자연합에서 미우렌카 말고 확실하게 묘수급 이상 없지않음?봉술녀도 렌카 이하고태권도녀는 확실하게 제자급에서도 상위권이 못되는 수준인데", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1UaECYKIC0j9ONyz24DGCEuENFResisB-", "date": "07.16 11:25", "comment_id": "reply_li_18114503", "parent_comment_id": "comment_li_18093708"}, {"writer": "ㅇㅇ(59.9) (59.9)", "text": "1부 중간에 격투섬 주인 포르토나가 최하위급 달인임그때 제자급인 신백연합 다구리에 졌음(토츄마루랑 사카기 서포트 있다 쳐도)쟤는 명백히 그 윗급임", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.16 11:58", "comment_id": "reply_li_18115918", "parent_comment_id": "comment_li_18093708"}, {"writer": "만갤러22(211.234) (211.234)", "text": "@ㅇㅇ 미우 렌카는 확실히 묘수고 치카게도 묘수는 확정일거야. 다른 유파랑 생사결하며 수련해댔을테니..키사라는 예는 버서커랑 비슷한 과라서 흥분하면 기량이 오르는 타입이라 아직 묘수는 아니더라도 제자급은 벗어났을거임. 가뜩이나 인플레 진행되어가는 데 제자급중 한명도 성장이 없을리가... 장술쓰는 애. 카나메? 얘는 애매하긴해.. 보여주는 게 너무 없어서.. 암튼", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.16 15:18", "comment_id": "reply_li_18121765", "parent_comment_id": "comment_li_18093708"}, {"writer": "만갤러22(211.234) (211.234)", "text": "@ㅇㅇ 일단 싸울수 있는 멤버중 3명이 묘수고 1명은 탈제자급 1명은 제자 최상위 한명은 그냥 준제자급이랑 일반인이니 상대가 달인이라도 충분히 잡아족친다 봄", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.16 15:19", "comment_id": "reply_li_18121815", "parent_comment_id": "comment_li_18093708"}, {"writer": "ㅇㅇ", "text": "@만갤러22(211.234) 아 치카게는 아예 생각을 못했음. 치카게까지도 묘수급 이상으로 봐도 될꺼 같은데봉술이나 태권도는 기존에도 요미 상위권 애들보다 확연하게 딸렸었는데 제자 중에서도 중상위 수 up.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
