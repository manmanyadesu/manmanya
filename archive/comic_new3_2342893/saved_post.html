3:21", "comment_id": "reply_li_7278060", "parent_comment_id": "comment_li_7277342"}, {"writer": "ㅇㅇ(218.149) (218.149)", "text": "빌드업 전개 미쳤네", "is_reply": true, "dccon": "", "comment_img": "", "date": "02.28 03:29", "comment_id": "reply_li_7278271", "parent_comment_id": "comment_li_7277342"}, {"writer": "ㅇㅇ(218.39) (218.39)", "text": "히키 누나보다 훨씬 좋았다", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 03:03", "comment_id": "comment_li_7277437", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "", "comment_img": "", "date": "", "comment_id": "comment_li_7277557", "parent_comment_id": ""}, {"writer": "永月", "text": "너무 오랫동안 유행한 귀귀식 무의식의 흐름이 아니라 처음부터 끝까지를 관통하는 메시지가 있는게 좋았습니다", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:12", "comment_id": "reply_li_7277711", "parent_comment_id": "comment_li_7277557"}, {"writer": "박_동", "text": "두번째 보면 지림", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:43", "comment_id": "reply_li_7278607", "parent_comment_id": "comment_li_7277557"}, {"writer": "ㅇㅇ(218.149) (218.149)", "text": "댓글해석이랑 같이 보면 지림", "is_reply": true, "dccon": "", "comment_img": "", "date": "02.28 03:45", "comment_id": "reply_li_7278673", "parent_comment_id": "comment_li_7277557"}, {"writer": "박_동", "text": "마지막 에피소드에서 존 악령 털보 등은 현실에 등장해서 설명이 됐지만 쿠모리 씨라는 현실에는 등장하지 않는 외적 존재가 남아있기 때문에 마지막 에피소드로 작품전체를 설명할 수 없음.\"사실 모든게 주인공이 정신병걸려서 꾸는 의미 없는 꿈이었다\"로 끝나는 게 아니라 독자가 쿠모리 씨의 말에 여러 의미를 부여할 수 있게 되는 거임.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:52", "comment_id": "reply_li_7278849", "parent_comment_id": "comment_li_7277557"}, {"writer": "박_동", "text": "개인적으로 나한테는 쿠모리씨가 되풀이되는 일상 그 자체를 상징하는 것처럼 보였음. 쿠모리 씨가 2화에서 알 수 없는 것의 존재를 두려워할 필요가 있다고 한 것, 중간에 바나나칩으로 변해서 본질은 사라지고 껍데기만 주인공과 함께 남은 것에서 의미를 찾았음. 이렇게 생각하면 주인공이 죽은 뒤 쿠모리와 이별하는 씬이 말이 됨.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 04:10", "comment_id": "reply_li_7279263", "parent_comment_id": "comment_li_7277557"}, {"writer": "박_동", "text": "포템킨 얘기는 방금 읽었는데 얼추 들어맞는거 같음. 이 만화가 좋은 건 이런 식으로 여러 해석이 가능할 정도의 깊이, 이야기의 테두리가 선명하지 않기 때문에 드는 자유로운 느낌, 작품 전체를 관통하는 분위기 같은 것들을 좋아하는 거지 힙스터병 걸려서 빠는게 아니라는 걸 말하고 싶었음.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 04:23", "comment_id": "reply_li_7279459", "parent_comment_id": "comment_li_7277557"}, {"writer": "ㅇㅇ", "text": "", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1k0bNX3VAUzM-YZZssiFaF2iBscDLgOJa", "date": "02.28 06:28", "comment_id": "reply_li_7281707", "parent_comment_id": "comment_li_7277557"}, {"writer": "호무링", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/160Z1Be_xL_1w6i3PBjK8HjybJedMkWOR", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:08", "comment_id": "comment_li_7277593", "parent_comment_id": ""}, {"writer": "永月", "text": "마무리 좋네", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:10", "comment_id": "comment_li_7277650", "parent_comment_id": ""}, {"writer": "평민", "text": "약간 슬퍼요", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1k0bNX3VAUzM-YZZssiFaF2iBscDLgOJa", "date": "02.28 03:10", "comment_id": "comment_li_7277667", "parent_comment_id": ""}, {"writer": "ㅇㅇ(39.112) (39.112)", "text": "뭔소리여", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 03:13", "comment_id": "comment_li_7277762", "parent_comment_id": ""}, {"writer": "하수은", "text": "정공  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:19", "comment_id": "comment_li_7277991", "parent_comment_id": ""}, {"writer": "ㅇㅇ(220.84) (220.84)", "text": "나 이해못하겟어 ..", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 03:23", "comment_id": "comment_li_7278099", "parent_comment_id": ""}, {"writer": "永月", "text": "그리고리 포템킨 공작은 전쟁으로 피폐해진 이곳을 번영하는 곳으로 보이도록 강변에 가짜 마을을 세웠다. 그는 여제가 지나간 뒤에는 즉시 세트를 철거해 다음 방문지로 옮겼다. 이 일화에서 유래된 말이 ‘포템킨 마을(Potemkin village)’이다. 초라한 현실을 숨기기 위해 가공의 상황을 만들어 보이는 것을 가리킨다.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:25", "comment_id": "reply_li_7278172", "parent_comment_id": "comment_li_7278099"}, {"writer": "ㅇㅇ(218.149) (218.149)", "text": "와 미쳤네 자꾸 포템킨 거리던게 그런거였구나", "is_reply": true, "dccon": "", "comment_img": "", "date": "02.28 03:28", "comment_id": "reply_li_7278241", "parent_comment_id": "comment_li_7278099"}, {"writer": "ㅇㅇ", "text": "", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1k0bNX3VAUzM-YZZssiFaF2iBscDLgOJa", "date": "02.28 06:28", "comment_id": "reply_li_7281712", "parent_comment_id": "comment_li_7278099"}, {"writer": "ㅇㅇ(218.149) (218.149)", "text": "존나 슬픈 느낌은 나는데 내용을 잘 모르겠어 누가 해석좀", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 03:24", "comment_id": "comment_li_7278137", "parent_comment_id": ""}, {"writer": "ㅇㅇ(39.7) (39.7)", "text": "씨발 뭔 내용이야", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 03:27", "comment_id": "comment_li_7278214", "parent_comment_id": ""}, {"writer": "永月", "text": "주인공은 가족을 잃고 포템킨 마을을 만들었다. 아내는 스케줄이 정해진 루틴 있는 삶을 좋아한 것 같다. 항상 집에 그녀를 두고 회사를 나가면 \"왠지 모르게 쓸쓸\"하다.  설레였던 그녀와의 추억은 이제 마음의 깊은 지하에 묻혀 있고 그 기억을 꺼내려고 할 때마다 도끼에 찍힌것처럼 마음이 아파온다. 언제부턴가 그렇게 그녀를 떠올릴 수 없게 되었고 이제는 감정을 알 수 없는 룸바가 되었다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:36", "comment_id": "comment_li_7278431", "parent_comment_id": ""}, {"writer": "永月", "text": "망상에서 깨어나는 것은 무엇 때문일까? 바람쐬기 위해 외출을 했다가 아이들이 잔뜩 모여 뷔페에 와 있는걸 본다. 아유무가 살아 있었다면 저 또래일까? 갑자기 잊으려 했던 칠흙같은 현실이 아프게 덮쳐 온다. \"여기에 오는게 아니었어...\" 심리 상담사는 살기위해 포템킨을 꿈꾸는 나의 눈을 도려낸다. 캄캄한 현실을 볼 수 밖에 없어진다.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 03:39", "comment_id": "reply_li_7278525", "parent_comment_id": "comment_li_7278431"}, {"writer": "칼리쉬", "text": "난 해놓고 뭔 내용인가 했는데...이런 깊은 뜻이", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 05:28", "comment_id": "reply_li_7280552", "parent_comment_id": "comment_li_7278431"}, {"writer": "초코파르펫", "text": "", "is_reply": true, "dccon": "https://lh3.googleusercontent.com/d/1gCIMIQdhNDiZu8T3zeH4DL2UXr8OMDaw", "comment_img": "https://lh3.googleusercontent.com/d/1QT4s7iWd5vToI7ykdoBNTZyH7-PMJdml", "date": "02.28 19:13", "comment_id": "reply_li_7306428", "parent_comment_id": "comment_li_7278431"}, {"writer": "ㅇㅇ(116.39) (116.39)", "text": "와 지금까지 내용들 다 꿈이였네", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 04:21", "comment_id": "comment_li_7279436", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1k0bNX3VAUzM-YZZssiFaF2iBscDLgOJa", "date": "02.28 04:22", "comment_id": "comment_li_7279455", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1k0bNX3VAUzM-YZZssiFaF2iBscDLgOJa", "date": "02.28 04:22", "comment_id": "comment_li_7279457", "parent_comment_id": ""}, {"writer": "ㅇㅇ(218.149) (218.149)", "text": "버스기사 아저씨는 로봇 사무라이고 상담소 해바라기는 쿠모리씨가 입벌렸을때 모습이구나", "is_reply": false, "dccon": "", "comment_img": "", "date": "02.28 04:27", "comment_id": "com ; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
