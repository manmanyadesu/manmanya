, "text": "그러다 타마야마가 원하는 것을 둘은 가짐(주인공은 메모, 여주는 수신기)타마야마는 그 둘의 댓가로 달로 보내주기로 함달은 이상향의 세계(부패한 경찰들은 목숨을 끊고 타마야마와 부하는 몸이 정상으로 돌아왔음)하지만 달에서도 주인공은 엄마와 닮은 여자를 쫓아다니고여주는 사람들에게서 도망치는 것을 보여주며 운명은 절대적임을 암시함", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 10:45", "comment_id": "reply_li_13158464", "parent_comment_id": "comment_li_13158283"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "중간 기억이 날아간 부분은남주가 여주를 쫒다가 허름한 집에서 발견함거기서 남주는 순간 엄마를 닮은 여주한테 욕정을 느끼고 강간하다가 죽여버림그순간 번개가 쳤고 수신기는 주인공을 미래의 야구장으로 보내버리고 여주는 전신의 화상을 입고 살아남미래의 야구장으로 간 주인공은 타마야마와 만나고 머리속으로 순간이동한 수신기를 빼내고 다시 과거로 보내짐", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 11:01", "comment_id": "reply_li_13159127", "parent_comment_id": "comment_li_13158283"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "주인공이 여주를 살인했다는 기억은 너무 충격적이었기 때문에 스스로 기억을 날려버리고 여주를 찾아다님 여주는 시간이 지난뒤 화상을 치료하고(타마야마가 수신기를 찾기위해 도와준듯) 타마야마의 지시대로 주인공을 찾았음 수신기가 어딨는지 여주도 잊어버렸지만주인공과의 섹스를 통해 당시 강간당했던 기억이 되살아나며수신기가 주인공 머리에 있음을 알게됨", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 11:08", "comment_id": "reply_li_13159384", "parent_comment_id": "comment_li_13158283"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "그 이후에 다시 주인공과 접선하고 자동차로 시간여행을 해서 야구장에서 타마야마와 만난 뒤주인공 머리를 깨서 수신기를 꺼내고 주인공과 여주는 달로 가게 됨(실제로 달에 간건 아폴로같은 우주선이었고 주인공은 인류가 달에 간 이상향 세계로 간 것)", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 11:10", "comment_id": "reply_li_13159461", "parent_comment_id": "comment_li_13158283"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "소감 :정말 잘 만들어진 SF만화임SF에 느와르물까지 섞어서 긴장감도 계속 유지됨개인적으로 내가 본 이 작가 작품 SOIL, EVOL보다 더 재밌었던거 같음초반에 뿌려놨던 복선들을 너무 잘 살렸고특히 만년필안에 숨겨놓거나 머리속에 수신기가 있었던 부분들그런 기가막힌 발상의 소재들이 감탄하게 만들었음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 11:19", "comment_id": "reply_li_13159721", "parent_comment_id": "comment_li_13158283"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "그리고 캐릭터들의 성격... 선역과 악역 전부 세세한 특색을 가진게 놀라웠음(악역 형사 3명도 각자 다 반전이 있음)주인공의 심리변화도 너무 잘 이끌어내서 정말 잘 만든 만화라고 생각함", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 11:29", "comment_id": "reply_li_13159964", "parent_comment_id": "comment_li_13158283"}, {"writer": "칼리쉬", "text": "오우 해석 감사앗!!! 재밌긴 했는데 내용 이해를 못해서 아쉬웠는데 이제야 풀렸음", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1_JuoOnGCuQ6uSIxuHFepXay6a6CXcGSH", "date": "06.29 19:18", "comment_id": "reply_li_13179442", "parent_comment_id": "comment_li_13158283"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "ㅋㅋㅋ 번역해줘서 내가 더 고맙지여주는 강간당해서 오히려 살아남음에 마음이 복잡했을거같음그래서 그 기억을 알고나서도 남주에게 적대감이 없었나싶음그리고 달로 보내 달라는건 굉장히 중의적인 표현인데 실제로는 수신기와 메모를 통해 남주,여주,타마야마,인류들이 원하던 세계가 되었다는게 너무 흥미로움(시간여행으로 과거를 고치면 되는 거니깐)", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.30 17:38", "comment_id": "reply_li_13222921", "parent_comment_id": "comment_li_13158283"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(firstBtn);

                const prevBlockBtn = document.createElement('button');
                prevBlockBtn.className = 'page-btn';
                prevBlockBtn.innerText = '<';
                prevBlockBtn.onclick = () => { currentPage = startPage - 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBlockBtn = document.createElement('button');
                nextBlockBtn.className = 'page-btn';
                nextBlockBtn.innerText = '>';
                nextBlockBtn.onclick = () => { currentPage = endPage + 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.innerText = '>>';
                lastBtn.onclick = () => { currentPage = totalPages; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(lastBtn);
            }
        } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
