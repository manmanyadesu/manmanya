sercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:31", "comment_id": "comment_li_17637030", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "그렇다면 \"귀멸의 칼날\" 주인공이고...혹시", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:32", "comment_id": "comment_li_17637053", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "여류 작가가 \"귀멸의 칼날\" 작가와 달리 정상적이라서 남동생을 여장 시키고 싶은 누나의 본능을 시전한 것이라면?예전에 그런 적이 있습니다. 어느 성격 좋은 아저씨가 \"하야테처럼!\"이라는 만화를 그리니까 여류 작가가 \"하야테처럼!\" 주인공을 여장 시키는 \"히메고토\"라는 만화를 그린 것 말입니다.\"히메고토 -19살의 제복-\"이라는 만화가 아닙니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:35", "comment_id": "comment_li_17637248", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"누나/엄마한테 우쭈쭈 받고 싶은 심리가 X본에는 유행하는 건가?일본 남자 오타쿠들은 섹스고 뭐고 이젠 진짜 완전 남성성이 거세되고 누군가 돌봐주는 그런 욕구만 남았나\"그런 만화도 있기는 합니다. \"오빠는 끝!\"이기는 한데", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:38", "comment_id": "comment_li_17637401", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "본 게시 글에서 번역된 만화의 주인공은 \"귀멸의 칼날\" 주인공 만큼 노력가인데다 위기의 순간에 자신보다도 누나 같은 여자아이를 먼저 감싸려고 하는 것을 보면 \"오빠는 끝!\" 주인공 같은 무능한 씹덕이 아닙니다.오덕 씹덕은 절대로 저런 주인공을 내세우지 않습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:41", "comment_id": "comment_li_17637530", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "본햏이 본 게시 글에서 번역된 만화를 그린 작가의 신상 명세를 확인할 수는 없고 성별에 대해서 알 수 없으나여류 작가가 \"귀멸의 칼날\" 주인공이 자신이 다니는 여학교에 입학하면 동급생들과 같이 궈여워해 주겠고 위험한 일은 못하게 막고 동급생들끼리 알아서 하겠다고 망상을 품는다면 머리 나쁜 디씨인사이드처럼 다짜고짜 욕할 필요는 없을 것입니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:45", "comment_id": "comment_li_17637754", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "저 누나 라이벌도 이유 없이 반한 것이 아닙니다.여자아이가 위험하다 싶으면 무조건 자신보다도 여자아이를 감싸니까 반한 것이 아닙니까. 스킬 발현이니 뭐니 따위는 다 핑계이고 말입니다.번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.05 23:47", "comment_id": "comment_li_17637877", "parent_comment_id": ""}, {"writer": "ㅇㅇ(104.28) (104.28)", "text": "게이는 어떤 만화에는 댓글 달고 어떤 거는 안다는데 기준이 있노?", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.06 21:45", "comment_id": "reply_li_17681324", "parent_comment_id": "comment_li_17637877"}, {"writer": "ㅇㅇ(125.248) (125.248)", "text": "어이 fanic, 또 갓만화를 들고왔구나", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.05 23:53", "comment_id": "comment_li_17638181", "parent_comment_id": ""}, {"writer": "콘엽", "text": "좆같다는 댓글많은데 비추는 왤케 적음 - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.06 00:00", "comment_id": "comment_li_17638530", "parent_comment_id": ""}, {"writer": "ㅇㅇ(211.235) (211.235)", "text": "굳이 보추라서 더 쓰레기같노", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.06 00:00", "comment_id": "comment_li_17638548", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "에휴", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1q6o10fPWnxXowN14Um6GamXvyMxW6mrZ", "date": "07.06 00:05", "comment_id": "comment_li_17638813", "parent_comment_id": ""}, {"writer": "ㅇㅇ(14.7) (14.7)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1vWh9ZIi--_npqq9zW2oyCa-j2brM7U44", "comment_img": "", "date": "07.06 00:24", "comment_id": "comment_li_17639919", "parent_comment_id": ""}, {"writer": "우울한도로롱", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1EgrTod3k01tF84yZ--nNUiVHEHPMD8S2", "date": "07.06 02:25", "comment_id": "comment_li_17645524",  "comment_li_17658866", "parent_comment_id": ""}, {"writer": "만갤러59(221.149) (221.149)", "text": "그림 못그리는 것까지 포함해서 존나 웃기네 ㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.06 13:40", "comment_id": "comment_li_17661920", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1ogGzJ6vtEX3hlNNee6vi1pg_Zfu6gWsQ", "comment_img": "https://lh3.googleusercontent.com/d/1RuHEoeWr-9eJG97ngGG5yA2szrndTunr", "date": "07.06 16:09", "comment_id": "comment_li_17667041", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "하늘의 유실물 시절 만화같음", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1RuHEoeWr-9eJG97ngGG5yA2szrndTunr", "date": "07.06 16:20", "comment_id": "comment_li_17667429", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "어흐 음쓰같은 만화네 더 먹어 봐야겠다", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1jkEPguM_q2YIfNHDOvHXF19WVw5bPiIA", "date": "07.06 21:49", "comment_id": "comment_li_17681492", "parent_comment_id": ""}, {"writer": "ㅇㅇ(112.153) (112.153)", "text": "ㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.06 22:41", "comment_id": "comment_li_17683717", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
