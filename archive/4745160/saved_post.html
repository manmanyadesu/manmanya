h3.googleusercontent.com/d/1vK_loz50OYHqKzZ_CC-whPsf9GC5aBVs", "date": "06.10 02:26"}, {"writer": "하수의극에달한", "text": "\"이거 딱 페그오 남주인공 어디 돌아다니다가 시비 털리면 길가메쉬 암굴왕 이런 애들 총출동해서 X나 무서운 표정 지으면서 양아치들 쫓아내는 딱 그 느낌임 아주 맛있거든요\"", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:25"}, {"writer": "하수의극에달한", "text": "오비토 씨 말인데태극무늬 가면을 벗겨내면 붉은 궁병 에미야 시로의 얼굴이 있을 것 같습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:27"}, {"writer": "하수의극에달한", "text": "주방 일에 전문인 것도 그렇고 칵테일을 잘 만드는 것도 그렇고전쟁터의 분위기를 잘 읽는 것은 용병이라서 그렇고 쌍권총을 레일 건처럼 쏘는 것은 에미야 얼터의 특징이라서 그렇고 말입니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:36"}, {"writer": "하수의극에달한", "text": "길가메쉬에 해당하는 요한 씨를 은근히 싫어하는 것도 그렇습니다.요한 씨의 기술이 하늘의 사슬을 연상하게 하기도 합니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:39"}, {"writer": "ㅇㅇ", "text": "친코좀  - dc App", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vK_loz50OYHqKzZ_CC-whPsf9GC5aBVs", "date": "06.10 04:40"}, {"writer": "하수의극에달한", "text": "@ㅇㅇ 친코가 무엇입니까? 원하시는 대로 해드리겠습니다.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:44"}, {"writer": "하수의극에달한", "text": "요한 씨가 칵테일을 보고 오비토 씨를 광대라고 부르며 화를 내는 것은 붉은 궁병을 강적으로 생각하고 경계하는 길가메쉬를 연상하게 합니다.칵테일 정도에 화를 낼 이유가 없는데 말입니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:43"}, {"writer": "하수의극에달한", "text": "\"이 만화 좋은 게 읽기 편함부담이 없다고 해야 되나\"작가가 원하는 것은 붉은 궁병을 위시한 료나계 페이트 시리즈의 캐릭터에서 료나계의 저주를 해주하는 것인 것 같습니다.그래서 읽기가 편한 것 같습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:46"}, {"writer": "하수의극에달한", "text": "작가가 한국 만화 \"두치와 뿌꾸\"에도 관심이 있는 것이 아닌가 합니다. 요한 씨는 큐라 같기도 합니다. 푹신푹신한 강아지는 늑대인간 리노인지?그리고", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:50"}, {"writer": "ㅇㅇ", "text": "아저씨 두치와뿌꾸안봤죠 큐라는 오히려 여기 남주성격임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1FujPRZd2ZIam3RNUMPov9wnmva9ZeD7c", "date": "06.10 13:13"}, {"writer": "하수의극에달한", "text": "@ㅇㅇ 한국 독자를 상대하는 한국 만화에 페이트 시리즈 기술이 등장하고 \"내가 왕이다\" 대사가 나오면 썰렁한 것이야 진부한 사실이고작가는 만화 갤러리 마냥 생각 없이 베끼지 않습니다. 그냥 그리고 싶은 대로 그릴 뿐입니다.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vXQP8JqT-MhRhYa4vTgIch5E50S2fuqW", "date": "06.10 13:29"}, {"writer": "하수의극에달한", "text": "주인공이 소속된 동아리 학생들이 말하는 대사가 어째 남자가 하는 대사가 아니고 여학생이 남학생인 척하고 말하는 대사 같습니다.아무래도 작가의 성별이 의심스럽습니다.번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 04:52"}, {"writer": "Embrio", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1iM7MgksgPBQVxnRQndjlBv8YX6H0fBWD", "comment_img": "https://lh3.googleusercontent.com/d/1rw2yIXCmbGEcovpekexNfj_xtOlTMRDR", "date": "06.10 07:30"}, {"writer": "만갤러29(125.8) (125.8)", "text": "작품은 ㄹㅇ맘에드는데 출하당할까봐 두렵다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.10 08:32"}, {"writer": "ㅇㅇ(175.197) (175.197)", "text": "겨우 이정도론 조기 출하를 피하지 못한다고", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.10 09:48"}, {"writer": "이기고또이긴다재가될때까..", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1WsyXLo-jCawJ4kuWxOcZsNFMFl3aN_g-", "comment_img": "https://lh3.googleusercontent.com/d/1vXQP8JqT-MhRhYa4vTgIch5E50S2fuqW", "date": "06.10 11:36"}, {"writer": "숨도쉬기힘들어", "text": "여캐 젖통 장난 아니네", "is_reply": false, "dccon": "", buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
