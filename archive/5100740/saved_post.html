", "date": "07.02 00:47", "comment_id": "reply_li_17433043", "parent_comment_id": "comment_li_17430145"}, {"writer": "만갤러23(112.157) (112.157)", "text": "도적이 되고싶은 자는 나에게..", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.02 00:37", "comment_id": "comment_li_17432468", "parent_comment_id": ""}, {"writer": "ㅇㅇ(1.234) (1.234)", "text": "근데 궁금한게  하야토정도로 강하면 이명 참고해서  (초인급)이라고들 말하던데,  주나자드나 미쿠모, 오가노스케 그런 존재들.,물어보고싶은것이  초인급은 달인급에 속하는 영역인지 아닌지 아는 사람 있음?   예를 들면 제자급이나 묘수급을 두고 달인급이라고 하진 않지.  그들은 달인보다 하위의 단계들이지.  근데 초인급이라고 불릴 정도로 강한 캐릭들도  그게 그냥 엄청나게 강한 실력자일뿐 달인의 카테고리에 포함되는건 맞는건지  아니면 진짜 달인급 위로 초인급의 영역에 놓을 수 있는 단계가 따로 있는건지가 궁금하네즉 초인 소리 들을 정도로 강한 캐릭들도 달인인건 맞는지  달인의 영역을 넘어서 그 위에 있는 레벨들인지", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.02 00:39", "comment_id": "comment_li_17432575", "parent_comment_id": ""}, {"writer": "만갤러22(211.212) (211.212)", "text": "할배 별명이 무적초인이라서 그거 이름 따서 할배라인을 초인으로 부르는거지 공식적으로 초인급은 없음 그냥 다 달인클라스", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.02 00:44", "comment_id": "reply_li_17432882", "parent_comment_id": "comment_li_17432575"}, {"writer": "ㅇㅇ(1.250) (1.250)", "text": "장로의 칭호가 무적초인일뿐이지 따로 초인급이라고 등급이 나오거나 하진 않음. 제자-기의 발동, 묘수-기의 개방, 달인-기의 장악 같이 초인이라거나 그 위의 새로운 기의 xx는 나오지 않았음. 불법 번역본에서는 무기조 수령이랑 조우할때 기의 깨우침? 인가 하는 식으로 번역해서 위의 단계가 있는것처럼 나왔는데 그건 번역오류임", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.02 00:48", "comment_id": "reply_li_17433155", "parent_comment_id": "comment_li_17432575"}, {"writer": "ㅇㅇ(1.250) (1.250)", "text": "굳이 분류하자면 장로가 무기조 수령보고 나처럼 기의 극한에 다다른 자가 또 있었다니? 하는 말을 하는거보면 기의 극한이라는 단계로 나눌수있기는한데 그건 발동, 개방, 장악처럼 확 분류되는게 아니라 기의 장악을 완벽히 마스터하면 극한에 다다르는거라 그냥 최상급 달인이라 보는게 맞을듯", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.02 00:51", "comment_id": "reply_li_17433274", "parent_comment_id": "comment_li_17432575"}, {"writer": "ㅇㅇ", "text": "달인은 그냥 다 달인들임. 달인 중에서 최하부터 최상까지 있는거지 달인 위에 등급이 따로 있는건 아님.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/141IByrWYz3G9YSJb7arPgQXUrsnliEgu", "date": "07.02 01:19", "comment_id": "reply_li_17434638", "parent_comment_id": "comment_li_17432575"}, {"writer": "ㅇㅇ", "text": "힐배 혼자 미사일처럼 날아다니는거보면 걍 말이 달인급으로 묶는거지 윗단계 맞음", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/141IByrWYz3G9YSJb7arPgQXUrsnliEgu", "date": "07.02 01:22", "comment_id": "reply_li_17434755", "parent_comment_id": "comment_li_17432575"}, {"writer": "ㅇㅇ", "text": "장로나 권마사신 이런애들도 연출적인 퍼포먼스만 대단해 보이는거지, 막상 큐켄이나 양산박 달인이랑 붙혀놓으면 일방적으로 압살하지도 못하고 꽤 질질 끌리면서 싸워야함. 혼고 아키라나 라이고 세이타로 같은 애들만 봐도ㅇㅇ.따지고보면 양산박이나 큐켄같은 상급 달인 상대로 여럿 달려들어도 한 합만에 쳐잡히는 하급 달인들도 똑같은 달인 카테고리인거 생각하면, 오히려 상급달인하고 무적초인 수준의 갭 정도로는 카테고리를 나눌 정도의 격차도 아님.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/141IByrWYz3G9YSJb7arPgQXUrsnliEgu", "date": "07.02 02:09", "comment_id": "reply_li_17437011", "parent_comment_id": "comment_li_17432575"}, {"writer": "만갤러36(118.235) (118.235)", "text": "할배 이미 판타지 영역임 작가 다른 작품에서 거기 주인공 도우려고 다른 전설적인 인물들이랑 강림하는데 이미 sf판타지를 넘어섬", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.02 19:11", "comment_id": "reply_li_17474932", "parent_comment_id": "comment_li_17432575"}, {"writer": "만갤러38(125.182) (125.182)", "text": "@ㅇㅇ 그건 아닐껄 ㄷ 당장 권마사신은 정의 무술가인데  혼고 아키라 상대로 존나게 시시덕때면서 전혀 진지하지않게 싸웠는데도 거의 가지고 놀던 수준이었음정신집중하고 정의 무술가상태로 싸웠으면 혼고아키라는 그냥 끔살이었어  격차 ㅈㄴ큰거 맞음", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.02 23:49", "comment_id": "reply_li_17487763", "parent_comment_id": "comment_li_17432575"}, {"writer": "ㅇㅇ", "text": "@만갤러38(125.182) 겉으로 보이는 태도가 껄렁한거지 오랜만에 피가 끓어올랐다느니 위험하다면서 뼛속까지 즐길 수 있는 상대라느니 꽤 진지하게 싸운건 맞음. 애시당초 '전력으로 찌르는 관수는 나도 못막는다' 이러는 것만 봐도 진짜 양산박이나 이치에이큐켄한테 한방에 쓸려나가는 엑스트라 달인들 보다는 얘내들 격차가 훨씬 근소한건 사실임.심지어 권마사신 뿐만 아니라 무적초인도 라이고 상대로 먼저 인질 잡은 상태에서 전력으로 싸웠는데도 인질 도로 뺏기고 도망치는것도 못막았을 정도로, 얘내들 레벨이랑 한따까리 하려면 꽤 고생해야함.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1zlb57sj1uxTfJcK18nM9QVp-FxDKrsLO", "date": ": "", "comment_img": "https://lh3.googleusercontent.com/d/13U1g4D8O4wjtxPcxhqZMdE-hl8HlykiF", "date": "07.03 16:20", "comment_id": "comment_li_17514259", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
