23:36"}, {"writer": "nyasper", "text": "아니 자리 양보하는데 상대방한테 부담주기 싫어서 내리는척하고 다음 열차를 탄다고? 너무 착한데", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1TjZMPpuypA1VGXcbkD9d827Q2XRfn0Br", "date": "01.25 02:02"}, {"writer": "nyasper", "text": "걍ㅈㄴ 착하고 좋은 사람이네. 너무 착해서 상처도 쉽게 받고 걱정도 많은듯 좋은 사람 만나거나 생활이 안정되면 바로 치료될듯. 저런 착한 사람이 잘돼야하는데 그래도 일본이니 가능할듯", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1TjZMPpuypA1VGXcbkD9d827Q2XRfn0Br", "date": "01.25 02:08"}, {"writer": "nyasper", "text": "그리고 솔직히 저런 사람을 울갤 좆벌레년들한테 비교하는건 실례임. 걔들은 인성부터 개좆박았고 약아빠진 약한 악마년들임. 성생활 상상 이상으로 지저분한 인격장애있는 재기 불가능한 병신 지뢰년들이라 저런 심성 고운 건실한 사회인이 단지 좀 심약하고 자기비하가 심한 성격이라고해서 비교할수는 없음", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1TjZMPpuypA1VGXcbkD9d827Q2XRfn0Br", "date": "01.25 02:12"}, {"writer": "ㅇㅇ(49.1) (49.1)", "text": "@nyasper 저게 왜 건실함?주변 동료가 피해가 가는 것부터 건실이 아니라 정신 좀 차려야 됨", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.26 01:15"}, {"writer": "nyasper", "text": "@ㅇㅇ(49.1) 저게 피해냐 ㅋㅋ 저건 피해도 아님. 폐급을 못봤구나 공익이나 면제인가", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1TjZMPpuypA1VGXcbkD9d827Q2XRfn0Br", "date": "01.26 01:48"}, {"writer": "ㅇㅇ(49.1) (49.1)", "text": "@nyasper 요즘은 잘 모르는데 말년에 지 옆에 같은 기수에 입대한 말년이 옆에서 저지랄 하면 그리 좆 같을 수가 없지선배만 하더라도 이해하고 그려려니 했는데쏘가리가 그거 하나로 개지랄을 하는데", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.26 07:45"}, {"writer": "ㅇㅇ(49.1) (49.1)", "text": "@nyasper 하긴 새벽 2시에 글 쓰는거보이 정상은 아닌듯 ㅇㅋㅇㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.26 07:45"}, {"writer": "nyasper", "text": "@ㅇㅇ(49.1) 글이나 제대로 써라. 초등학생한테 작문시켜도 너보단 조리있게 말하겠다 ㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1TjZMPpuypA1VGXcbkD9d827Q2XRfn0Br", "date": "01.26 07:50"}, {"writer": "ㅇㅇ(180.233) (180.233)", "text": "좀 이기적이게 살아라", "is_reply": true, "dccon": "", "comment_img": "", "date": "03.03 09:25"}, {"writ tml += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };

                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');

                const nextBlockBtn = document.createElement('button');

                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');

                pageArea.appendChild(lastBtn);
