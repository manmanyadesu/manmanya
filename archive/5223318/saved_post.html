ter": "도그풋", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1YMgpp2RJRHnv8fTIpuSh9K0ZCtg6B5aJ", "date": "07.10 13:40", "comment_id": "comment_li_17841508", "parent_comment_id": ""}, {"writer": "ㅇㅇ(220.85)", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1YMgpp2RJRHnv8fTIpuSh9K0ZCtg6B5aJ", "date": "07.10 13:43", "comment_id": "comment_li_17841589", "parent_comment_id": ""}, {"writer": "구히히아저씨", "text": "친한 직장동료가 잡아먹혔는데 잠깐 당황한 게 끝이야?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1QWomdpJ94sAWTKLSVaPIO6mf2gnTglvV", "date": "07.10 13:45", "comment_id": "comment_li_17841677", "parent_comment_id": ""}, {"writer": "깃늘", "text": "진짜 미친년...", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1YMgpp2RJRHnv8fTIpuSh9K0ZCtg6B5aJ", "date": "07.10 13:49", "comment_id": "comment_li_17841799", "parent_comment_id": ""}, {"writer": "만갤러24(124.111) (124.111)", "text": "왜 굳이 싸워야 함? 개조인간들을 도와줘서 인간을 먹지 않고도 살 수 있게 만들어주면 안돼? 치료전까지는 일본 거기 사형수 많잖아 사형수 먹이면 되잖아 왜 불쌍한 개조인간들이 죽어야 하는데 왜 경찰이 도와주지 않는 건데", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.10 13:50", "comment_id": "comment_li_17841841", "parent_comment_id": ""}, {"writer": "만갤러28(210.223) (210.223)", "text": "인간밖에 못쳐먹으니까 착하든 나쁘든걍 죽이는거지...", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.10 14:02", "comment_id": "reply_li_17842199", "parent_comment_id": "comment_li_17841841"}, {"writer": "만갤러24(124.111) (124.111)", "text": "@만갤러28(210.223) 사이비 종교인가 그런 곳에서도 개조인간을 만드는데 노벨상도 배출해낸 일본 정부가 각잡고 나서서 개조인간들을 치료해주면 안돼? 그 작은 교단에서도 개조인간들을 만들 수 있는데 (교단이랑 비교하면 규모가 엄청 큰) 일본 정부에 있는 과학자들의 힘을 빌린다면 불가능한 일도 아니잖아", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.10 14:08", "comment_id": "reply_li_17842346", "parent_comment_id": "comment_li_17841841"}, {"writer": "ㅇㅇ(211.185) (211.185)", "text": "@만갤러24(124.111) 크다고 발명이 잘 되는 건 아니니까...중국은 인구가 한국보다 훨씬 많은데축구선수는 개 허접들만 있잖아요", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.10 14:57", "comment_id": "reply_li_17843836", "parent_comment_id": "comment_li_17841841"}, {"writer": "만갤러28(210.223) (210.223)", "text": "@만갤러24(124.111) 그니까 해줄이유가 어딨는데ㅋㅋㅋ 걍 죽이는게편하지 먼 멸종위기 동물도아니고 또만들면되잖음", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.10 15:30", "comment_id": "reply_li_17844887", "parent_comment_id": "comment_li_17841841"}, {"writer": "ㅇㅇ(1.212) (1.212)", "text": "개조 인간은 사회 혼란 및, 누가 같은 거 만들 생각하지 못하게 숨겨야 함. 사형수들 시체는 어떻게 다 숨기게? 유족들이 시체 묻을테니 주라고 하면 어쩔 건데? 개조 인간이 사람 못 죽이게 늘 감시해야 하는데 그건 다 누가 감당하고? 치료한 줄 알았는데 나중에 또 재발하면? 아니면 한곳에 가둬 놓고 \"우리는 널 인간답게 살 수 있게 해주는 거다\"라고 말하게? 경찰도 자신이 좋은 짓 한다고는 생각 안 함. 만화에서 말했듯이 공상에 빠져 현실을 안 볼 수 없으니까 저러는 거지", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.10 16:16", "comment_id": "reply_li_17846298", "parent_comment_id": "comment_li_17841841"}, {"writer": "만갤러43(58.78) (58.78)", "text": "@만갤러24(124.111) 그냥 죽이면 되는데 왜 세금낭비함", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.10 17:56", "comment_id": "reply_li_17850985", "parent_comment_id": "comment_li_17841841"}, {"writer": "만갤러25(121.159) (121.159)", "text": "작가가 통찰력이 대단하네나쁜 짓을 저지른 사람은 더 몰릴 수 없는 곳까지 몰린 사람<<주인공한테도 그대로 적용됨마법소녀질 아니면 죽을 거같으니 마법소녀활동함", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.10 13:53", "comment_id": "comment_li_17841922", "parent_comment_id": ""}, {"writer": "욘트", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1YMgpp2RJRHnv8fTIpuSh9K0ZCtg6B5aJ", "date": "07.10 13:59", "comment_id": "comment_li_17842079", "parent_comment_id": ""}, {"writer": "ㅇㅇ(182.213) (182.213)", "text": "마마마가 여럿 망쳤다", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.10 14:00", "comment_id": "comment_li_17842137", "parent_comment_id": ""}, {"writer": "ㅇㅇ(126.33) (126.33)", "text": "시발련 개조인간 쳐죽이는 마법소녀놀이 못하게 하니까 빙글 돌아서 개조인간편이 되버림ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": nnerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
