ent_id": "comment_li_17156686", "parent_comment_id": ""}, {"writer": "만갤러14(218.155) (218.155)", "text": "그냥 떡을쳐라", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 22:08", "comment_id": "comment_li_17159521", "parent_comment_id": ""}, {"writer": "ㅁㅁ(218.144) (218.144)", "text": "작가놈 취향이 너뭄 ㅏ이너 함다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 22:44", "comment_id": "comment_li_17160971", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "유튜브 본픽 한동훈 뒤에 있는 세력의 실체 검색하라. 그럼 그의 정체가 무엇인지 이해될 것임. 그가 왜 한국5천만 전국민 국론분열로 몰았는지를 보라.아무나지지／선출치마라．망국으로가는첩경임．어제는공산/사회주의체제 국가인 주적 북한이 자유대한민국을 기습남침한 625임. 5천만 한국국민들은 제2의 625는 언제든 발발할 수 있는 휴전 분단상태임을 절대 잊지마라. 북한은 지금도한국적화하려고 남침땅굴파고 있음. \"전쟁/반국가세력=빨갱이/간첩들의 내란\"은 예고없이 발발함. 또한 한국내 소수 반국가세력과 북한 중공 4천만 댓글부대가 지금껏여전히 한국적화 선동／공작하고 있는 실정임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163756", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내공산/사회주의 이념표방 정당과 더불빨갱이당 지지/선출하는 무개념 정신나간 연령불문 한국국민들, 특히 한국여성들 보라. 너희한국적화되면 북한 중공 빨갱이들의 성노예됨. 또한 적화되면 한국전국민 개죽음학살당함. 지금 한국적화 코앞임.나는 솔로 갤러리 의사도 헬트한테 안되는거봐라 섹션에 초등생이상정상／상식수준지능있다면아주이해하기쉽게３-１０분분량적어두었으니 \"한국적화위기경고\"글 최대한 널리 빨리 많이 한국전국민들이 단1명도 예외없이 볼 수 있도록 한국내 모든 인터넷 사이트, 모든 국민들에게 전파하라. 자유냐 공산이냐=사느냐 죽느냐문제임． 중간없고 시간없다.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163761", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "북한 중공내 한국간첩실증명단 확보발표시 수십년간 전국민 우롱하며, 적화로 5천만 한국국민들 죽이려한 너희， 전세계 어디도 도망칠곳없다.한국내”소수“반국가세력너희가전국민적화로죽이려했듯，너희가반드시그꼴될것임．５천만국민들의극대노공분을어찌피할수있으랴．너희가자초한참혹한최후인데누굴탓할수있으랴．절대추호도용서없다．각오들하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163765", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 소수 반국가세력[빨갱이/간첩-이들은 한국국민 절대 아님]을 5천만 한국국민들 너희가 피아식별 못하면, 전국민 개죽음학살당함. 자유월남은 국가내 반국가세력때문에 무너진 것임. 명심하라.이미 한국내 거의 모든 빨갱이들 드러난 상황임. 왜 모름? 정상/상식적 국가관으로 조금 관심있게 살펴보면 그들을 바보 아닌 이상, 누구나 거의 어느 정도 식별가능함. 무관심했던 너희 탓일뿐임”유사시“는군경이한국국민모두보호못함．\"유사시\"때는 각개인 일반국민들모두 살기위해 물리력총동원해싸워야함. 누가 아군인지 적인지 그때모른다면,개죽음당함．그동안뭐한것임？그것을경고하기위함임．절대글지우지마라．정신 못차린 한국5천만국민들 봐야하기때문임", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163773", "parent_comment_id": ""}, {"writer": "만갤러15(118.41) (118.41)", "text": "젖보똥 팔거면 시발 몸매라도 좀 이쁘게 해놓지 뭔 차별성을 주겠다고 시발 ㅋㅋ 슬렌더의 매력도 없는 개 좆같은 몸매를 자꾸 왜 어필하는건데 ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 00:28", "comment_id": "comment_li_17166398", "parent_comment_id": ""}, {"writer": "만갤러16(116.123) (116.123)", "text": "존내 안꼴리네", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 01:04", "comment_id": "comment_li_17167842", "parent_comment_id": ""}, {"writer": "ㅇㅇ(39.7) (39.7)", "text": "여주가 노꼴이라 그렇지 재미는 있음", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 04:35", "comment_id": "comment_li_17174726", "parent_comment_id": ""}, {"writer": "ㅇㅇ(119.192) (119.192)", "text": "여주가 노꼴인데 재밌는 건 번역없는 만갤이잖아 씨발  - dc App", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.27 07:24", "comment_id": "reply_li_17177128", "parent_comment_id": "comment_li_17174726"}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1w8UQp3f_5ByHEN7QLZlWxV43uBN8PiCM", "comment_img": "https://lh3.googleusercontent.com/d/1X2IaYdKGipbVFShziWsk6ndnoiEKpa2Q", "date": "06.27 06:48", "comment_id": "comment_li_17176666", "parent_comment_id": ""}, {"writer": "하나둘셋스마일", "text": "이건 걍 그작을 따로 구하는 게 좋을 거 같음...", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1ZpyikT1N7C670b36r_-uwfIg1AsesGp3", "date": "06.27 07:49", "comment_id": "comment_li_17177479", "parent_comment_id": ""}, {"writer": "만갤러17(118.37) (118.37)", "text": "그림만 잘 그렸어도 봐줄만 했을텐데", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 09:33", "comment_id": "comment_li_17179882", "parent_comment_id": ""}, {"writer": "쭉농증", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1ZpyikT1N7C670b36r_-uwfIg1AsesGp3", "date": "06.27 09:35", "comment_id": "comment_li_17179937", "parent_comment_id": ""}, {"writer": "아무도상처받지않는세계", "text": "예언을 하나 하자면 정확히 41화에 출하당할 만화입니다", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1ZPA4bdR-m1a5UYeZwfJa6woRS4x4cCSt", "date": "06.27 14:37", "comment_id": "comment_li_17190723", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이렇게 한국5천만전국민 공익을 위한 취지의 글을 왜 삭제하겠느냐? 삭제하는 그들 실체가 그렇다면 명확하지 않느냐? 이미 한국5천만 전국민들 단1번도 못볼 글이 아니어야함. 그럴정도로 수없이 전파했음.그럼에도 못본 한국국민들 많지 않느냐? 한국국민들 너희 바보들인가.지금껏 수없이 경고해왔던 글임. 그럼에도 빨갱이들이 계속 삭제／차단함. 이 현상 목격한 한국국민들 많으니 증언하라．왜이렇게재차강조하는지그이유아직도모른다면，그는전세계공인된저지능임．또는자유대한민국국민절대아님．한국내 \"소수\"반국가세력=빨갱이/간첩들 그토록 악랄하고 사악함. 절대 그런 그들 믿지마라.”분단이후，수십년째임“．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:29", "comment_id": "comment_li_17196714", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "jtbc, mbc 아직도 보고있다? 아직도청취한다？그들 정체?좌파=빨갱이/간첩=반국가세력뿐 없음. 자유대한민국을 망국으로 이끄는 대표적 친종북친중 공산/사회주의적사회흐름조장하는 선동방송사임.전라도인만을위한,전라도를위한 방송사임.이런 선동방송언론만 보다보니,전라도너희가 극좌된것임.민노총［민노총＝골수빨갱이／간첩들임］산하언론노조＝빨갱이／간첩들이장악한방송언론들을 보이콧하지 않는한, 극좌 못벗어남.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:29", "comment_id": "comment_li_17196723", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 활보하는 소수 반국가세력+ 북한 중공 간첩 잡으라. 한국국민들 너희, 그들로 인해 적화되어 5천만 전국민 개죽음학살당함. 한국여성들은 적화되면 북한 중공 빨갱이들의 성노예됨.인터넷상에서는 한국내 소수 반국가세력+북한 중공4천만 댓글부대 대놓고 활동하니 그런 그들 식별하라．이런 적화 코앞 심각한 위기 현실을 한국 전국민들에게 알리기 위한 취지의 \"한국적화위기경고\"글임. 이 짧은 한국적화위기경고글 \"있는 내용 그대로만 복사후\"최소１０인이상에게최대한 널리 빨리 많이 전파하라.판단은글전달받은국민들몫임．시간없다. 한국국민들이 소수 반국가세력 식별못하면, 추후 유사시 그들때문에 적화되면 개죽음학살됨.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:29", "comment_id": "comment_li_17196727", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "5천만 한국국민들이 당장정신차리고 모두합세해서 한국내 빨갱이/간첩 잡는게 쉬운가. 멍청하게 유사시가 될때까지 정신 못차리다, 전국민 개죽음학살 목전에 이르러 피투성이 불구가 되어서야 정신차릴 것인가. 당장 정신 차리고 한국적화 막으라. 이미 한국내 \"소수\"반국가세력 가이드라인은 명확히 있고 대놓고 활동하는 그들 또한 소수임이 드러난 상황임. 무엇이 어려운가. 잡기만 하면 됨. 지금 고의로 국가 안보/첩보기관 해체시키는 그들 보라. 왜 모르나. 국가기관만 믿지 말고, 각계각층출신의 ”적화싫은“ 한국5천만 국민들이,적화로 전국민죽이려는 그들명단 작성해 국민들에게 전파하라.이미 국가기관내 침투한 빨갱이/간첩 많음. 그들 조사/색출해 내야함.시간없다. 전파하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:30", "comment_id": "comment_li_17196730", "parent_comment_id": ""}, {"writer": "띵붕이", "text": "톰보이가 귀엽고 이쁘면 된거지 뭘 더 바래  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1P1TbzVRkpNq4RQ2arinAOxdE5iyMMx6g", "date": "06.27 21:06", "comment_id": "comment_li_17206346", "parent_comment_id": ""}, {"writer": "ㅇㅇ(115.21) (115.21)", "text": "2화는 좀 괜찮네", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 21:18", "comment_id": "comment_li_17206945", "parent_comment_id": ""}, {"writer": "부모", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1Lfs1L96Lyz7eVPSm6kc_hSfH5lMb2WnU", "comment_img": "https://lh3.googleusercontent.com/d/1OXRvCvOFn519WMOBQp_rSbOE7dkUznmN", "date": "06.27 21:51", "comment_id": "comment_li_17208701", "parent_comment_id": ""}, {"writer": "밥벌레", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/15dOwVrcb9yLUu5mV1vZXawEaBNXT5sYV", "comment_img": "https://lh3.googleusercontent.com/d/11qbEBfp7yNVXUBAmVsoC37VtBD9ThwpE", "date": "06.28 12:00", "comment_id": "comment_li_17239855", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; i
