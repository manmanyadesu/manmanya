krE0rSQ9", "date": "07.12 23:51", "comment_id": "comment_li_17961805", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "저런 애들이 보기보다 대물인데", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1n7zRT9XiVDUu9tESZz2SPO5hkrE0rSQ9", "date": "07.12 23:57", "comment_id": "comment_li_17962068", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "얼마전은공산/사회주의체제 국가인 주적 북한이 자유대한민국을 기습남침한 625임.5천만 한국국민들은 제2의 625는 언제든 발발할 수 있는 휴전분단상황임을 절대 잊지마라.북한은 지금도한국적화하려고 남침땅굴파고있음.남침땅굴탐사대증언임．심지어전라도，경상도남단까지제보된실정임．검색해보고각개인한국국민들이판단하라．\"전쟁/반국가세력=빨갱이/간첩들의 내란\"은 예고없이 발발함.또한 한국내 “”소수“반국가세력＋북한중공 4천만댓글부대가 지금껏 한국적화선동／공작하고있는 실정임.철저한대공안보태세로경각심갖고유사시를대비하며살라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:24", "comment_id": "comment_li_17963550", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "자유대한민국 적화되면,한국5천만 전국민들은 어찌되나.일베 (폭로) 중국과 북한, 남한공산화후 천만명 학살 비밀계획 누출,일베 적화통일 후 민주당원들 모습 검색-가족포함 제일먼저 제거됨.빨갱이들에게 철저히 이용만당하다 제거됨.이외 한국전국민의 모든 자유,재산,기본인권 등 모두박탈됨.호러블한 지금의 북한생활상 그대로됨.후덜덜하지?수십년째 왜 술취한 듯 오락가락하며 잊기만 함? 국가체제 핵심 기본원칙만 지키며 살아도 한국 사회전분야 선동하는 빨갱이/간첩=반국가세력 한눈에 파악할 수 있음. 유권자로서 너희가 선택한 역대선거결과만 보더라도,한국국민들인 너희가 너희현실과 미래에 얼마나 무관심한지만 드러난것뿐임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:24", "comment_id": "comment_li_17963552", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내공산/사회주의 이념표방정당과 더불빨갱이당 지지/선출하는 무개념 정신나간 연령불문 한국국민들,특히 한국여성들보라.너희한국적화되면 북한중공 빨갱이들의 성노예됨.또한 적화되면 한국전국민 개죽음학살당함.지금 한국무혈적화 코앞임.공산/사회주의체제 주적 북한의 실체는 오토웜비어 사건,북한실체다룬 비욘드 유토피아 예고편,도토리 예고편 등등 몇가지만 보더라도 한국적화후 한국국민들너희 눈앞에 전개될 참상이 쉽게 이해될 것임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:24", "comment_id": "comment_li_17963561", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국5천만국민들너희가 더불빨갱이당[민주당 전신포함]이 얼마나 공산/사회주의이념/사상성지닌 정당인지 모르니까 더불빨갱이당을 보수정당으로큰착각함.전신부터 그들과거행적보라.이게 무슨보수정당인가.나무위키 한국정당검색.거기 좌파로분류된정당 다 빨갱이/간첩들임.더불빨갱이당에 얼마나 많은 국가보안법위반자들이 있는지보라.국가보안법위반사범?국가공인된반국가세력임.주로빨갱이/간첩들임.그래서이빨갱이／간첩들이한국내빨갱이／간첩잡는법적근거＝국가보안법폐지만은폐포장된명분으로 줄기차게외친것임．국보법폐지외치는자들，모두최소빨갱이임．그들중빨갱이를넘어，간첩많음．같은이념／사상지닌빨갱이눈에더불빨갱이당이당연히보수정당으로보이기에억지쓰는것임．역사적사실인데？무엇을숨기려함？", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963571", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "반공법·국가보안법 위반자 등 총 29명주간조선[단독] 국가보안법 전과자, 국회에 몇 명이나 있을까?매일신문더불빨갱이당내 국보법위반자들과 함께 이내용보라. [나정남칼럼] 헌법 4조 ‘자유’를 빼자 더불어민주당 40% 동의 태안타임뉴스. 더 이상무슨 할말있나.빨갱이／간첩들득실득실해．자당실권장악해서횡포부리는꼴왜못보나．볼눈없는맹인들인가．들을귀없는청각장애인뿐인가．한국국민너희가정신못차린사이，한국전국민개죽음학살되는도살장＝적화현실로가고있음．지금한국무혈적화코앞임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963575", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "위헌정당해산국민운동본부 현재 더불어민주당 해산 동의 서명 수차별금지법 반대교회폐지법 반대부정선거 근절1533-9573전화만 하면 서명 자동완료”북한 중공내 한국간첩실증명단“확보발표시 수십년간 전국민 우롱하며,적화로 5천만한국국민들 죽이려한 너희，전세계 어디도 도망칠곳없다.한국내”소수“반국가세력너희가전국민적화로죽이려했듯，너희가반드시그리될것임．５천만국민들의극대노공분을어찌피할수있으랴．너희스스로자초한참혹한최후인데，누굴탓할수있으랴．누가빨갱이／간첩짓하라강요했더냐．그런너희，”절대추호도용서없다．각오하라“．유튜브이희천티비[이희천쪽집게강의]'진보'라는 용어 사용은 공산,사회주의를 도우는 행위/진보세력의 실체를 알자.－아주쉬운해설임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963591", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 5천만전국민대비 소수 반국가세력[빨갱이/간첩-이들은 한국국민 절대 아님]을 5천만한국국민들 너희가 피아식별 못하면,전국민 개죽음학살당함.자유월남은 국가내 반국가세력때문에 적화된것임.명심하라.이미 한국내 거의모든 빨갱이들 드러난상황임.왜 모름?정상/상식적 국가관으로 조금 관심있게 살펴보면 그들을 바보아닌 이상, 누구나어느정도 식별가능함.무관심했던 너희탓일뿐임”유사시“때는군경이한국국민모두보호못함\"유사시\"때는 각개인일반국민들모두 살기위해 물리력총동원해싸워야함.누가 아군인지 적인지 그때모른다면,개죽음당함．그동안뭐한것임？그것을”최후경고“하기위함임．절대글지우지마라．정신 못차린 한국5천만국민들 봐야하기때문임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963593", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 활보하는”소수“반국가세력+북한중공간첩 잡으라.한국국민들너희,그들로인해 적화되어 5천만전국민개죽음학살당함.한국여성들은 적화되면 북한중공 빨갱이들의 성노예됨.인터넷상에서는 한국내 소수 반국가세력+북한 중공4천만 댓글부대 대놓고활동하니 그런그들 식별하라．한국국민들이 소수반국가세력 식별못하면,추후 유사시 그들때문에 적화되면 개죽음학살됨.1990년대말 최고위탈북자 황장엽씨 당시 한국내 고정간첩5만명 증언함.이들이 바로 때만되면 북한지령받고 모두함께튀어나와 전국각지에서국가체제전복성 각종사회혼란［자유진영국가들과의신뢰＆결속해치는반미／반일운동／각종군사동맹훈련반대／군사기지건설반대／미군철수주장／국가보안법폐지등］지금껏야기만하던 그들 아닌가.왜 모름?", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963598", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "5천만 한국국민들이 당장정신차리고 모두합세해서 한국내 빨갱이/간첩 잡는게 쉬운가. 멍청하게 유사시가 될때까지 정신 못차리다, 전국민 개죽음학살 목전에 이르러 피투성이 불구가 되어서야 정신차릴 것인가. 당장 정신 차리고 한국적화 막으라. 이미 한국내 \"소수\"반국가세력 가이드라인은 명확히 있고 대놓고 활동하는 그들 또한 소수임이 드러난 상황임. 무엇이 어려운가. 잡기만 하면 됨. 지금 고의로 국가 안보/첩보기관 해체시키는 그들 보라. 왜 모르나. 국가기관만 믿지 말고, 각계각층출신의 ”적화싫은“ 한국5천만 국민들이,적화로 전국민죽이려는 그들명단 작성해 국민들에게 전파하라.이미 국가기관내 침투한 빨갱이/간첩 많음. 그들 조사/색출해야함.시간없다. 전파하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963603", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "'中 비밀경찰서 의혹' 동방명주 대표, 관세 포탈로 집행유예 조선일보，北 간첩 활동' 전 민노총 간부, 징역 9년 6개월 확정 조선일보，민노총 홈페이지에 반년째 북한노동당 선동문 게시중조갑제닷컴，\"댓글부대 4000만 명 운용… 中, 최악의 세계전쟁 '초한전(超限戰)' 벌인다\"뉴데일리，[단독] 대한민국 영토 내 중국인은 100% '잠재적 간첩'파이낸스투데이-북한 중공간첩 어딨냐는 한국국민은 한국국민 맞나.민노총 얘네는 예로부터유명함．민노총 정치성 나무위키검색．그럼 얘네가 어떤 목적을 위해 존재하는 단체인지 보면 경악할것임. 이외 유튜브에 주적북한과중공등 한국적화혈안인 자료들많으니 검색한후, 한국적화위기 코앞 현실에 경각심갖고 살라．한국적화되면 전국민 개죽음학살당함.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963611", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 정상/상식적 국가관지닌 무수한 국민들을\"극우몰이\"，\"극우로 매도”하는 그들은 극소수 극좌들임. 이들이 방송언론계침투한 고질적 소수 반국가세력=빨갱이/간첩인 민노총산하 언론노조임. ”이들이 실제 한국전국민 적화로 죽이려하는 극좌들임. 민노총소속 모든 산하단체도 마찬가지.“ 이들 정리하지 않으면, 온갖 거짓말과 말장난으로 한국 전국민 우롱만하는 이 소수 반국가세력때문에 한국 정상/상식적 국가관지닌 5천만 국민들 모두 정신병 걸림.한국전국민들 모두 절대 극우 아님. 사실 극우도 한국국민 중에 거의 없는것이 현실＆사실임.빨갱이/간첩들 그토록 악랄하고도 사악함.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:25", "comment_id": "comment_li_17963623", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "jtbc, mbc 아직도 보고있다? 아직도청취한다？그들 정체?한국내좌파[좌파,좌익 통칭되는 그들]=빨갱이/간첩=반국가세력뿐 없음. 자유대한민국을 망국으로 이끄는 대표적 친종북친중 공산/사회주의적사회흐름조장하는 선동방송사임. 그 방송사들의 각종 탄핵관련 선동 클로징멘트와 방송 자막등 못 본 것이냐?방송사 및 언론들에 침투해 한국적화흐름 조장하는 언론노조임.한국국민들그동안 너희무엇한 것임?수십년째 아닌가.한국국민들너희가민노총［민노총＝골수빨갱이／간첩들임］산하언론노조＝빨갱이／간첩들이장악한방송언론들을 보이콧하지 않는한, 너희모든사고방식／행동양식이그들의세뇌／선동에계속휘둘려”극좌“ 절대못벗어남.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963628", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "지금 자유대한민국은 한국내”소수“반국가세력과 부정선거로인해 무혈적화코앞상황임.한국내 너희\"소수\"반국가세력때문에,한국5천만국민들이 개죽음학살당할수는 없음.소수너희만의 자유대한민국인가.경각심갖도록 한국5천만국민들에게 전하는 글임.이게 무슨 그렇게 미친듯 삭제통삭줄삭차단할 정도로 문제될 글인가.왜이글만정확히선별해삭제차단할까．얼마나 글이 정확하면 그들이 급하게 빛삭삭제통삭차단할 정도인가．그만큼 한국적화혈안인 ”소수“반국가세력+북한중공4천만댓글부대 횡포임.분단이후수십년째아닌가．심각한 적화위기현실임을 인식하고 한국국민들은 정신 차리고 살라.무혈적화코앞임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963636", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "\"북한 중공내 한국간첩실증명단\"확보발표시, 너희는 전세계 어디도 도망칠곳 없다. 수십년간 너희가 적화로 한국5천만전국민 죽이려했듯, 너희가 반드시 그리될 것임. 어찌 피할 수 있으랴. 그러기에 누가 한국내에서 빨갱이/간첩짓하라 강요했더냐. 너희가 스스로 좋다고추종／맹종해저지른 일 아닌가.누굴탓할것임？빨갱이가 왜 새빨간 거짓말쟁이들인지는 ”북한 중공내 한국간첩명단“확보발표되면, 한국5천만 국민들 놀랄것임.그토록 역겹도록 악랄하고도 사악한 위선의실체지닌그들임. 지금 한국내 만기제대 남성이라면 거의 어느정도 식별가능한 그들,절대 믿지마라．한국5천만 전국민 개죽음학살당하는 첩경임.전국민중군필남성이５０％나되지않은가．한국내활보하는북한，중공간첩잡으라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963641", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "625북한의 기습남침처럼,공산/사회주의체제국가=주적북한,중공등의 선도발로인한 전쟁[지금 자유대한민국에대한 그들의 안보적태도를 보라]과 그들국가들의 지령받고 합세하는 한국내\"소수\"반국가세력=빨갱이/간첩들의 내란은 예고없이 발발함.\"휴전\"분단현실임.한국국적지닌 국민으로 사는한,이점은 자유대한민국 국가공동체 5천만국민들의 공동운명임.\"적화=공산화는 곧 국가망국과 모든국민들의 자유의 종말,전국민 개죽음학살되는 현실&미래\"임을 명심하고,항상 \"유사시\"를 철저히 대비하는 자세로 살라.자유가 좋으냐?공산화가 좋으냐?이미 그대들은 답을 알고 있다.그럼 행동하라.절대다수의 자유가좋은 국민들,자유수호를 위해투쟁할것이요,적화위한 소수의 그들,정상/상식지닌 절대다수와는 \"끝내\"반대로 행동할 것임. 잊지마라.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963652", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "일베북한의 가정과 한국의 가정－탈북자증언임．한국국민너희이런삶이좋으냐？수십년째변치않는북한아닌가．그사실과미래를알고더불빨갱이당＆여타위장된명분의공산／사회주의정당지지／선출하는것이냐？한국내종북／친북／친공산／사회주의적행보로좌파라통칭할수있는너희가외쳐대는기본인권은대체어디있느냐？한국국민너희는왜그들의역겨운위선과실체를간파못하나．당장정신차리라．\"주적 북한을 주적이라 말하지 못하는자, 한국국민 아님.조금 깊이 살펴보면 그들중 빨갱이/간첩 많음“어차피”북한중공내한국간첩실증명단“확보발표는시간문제일뿐，천년만년한국５천만전국민＆전세계상식인들절대못속임．”그두려운뒷감당어쩌려고한국５천만전국민죽이려하는것이냐？한국영토내에서절대빨갱이／간첩짓하지마라．”", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963657", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이 “한국적화위기경고글”은 한국내\"소수\"반국가세력에게주는 적화싫고 자유가좋은 전국민의 전국민적 최후경고임.\"최후경고=더이상의 경고없음！“이의미가 무엇인지 알고 한국내 빨갱이/간첩짓하는경우,수십년간 한국전국민죽이려한 5천만전국민대비 극소수너희에대한 용서는없다.계속빨갱이/간첩짓한 너희자신을탓하라.분단이후,수십년간 전향시간＆기회충분했음.\"추후유사시 추호도 용서없다.\"왜?이미전국민적 최후경고는있었고，충분한전향기회＆시간이지난 시점이기때문임.그시점이 바로\"유사시\"임.이조차이해안된다면,전세계공인된 바보임.한국5천만국민들이 단1번도 못본글이 아니도록,전국민들에게 무작위로 “이글있는내용그대로만복사해”최소10인이상에게 최대한 많이빨리만 전파해두라.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963663", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "\"한국５천만전국민들이너희소수때문에국가체제전복되어적화로개죽음학살당할수는없음.\"자유민주주의체제＋시장경제체제질서로운영되는자유대한민국임을배우지못한것인가.얼마나악랄하면초등생지능수준이면충분히이해할수있는내용을평생이해조차하지않고,한국국민인채위장해，전국민죽이려하는것이냐?변해야하는것은너희가당연하거늘,누구들보고빨갱이／간첩되라선동질이냐?한국내“소수”반국가세력너희가비상식／비정상이지않느냐？너희는이런쉬운내용조차이해못하는이성없는짐승들인가．적화싫고자유가좋은５천만한국국민들이주는최후경고임．이를무시한채，빨갱이／간첩질한처절한댓가는추후유사시５천만군중떼에둘러싸여맞아죽든밟혀죽든할소수반국가세력너희의참혹한최후니，살길이무엇인지깨닫고 올바로살라.최후경고임!", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963672", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "특히 남의 국가일인양 불구경하듯 일부러 정신안차리는 연령불문 무개념한국여성들,너희가 진정한국적화 원함?그렇지않다면,“다시는 공산/사회주의이념성 정당과 해당이념／사상지닌빨갱이/간첩들 절대지지/선출치마라.“무개념한국여성들너희때문에 5천만한국전국민 적화예방하기위해 불필요한 각종사회적비용만 가중되고적화현실과미래로가게됨.최소한한국내 적화선동하는 빨갱이=공산/사회주의자들이 누군지,어느조직단체인지만이라도 식별하라.그조차 무관심하다면,너희에대한 한국전국민중의 절반인 한국남성들의 공분만 쌓아가는것임.“유사시”그런 무개념정신못차린 연령불문 한국여성너희，한국남성중아무도 안도움.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:26", "comment_id": "comment_li_17963680", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국국적 지닌 국민으로서, 공산/사회주의 사상/이념&체제에 대해 경각심갖고, “반공”정신으로 매일 조금 관심갖고 살면 한국적화 안됨. 그런데 문제는 그동안 한국국민들이 “반공”정신줄 놓고사는동안,한국적화위해 혈안인반국가세력난동을 한국국민스스로 불러들이고방치했다는 사실임.이제는 정신 똑바로 차리고 살아야함. 자유냐 공산이냐 중간없고 시간없다. 무엇이 그리 어렵기에 그동안 무관심했던 것이냐? 하루 10여분만 시사에 관심갖고 보면 될 일을 전국민 개죽음학살되는 현실이 눈앞에 펼쳐져야만 정신차릴 것인가.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963690", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "유튜브이봉규티비간첩이 장악한 나라 [전광훈, 김국성]－전직북한간첩증언이지않느냐？한국국민너희들보고，깨달으라．지금자유대한민국어느체제국가미래로가나．귀착이어디고무엇인가．바로북한，중공등같은공산／사회주의체제국가미래이자，한국５천만전국민개죽음학살되는미래이지않은가．전국민개죽음학살시키려는，거짓으로만살아온검은실체의너희한국내”소수“반국가세력，５천만한국국민들의극대노공분을어찌피할수있으랴．이젠그만하라．”소수“너희에대한，５천만한국국민들의극대노할공분을더이상쌓지마라．”소수“너희최후가그러함．너희참혹한최후를적화싫은５천만국민들이”최후경고“하는것임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963697", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이재명 김일성장학생 글로벌디펜스뉴스!한국정상적국가관지닌 국민들중“김일성장학생”이 반국가세력임을 극구부정할자,누구인가.그럼에도 극구열성으로 지지할수있을까.지지하는 그들?반국가세력=빨갱이/간첩뿐임.정상/상식적국가관지닌 한국국민으로서,어찌반국가세력“김일성장학생”을 옹호/지지할수있음?김일성장학생1800여명이라함.유튜브 신인균국방티비증언내용임.이들이 한국입법/사법/행정부 어디침투해 한국적화공작하는지,악의적 적화흐름조장하는 그들행보,철저히조사/색출하라.한국전국민들이 김일성장학생+\"소수\"반국가세력때문에 적화로 개죽음학살돼서야되겠나．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963700", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "북한 정찰총국 대좌 출신 김국성 “문재인은, 100번 말해도...간첩”펜엔드마이크－전직간첩증언아닌가．문재인의 과거행적 또한 투명하게 드러나있지 않은가.유튜브연합뉴스티비김일성 자서전 감상문 쓰게한 교수…유죄 확정－이렇게반국가세력＝빨갱이／간첩들이사회전분야각계각층［종교계도예외아님］침투해한국５천만전국민적화로죽이려한국적화흐름조장하고있지않나．유튜브삼대남대한민국에서 활동하는 간첩들이 받은 실지 지령 zip－늘동일이념／사상의소수의반국가세력그들행보，그렇지？유튜브꽉티비북한 지령 받은 간첩, 5년간 151명… 50초 안에 설명하기", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963707", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "자세한 사례들 많으나, 그건 나머지 적화싫고 자유가 좋은 5천만 한국국민각개인몫임.전국민개죽음학살되는 자유대한민국 현실이 싫거든 이젠 국가체제부합하는범위내에서각자맡은바직분하할수있는만큼자유수호위해행동하라．이 “한국적화위기경고글”지금껏수없이그래왔듯，또 언제 한국내 \"소수\"반국가세력+북한 중공4천만댓글부대가 빛삭통삭줄삭삭제 차단할지 모르니,그런 이상현상목격하거든 그들소행으로 확신하라.그리고 그현상 목격한 사실 잊지말고 나머지 정신못차린 한국국민들많으니 증언하고전하기만하라.지금껏 그래왔듯,이글에 대해 음해성욕설,조현병, 약드세요 등 아무근거없이 단1줄만의 이런류 댓글만다는 그들수법 늘 동일하고,또 그런그들은 동일한 몇몇뿐 없음. 안 어렵지?", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963714", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "자유대한민국 정상/상식적 국가관지닌 5천만국민들보라.정상/상식적국가관지닌 절대다수의 국민들은 늘 정상/상식을 지닌채 살아왔을뿐이요,한국내 “소수”반국가세력=빨갱이/간첩은 그들정체성 그대로，공산/사회주의이념/사상을 지닌채,“공산/사회주의 사상/이념 기준의상식“으로 이해한채행동해왔던것뿐임.한국내 소수반국가세력=그들기준은 한국내 절대다수국민들이 알고있는 정상이 아닌것이요,한국국민으로서의 기본적으로 알고있어야할 상식과기본이 아님.그토록 공산/사회주의이념/사상에매몰되어 모든사고방식/행동양식이 평생 그기준으로 생각하고 살아왔기에 그런것뿐임.빨갱이/간첩 구분하기 쉽지?무엇이 어려운가.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963720", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 소수반국가세력들의 논리는 정상/상식적 국가관지닌 절대다수의 국민들이 보기에，공산/사회주의기반의 위장은폐된 명분으로 좌편향된 궤변뿐이요,온통말장난,변명/핑계로만 보이고 들릴뿐임.그러기에 \"북한중공내 한국간첩실증명단\"확보발표가 이성있는 인간，전세계 누구라도 부정할수없는 확증임.이명단만 확보발표하면됨.각종 특수병과포함 군필이자 한국내 사회전분야 각계각층출신,각계각층에 근무중인 정상/상식적 국가관지닌 한국남성들이 전국민중 거의50%나되는 현실 아닌가.부정선거로 무혈적화코앞현실 아닌가.이젠 깨어나라.한국내 정상/상식적 국가관지닌 국민들이 보기에 그런소수반국가세력의 수십년 과거행적 또한 투명하게 다드러나있지 않은가.무엇이 어려운가.”소수“반국가세력그들명단작성해전파해두라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963727", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "자유대한민국내 공산/사회주의국가출신의 국내체류자들이 얼마나될까.통계청자료 검색해보라.그많은 공산/사회주의국가출신의 국내체류중인 그들이 한국내\"소수\"반국가세력과 한국적화흐름 조장하고있음.이런 악랄하고도 사악한 공산/사회주의자들에게 절대 속지마라.멍청하게 속기만하며 흐르는 최종귀착은 한국5천만전국민개죽음학살되는 적화임을 평생 죽는순간까지 잊지말고 살라.유튜브 본픽 한동훈 뒤에 있는 세력들의 실체!-그가 왜 자유대한민국5천만전국민 국론분열을초래한 수상한 행보를 보였는지 누구라도 충분히 이해할수있는 결정적단서 아닌가.절대아무나지지／선출치마라．개념없는선택의귀착은５천만전국민개죽음학살되는적화임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:27", "comment_id": "comment_li_17963730", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "［막전막후] 북한은 왜 비전향 장기수를 안받으려고할까?펜엔드마이크－한국내소수반국가세력은북송된비전향장기수의편지내용을보고정신차리라．너희가끝내맹종한공산／사회주의체제주적북한생활상이너희가선동하던지상낙원의모습인가．그런지상낙원이라면，자유민주주의자유대한민국이너희가맹종한공산／사회주의체제에비해，얼마나자유와풍요로움이넘치는가．이런비교조차도안된다？왜 비교못해?유튜브검색도 통제되는 공산/사회주의체제국가들이라면 당연히 비교못하지.유튜브검색하면 그대로 그들국가현실이 다 나오는데?북한실체다룬비욘드유토피아예고편，도토리예고편，오토웜비어사건뉴스만보라．참혹하다못해，역겨운공산／사회주의체제국가현실임！그런데도 자유대한민국내에서 그런 공산/사회주의체제＆사상／이념 추종/맹종하는 ”소수“반국가세력은 대체 지능수준이 얼마나 낮기에 지금껏그런가.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963738", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이 \"한국적화위기경고글” 지금껏수없이그래왓듯또 언제 한국내“소수“반국가세력+북한중공4천만댓글부대에 의해,타의로 삭제줄삭통삭 차단될지 모름.이현상 목격한 한국국민들 많으니 증언하라.그러니 ”이글내용있는 그대로만 복사후 최소10인이상국민들에게 최대한 널리빨리만 전파해두라.“그게지금현상황으로는최선임．”유사시“가 언제일지 모를 자유진영국가들과 공산진영국가들 첨예한 대립중인 국제정세와 한국국내 정치적 주요요인으로인한 한국무혈적화 코앞현실임.이제 한국적화위기상황의 심각성 뼈저리게 실감나느냐?", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963746", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "정신못차린 연령불문 한국5천만국민들,너희 빨갱이/간첩들의 악랄함과 사악함，절대 믿지마라.분단이후 수십년간 본인자신이 변하려했다면 충분히 변했어야했을 수십년 전향시간과 전향기회들이었음.그모든 전국민적 관용을 악용만 하며,숱한 전향시간과 전향기회들을 낭비만한채,한국전국민 우롱만하고 적화로 죽이려한 그들을 어찌 용서할수 있으랴.그랬던，지금까지도그런，한국내”소수“반국가세력 너희,너희”소수“이외의나머지５천여만명의한국국민들의극대노공분이표출될\"유사시\"가 전혀두렵지도 않은것이냐？왜 국가체제전복하려는 소수의 공산/사회주의자들인 너희만의 적화된 자유대한민국으로 바꾸려하나.나머지 정상／상식적국가관지닌전국민들의 참정권과 국민으로서의 권리는 전혀 무가치하다는 뜻이냐?", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963752", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국영토내에서만큼은국가체제전복하려는 빨갱이/간첩짓 안하는것이 무엇이 그리 어려운가.너희”소수“이외의 나머지 무수한5천여만명의 국민들은 전혀 아무문제없지 않느냐?왜”소수“너희만 유독 수십년간 너희의 사고방식/행동양식을 교정치 못하는 심각성을 보이나.누구들이 잘못된 것이냐?정상과 비정상,상식과 비상식.어느국민들이 더 많고, 정상이자,상식적인것이냐?늘동일이념／사상의”소수“로부터초래된거의모든한국현대사국론분열과사회혼란상아닌가．너희”소수“가예로부터늘문제였거늘，”소수너희만왜아직도모르나．“", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963756", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "남녀노소불문한국국민들너희본인들이수호하지않는자유！전세계 그 누가 너희의자유＆국가수호하려할까？이글보는 한글아는 너희가 바로 ５천만한국국민들아니냐？정신똑바로차리고，대공안보태세유지한채，자유대한민국무혈적화막으라．”자유는결코공짜가아님“．수십년간자유대한민국５천만전국민적화로죽이려한”북한중공내한국간첩실증명단“에있는，한국내”소수“반국가세력＝너희，전세계어디도숨을곳없다．너희가목숨건각오조차없이５천만한국전국민적화로개죽음학살시키려한것이냐？각오들하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963763", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이런기본적한국현대사역사적배경을이해하고，윤대통령이 왜비상계엄시행했는지 지금다시비상계엄당일담화문검색해보라.이제투명하지않음?지금까지의 모든한국내”소수“반국가세력의과거행적들이 사실로 드러났거늘，어딜5천만국민들기만하며，적화로오도하려함?소수반국가세력＝민노총＆언론노조가장악한 방송언론의세뇌/선동/거짓말에 계속속지만말고，현재까지진행되는상황의 있는사실그대로와한국사회흐름그대로만직시하라.그조차이해안되나.누가어느당들이 반국가세력인가．안보이나?이해를못하나?이해못함은 저지능이요，안보임은 맹인뿐임.한국국민들이배운바없는것도아니요，전국민들이맹인아님도명백함．그럼？애초무관심일뿐임．무관심의 처절한댓가？한국전국민들너희개죽음학살되는무혈적화현실＆미래임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963768", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "올공 집회와 전국각지에서 부정선거 관련 집회에 참여하는 무수한 애국국민들에게도 이 내용 전하라. 자유대한민국 현상황과 문제의 심각성 인지하지 못하고 개념없이 살던 한국국민들 더욱 놀라고 경각심갖게 될 것임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 00:28", "comment_id": "comment_li_17963771", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "", "comment_img": "", "date": "", "comment_id": "comment_li_17964566", "parent_comment_id": ""}, {"writer": "만갤러25(180.67) (180.67)", "text": "ㄴ이런새끼특 북한간첩임", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 07:42", "comment_id": "reply_li_17974530", "parent_comment_id": "comment_li_17964566"}, {"writer": "o o(211.106) (211.106)", "text": "\"추호도 절대 용서없을 참혹한 최후임\".", "is_ ment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
