.127)", "text": "고통에도 점점 익숙해짐 그게 엔돌핀 효과잖음 엔돌핀 중독은 마약보다 더 위험함헬창중에 너무 과도한 운동을 하다 근육괴사로 사망하는 경우가 종종 있는데 그 과도한 운동을 참고 할 수 있는게 엔돌핀 중독에서 오는거.. 그땐 더 이상 통증을 견딜 수 없게 되지만 여전히 뇌는 일정량의 엔돌핀을 요구하기 때문에 엉엉 울면서 운동하더라 다큐에서 봤는데 첨엔 웃기다가 나중엔 겁나 섬찟했음 마라토너의 러너스 하이도 같은 원리라서 거기서 헤어나오지 못해 몸 망가지는것도 흔하고..", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.20 21:54"}, {"writer": "ㅇㅇ(118.219) (118.219)", "text": "고통도 익숙해진다 게이야", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.21 00:28"}, {"writer": "ㅇㅇ(175.193) (175.193)", "text": "고통에 익숙해지는게 아니라 극한의 상황에 엔돌핀이 나와서 진통효과가 생기는거임 촉각 중에 유일하게 안익숙해지는게 통점임", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.21 01:10"}, {"writer": "ㅇㅇ(218.209) (218.209)", "text": "내성이 생기게 만들어진게 아니라 특정 약물을 통해 a라는 기능이 10만큼 +되면 일시적으로 약을 썼을 땐 효과가 끝난 뒤에 다시 -10 돼서 0으로 돌아옴근데 지속적으로 약물을 써서 a 기능이 +10 상태로 유지되면 정상이 아니라고 생각해서 몸이 평상시를 -10 상태로 유지시킴 (0이 정상이고 +10은 비정상이니까 +-0으로 맞추기 위해서)그러면 약물을 끊었을 때 -10 상태로 유지되고 0으로 복구는 잘 안되니까 +10만큼의 효과를 내려면 +20만큼의 약을 써야되는거이게 내성의 기본적인 원리임", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.21 02:29"}, {"writer": "ㅇㅇ(124.48) (124.48)", "text": "ㄴ평상시가 0, 약물상태가 +10 이때 몸이 정상(0)을 유지하려고 -10을 만드니까 약물을 끊으면 다시 0이되는게 아니라 -10 상태가 되고 이걸 또 +10 상태로 만드려고 투여량(+20)을 늘린다는 말이네", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.21 10:00"}, {"writer": "ㅇㅇ(211.46) (211.46)", "text": "ㄴㄴ 고통에는 익숙해지지 않는다고함그래서 고통 있을때 참는것보다 진통제 먹는게 낫다고함", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.21 13:55"}, {"writer": "ㅇㅇ(211.46) (211.46)", "text": "https://youtu.be/783IH1h_HOU고통에는 익숙해지지 않음", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.21 13:59"}, {"writer": "머장장이", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/123xyCKnDVyJ1Olohmi1-G4o4vu9ctjia", "comment_img": "https://lh3.googleusercontent.com/d/1S6nlOC2IXisbQnRsyEacF4s2GmcqWIuX", "date": "01.20 17:55"}, {"writer": "ㅇㅇ(175.126) (175.126)", "text": "각성제 말고 LSD는 해보고 싶던데 부작용도 없다 하고", "is_reply": false, "dccon": "", "co nt.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(firstBtn);

                const prevBlockBtn = document.createElement('button');
                prevBlockBtn.className = 'page-btn';
                prevBlockBtn.innerText = '<';
                prevBlockBtn.onclick = () => { currentPage = startPage - 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBlockBtn = document.createElement('button');
                nextBlockBtn.className = 'page-btn';
                nextBlockBtn.innerText = '>';
                nextBlockBtn.onclick = () => { currentPage = endPage + 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.innerText = '>>';
                lastBtn.onclick = () => { currentPage = totalPages; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(lastBtn);
            }
        } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
