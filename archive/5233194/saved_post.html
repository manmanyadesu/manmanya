ment_li_17877120", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "너무좋네요", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-9tpwvtDn8JdSxfA63JiCVtL5ldN6uZV", "date": "07.11 08:05", "comment_id": "comment_li_17877434", "parent_comment_id": ""}, {"writer": "【파유자재불】", "text": "“일체중생으로 하여금 두루 장엄한 일산을 얻어서 일체 모든 부처님의 국토를 두루 덮고 남음이 없게 하려는 연고이니라.일체중생으로 하여금 광대한 일산을 얻어서 중생을 두루 덮어서 부처님께 신심(信心)과 이해를 내게 하려는 연고이니라.일체중생으로 하여금 말할 수 없는 여러 가지 보배일산으로 한 부처님께 공양하게 하여 말할 수 없는 낱낱 부처님이 계신 데마다 이와 같이 하게 하는 연고이니라.”", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-LFHCPc-vr2axuS-qz2FuIuAokOqcJY8", "date": "07.11 12:05", "comment_id": "comment_li_17883136", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1wq2XrxLfMRxMWW9HzXX-4pH3U6IuXh8o", "comment_img": "https://lh3.googleusercontent.com/d/1-9tpwvtDn8JdSxfA63JiCVtL5ldN6uZV", "date": "07.11 13:19", "comment_id": "comment_li_17885914", "parent_comment_id": ""}, {"writer": "!.!.!", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1rfKG05D52rkAqsJkk2ouyC5q9boTcZcy", "comment_img": "https://lh3.googleusercontent.com/d/1-LFHCPc-vr2axuS-qz2FuIuAokOqcJY8", "date": "07.11 13:55", "comment_id": "comment_li_17887414", "parent_comment_id": ""}, {"writer": "도그풋", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1T5jZs3kihLQvEY91Y5yW_ZvEIrNhHJ2i", "comment_img": "https://lh3.googleusercontent.com/d/1-LFHCPc-vr2axuS-qz2FuIuAokOqcJY8", "date": "07.11 14:27", "comment_id": "comment_li_17888539", "parent_comment_id": ""}, {"writer": "시끄러", "text": "걍 병원 환자들한테 특식 봉사 한번 해주자고 하면 되는거 아님?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-LFHCPc-vr2axuS-qz2FuIuAokOqcJY8", "date": "07.11 16:48", "comment_id": "comment_li_17893549", "parent_comment_id": ""}, {"writer": "Anti-DEATH", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1b6-CzG6MCtIY5PVMAHLNHy-rTR_gZqkF", "comment_img": "https://lh3.googleusercontent.com/d/1-LFHCPc-vr2axuS-qz2FuIuAokOqcJY8", "date": "07.11 19:08", "comment_id": "comment_li_17898622", "parent_comment_id": ""}, {"writer": "ㅇㅇ(59.30) (59.30)", "text": "성녀는 가짜성녀고 주인공이 진짜 성녀라는 위험한소리를 아무렇지도 않게 뱉네 폐급새끼 ㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.12 00:00", "comment_id": "comment_li_17911606", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "ㄹㅇㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-9tpwvtDn8JdSxfA63JiCVtL5ldN6uZV", "date": "07.12 02:29", "comment_id": "reply_li_17918318", "parent_comment_id": "comment_li_17911606"}, {"writer": "ㅇㅇ", "text": "재밌사와요", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-9tpwvtDn8JdSxfA63JiCVtL5ldN6uZV", "date": "07.12 02:29", "comment_id": "comment_li_17918319", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
