3년에야 유행을 타기 시작, 법망의 허점을 이용해 유통됨. 나라마다 다르지만 미국은 2011년에야 금지.", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 14:19", "comment_id": "reply_li_5534534", "parent_comment_id": "comment_li_5534231"}, {"writer": "ㅇㅇ(112.153) (112.153)", "text": "저런 약에 취해 저질렀다고 추정되는 사건이 마이애미에서 있었는데, 사람이 산채로 다른사람 얼굴을 좀비마냥 물어뜯다 사살된 사건임. 궁금증에라도 혐짤 각오하고 해당사건 볼려는 사람은 구글에 로널드 포포(Ronald Poppo) 검색해보셈. 피해자인 노숙자 이름인데 얼굴가죽이 거진 다 뜯겨나감 ㅅㅂ;';", "is_reply": false, "dccon": "", "comment_img": "", "date": "01.22 14:15", "comment_id": "comment_li_5534376", "parent_comment_id": ""}, {"writer": "ㅇㅇ(121.130) (121.130)", "text": "한국에서도 뭔 좀비되는 마약이다 하면서 네이버실검 올라가고 이랬던걸로 기억남", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 14:19", "comment_id": "reply_li_5534547", "parent_comment_id": "comment_li_5534376"}, {"writer": "ㅇㅇ(222.234) (222.234)", "text": "아 좀비되는 마약 하니까 기억난다", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 14:50", "comment_id": "reply_li_5535661", "parent_comment_id": "comment_li_5534376"}, {"writer": "ㅇㅇ(110.12) (110.12)", "text": "유튭에서 영상 몇 개 봤는데, 마약과 별개로 섬뜩한 건 피해자 정신이 온전하지 않은지 진술이 주변정황과 다름. 옷벗고 돌아다니는 가해자 보고 '미친 게이새끼..' 한마디 중얼거렸다가 당했을 수 있음", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 14:52", "comment_id": "reply_li_5535741", "parent_comment_id": "comment_li_5534376"}, {"writer": "로또당첨.ver2(183.100) (183.100)", "text": "에효효...", "is_reply": false, "dccon": "", "comment_img": "", "date": "01.22 14:15", "comment_id": "comment_li_5534396", "parent_comment_id": ""}, {"writer": "디비자", "text": "작가새끼 미쳤네 진짜 ㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1WWwQ0b2FoyJP5cz1NyqqQHqNrsnpKvHD", "date": "01.22 14:17", "comment_id": "comment_li_5534471", "parent_comment_id": ""}, {"writer": "만알못", "text": "마지막 ㅅㅂㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1lgyZTNvPchApyyA5eJDoI15BX8JjhvO6", "date": "01.22 14:19", "comment_id": "comment_li_5534512", "parent mg": "https://lh3.googleusercontent.com/d/1lgyZTNvPchApyyA5eJDoI15BX8JjhvO6", "date": "01.22 14:28", "comment_id": "comment_li_5534871", "parent_comment_id": ""}, {"writer": "ㅇㅇ(210.100) (210.100)", "text": "마리화나 합법은 전세계적인 추세 아니였노?", "is_reply": false, "dccon": "", "comment_img": "", "date": "01.22 14:29", "comment_id": "comment_li_5534905", "parent_comment_id": ""}, {"writer": "ㅇㅇ(106.247) (106.247)", "text": "정제도 안되서 위험한 불법 마약 빨겠다고 범죄조직에 거금 갖다 바치면서 범죄 저지르지말고, 어차피 못 끊을거면 싸게 깔끔한 마약 빨면서 살라는거임", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 14:55", "comment_id": "reply_li_5535857", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(223.62) (223.62)", "text": "아님...", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 15:03", "comment_id": "reply_li_5536216", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(223.39) (223.39)", "text": "담배만해도 문제가 졸라 터지는데, 대마초까지 허용하는 병신들이 있다? 뿌슝빠슝", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 15:17", "comment_id": "reply_li_5536756", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(58.227) (58.227)", "text": "대마 합법화 하는 곳은 불법일때도 존나 흔하게 하고 있던 앰창 국가나 하지 합법해주는 국가 좆도 없다", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 15:26", "comment_id": "reply_li_5536997", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(210.222) (210.222)", "text": "의료용 대마 합법화를 잘못 본거 아님?", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 15:34", "comment_id": "reply_li_5537221", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(210.222) (210.222)", "text": "마약이 문제인 이유는 저 만화에서 나오는거 처럼 단순히 한번 하고 끝이 아니라서  그럼점점 더 강한 자극을 찾다가 다른 약물도 써보고 양도 늘리다가 결국에는 고물 되는거", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 15:36", "comment_id": "reply_li_5537270", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(61.102) (61.102)", "text": "네덜란드는 합법했다가 점점 센 마약 찾는바람에 범죄조직만 커지고 치안 좆망하는중", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 15:49", "comment_id": "reply_li_5537658", "parent_comment_id": "comment_li_5534905"}, {"writer": "마약도사(203.230) (203.230)", "text": "네덜란드의 경우 치안약화도 있기에 일차적으로 보면 안댐, 계단 효과는 각종 의학 논문에서 반박된지 오래된 지금은 죽은 이론임. 전세계 마약 사용자의 70%는 대마초만 경험하고 다른 마약을 경험한적이 없음. 계단효과는 맥주먹던사람이 마약한다는 말이랑 똑같음. 알콜에 내성이 생겨서 더 높은 농도의 알콜을 찾을 순있으나 (이것도 희귀한 경우) 다른 마약을 한다는건 말이 안돼", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 17:18", "comment_id": "reply_li_5541120", "parent_comment_id": "comment_li_5534905"}, {"writer": "카놀라", "text": "대마는 의존성없고 몸에 해롭지도 않다던데.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1lgyZTNvPchApyyA5eJDoI15BX8JjhvO6", "date": "01.22 17:33", "comment_id": "reply_li_5541911", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(122.252) (122.252)", "text": "ㄴㄴ 술에서 더 강한술로 간다면 대마로 안정 안돼면 더 강한 약빨 찾을수 있단소리 아님?", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 17:56", "comment_id": "reply_li_5542838", "parent_comment_id": "comment_li_5534905"}, {"writer": "ㅇㅇ(223.39) (223.39)", "text": "대마가 담배보다도 의존성이 약하지만 불법화 된 이유는 그 효과때문임담배는 펴도 도파민 생성으로 기분 좋아지고 좀 각성될 뿐인데 대마는 환각작용이랑 정신 좀 이상해지는 거 때문에 그럼", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:09", "comment_id": "reply_li_5543391", "parent_comment_id": "comment_li_5534905"}, {"writer": "즈7", "text": "소주 처마시던 놈들이 소주약하다고 위스키 마시는건 못봤다 - れふ~!", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1WWwQ0b2FoyJP5cz1NyqqQHqNrsnpKvHD", "date": "01.22 18:41", "comment_id": "reply_li_5544435", "parent_comment_id": "comment_li_5534905"}, {"writer": "마약도사(203.230) (203.230)", "text": "ㄴ일단 대마의 중독성은 상당히 낮음 단순 중독성만 보자면 알콜의 절반임, 근데 알콜에도 맥주먹다가 안취한다는 이유로 위스키 먹는사람은 거의 없잖아. 대마도 마찬가지임 물론 극단적인 경우 고농도의 대마 혹은 같은 진정계열인 모르핀을 찾을 수는 있으나.. 대마 피다가 갑자기 환각제나 각성제를 찾는다는건 말이 안된단 거임", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:51", "comment_id": "reply_li_5544778", "parent_comment_id": "comment_li_5534905"}, {"writer" rue, "dccon": "", "comment_img": "", "date": "01.22 15:38", "comment_id": "reply_li_5537302", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "계단 효과는 각종 의학 논문에서 반박된지 오래된 지금은 죽은 이론임. 전세계 마약 사용자의 70%는 대마초만 경험하고 다른 마약을 경험한적이 없음. 계단효과는 맥주먹던사람이 마약한다는 말이랑 똑같음. 알콜에 내성이 생겨서 더 높은 농도의 알콜을 찾을 순있으나 (이것도 희귀한 경우) 다른 마약을 한다는건 말이 안돼", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 17:18", "comment_id": "reply_li_5541134", "parent_comment_id": "comment_li_5535268"}, {"writer": "ㅇㅇ(125.131) (125.131)", "text": "ㄴ그럼 나머지 30프로는 다른 약물한다는건데 존나 높은수치구만ㅋㅋㅋㅋ 한국은 존나 쳐 잡으니까 대마초 하는사람 3퍼센트나 되려나? 70프로라는 수치로 사람들 어설프게 호도하지 마라", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 17:49", "comment_id": "reply_li_5542558", "parent_comment_id": "comment_li_5535268"}, {"writer": "ㅇㅇ(122.47) (122.47)", "text": "scv는 빠릿빠릿 해야지대마 빨고 늘어져 있는거 윗대가리들은 못본다 이기야 ㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:16", "comment_id": "reply_li_5543680", "parent_comment_id": "comment_li_5535268"}, {"writer": "ㅇㅇ(122.128) (122.128)", "text": "살인범보단 절도범이 낫다? 맞는말인데?", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:53", "comment_id": "reply_li_5544837", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "추가적으로 대마 수천kg이랑 코카인 수mg이랑 가격이 같음, 그럼 마약사업자 입장에서는 가능한 대마말고 밀수하기 쉽고 강한 헤로인 같은거 팔려는거임. 그래서 대마 합법화를 주장하는 쪽에서는 비교적 중독성,해학성이 낮은 대마를 합법화함으로서 다른 마약의 유통을 줄일려는 목적이 있음", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:58", "comment_id": "reply_li_5545031", "parent_comment_id": "comment_li_5535268"}, {"writer": "ㅇㅁ(121.182) (121.182)", "text": "마약 문턱효과는 다 말같지도 않은 헛소리임 애초에 대마보다 담배가 훨씬 강력한 마약이다 그냥 이미 너무 퍼져있어서 금지 못하는 거지 오히려 대마는 종류마다 다르지만 대부분 다운계열이고 담배가 각성제 계열인데 담배 핀다고 필로폰 코카인으로 간다는 말도 안되는 소리임", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:59", "comment_id": "reply_li_5545075", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "나머지 30%중에서 20%는 다른 마약을 호기심으로 한번만 경험해봄 10%는 대마를 사용하면서 다른마약을 병행함.", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 18:59", "comment_id": "reply_li_5545076", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "근데 솔직히 10%가 병행한다고 해서 대마를 먼저접했는지 다른 마약을 먼저 접했는지는 모르지. 대략 반반이라고 했을때 전체 대마 경험자중 5퍼센트가 다른 마약으로 간다는거임. 이게 높은 수치인지는 사람마다 다르게 판단할수있지만 그걸로 계단효과를 입증한다는건 무리라고 봄", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 19:02", "comment_id": "reply_li_5545179", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "실제로 포르투칼은 20년전에 마약의 비범죄화 (비범죄화임 합법이 아님)를 실행했는데, 마약 중독자 감소, 마약에 의한 범죄 감소, 중독자 치료률 증가 등으로 성공적인 정책이 되었고, 마약에 의해 씹창난 다른 나라들도 따라하는 중임", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 19:08", "comment_id": "reply_li_5545435", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "물론 그렇다고 한국이 마약 비범죄화 하라는건 아님. 한국은 마약청정국이라고 할만하기에 저런 과격한 정책은 필요없음. 다만 대마를 반대하는 이유들은 상당히 비논리적이며 그딴 이유로 금지한다면 술이나 담배도 금지해야한다고 말하고 싶음", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 19:10", "comment_id": "reply_li_5545569", "parent_comment_id": "comment_li_5535268"}, {"writer": "ㅇㅇ", "text": "어 문턱효과 네덜란드 개씹좆창나면서 입증했어", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1fTsEFfRRxA_aiNfPNuAle_B4XxBBjYmE", "date": "01.22 19:20", "comment_id": "reply_li_5545948", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "네덜란드는 ㅅㅂ.. 경찰인력 감소 하다가 나라 씹창난거고 https://www.yna.co.kr/view/AKR20181129169600098", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 19:31", "comment_id": "reply_li_5546398", "parent_comment_id": "comment_li_5535268"}, {"writer": "마약도사(203.230) (203.230)", "text": "\"네덜란드 경찰, 수사인력 부족해 올해 1만6천건 그냥 덮어\"", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.22 19:31", "comment_id": "reply_li_5546412", "par endingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-da
