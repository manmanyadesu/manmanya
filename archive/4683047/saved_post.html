false, "dccon": "", "comment_img": "", "date": "06.06 02:04"}, {"writer": "ㅇㅇ", "text": "안되지250만의 절반을 남자라고 치고평균 수명을 40세라고 하면20~40세 남자의 비율은 정규분포로 거의 35%정도고이게 43만명임12만명, 약 1/3이 정규군이면 밀농사로는 인구부양이 안됨다만 보통은 12만명이래도 예비군으로 1/3씩 돌려 쓰기 때문에 평소엔 8만명은 소집되지 않을거라아마 문제는 없을거임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-oMKxj_5MRRgRAk4KCFzPzdv-URmjcwf", "date": "06.06 02:11"}, {"writer": "ㅇㅇ(14.5) (14.5)", "text": "조선이 인구 5,600만이었는데도 10만 양병설에 개거품 물었는데..", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.06 02:31"}, {"writer": "ㅇㅇ(1.226) (1.226)", "text": "@ㅇㅇ 정규분포가 맞냐....? 중세 인구는 전형적인 피라미드형으로 알고있는디....", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.06 02:36"}, {"writer": "만능젖붕이(125.191) (125.191)", "text": "@ㅇㅇ(14.5) 그건 조선 국력으로 상비군 10만 육성 보유는 택도 없었기 때문이지. 10만 양병설의 핵심은 10만명을 동원할수있게 하자가 아니라 10만 병력을 상비군으로 고정하자라는 것임. 근데 조선의 국력으론 막대한 재정이 소모되는 평화시 돈벌레인 군인 10만명 보유는 거품무는것도 이해가 되는 내용. 율곡 이이도 꽤 이상론적 유학자로 10만 양성론 주장이전에 조선 경제를 발전시켜 국력을 키울 방법을 먼저 논했어야 하는데 닥치고 마린부터 뽑자고 하니 그게 될턱이 있나", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.06 05:47"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "로마가 300만 인구에상비군 30만이었음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.06 10:11"}, {"writer": "만갤러21(211.205) (211.205)", "text": "몽골", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.06 10:41"}, {"writer": "ㅇㅇ", "text": "@ㅇㅇ(118.235) 30만 병력 유지한건 맞는데 그게 완전 일반적인 상비군은 아니었음 진짜 로마 소속 군단병은 그 중에서 대략 절반~2/3정도 비율이었고 나머지 절반은 특수 병과들(특히 기마병 쪽)을 동맹 도시들로부터 징집 차출(대신 도시들의 자치권 보장, 세금 없음, 로마가 보호 약속)해서 충당함 그거 감안해도 말도 안되는 숫자긴 한데 이건 로마 군의 특수성(모병제고 월급 주긴 하는데 그 월급에서 무기값, 생활 유지비 족족 빼갔음+대신 전역 성공하면 시민권이나 식민지 영토 주는 등의 혜택을 줌) 때문이긴 한데 이것도 결국 점차 모병율 감소하자 참여 조건 완화에서 결국 징집제로 다시 돌아가는 과정을 거침", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1-oMKxj_5MRRgRAk4KCFzPzdv-URmjcwf", "date": "06.06 17:22"}, {"writer": "ㅇㅇ", "text": "이딴거는 김 없는거 올리지마라 그냥", "is_reply": false, "dccon": "", "comment_img": "htt t: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
