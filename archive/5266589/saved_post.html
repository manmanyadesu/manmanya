이거부터 구라임 주인공은 지금까지도 인간들하고 교류없음", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:04", "comment_id": "reply_li_17986827", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 교류하는게 아니라, 던전외의 인간들이 들고온유기물들은 천천히 던전에 흡수되어 포인트가 됨.즉 천막등 가져와서 거점 만들어도 시간지나면 없어지다보니 온천마을 진행이 안됨.그래서 주인공이 그냥 포인트로 건물지어줌으로서 거기에 생활하게 만드는거임", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:09", "comment_id": "reply_li_17986968", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 던전에서 만든 건축물은 던전의 일부이기에 계속 남아있고인간들이 던전에 오래 있을수록 포인트가 들어오고똥오줌.음식물쓰레기등도 포인트로 전환되기에결국엔 주인공은 포인트복사가 시작됨", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:10", "comment_id": "reply_li_17986997", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 그래서 던전을 잘 아는 인간들은인간의 너무 잘 알고있는 지금의 주인공 던전을 폐쇄하여 막아야한다고 주장함.이렇게 계속 사람이 몰리고 주거까지 하게 되면 던전의 성장을 감당하지못한다고그러나 이미 미의 욕망에 절여진 왕족.귀족들에겐 씨알도 먹히지않음.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:12", "comment_id": "reply_li_17987044", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 지금화에 나온 공작영애도 해당던전의 위험을 인지하지만그 던전덕에 자신도 치료받았기에자신이 위험하다고 막자고 호소해봐야다른 여자들이 아름다워지는걸 막고 독점하기위한 수단이라고 생각할거라며이미 늦었다고 반쯤 포기함", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:16", "comment_id": "reply_li_17987121", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 웃긴건 이 작품은 착각물이라, 주인공은 그저 아름다워지는 여자들의 알몸을 보기위해 만들고있기에인류에 위협이 될 만한 던전으로 바꿀 생각은 없음.그러나 인간들의 욕심으로 던전의 소유권을 가지고 전쟁이 날 수 있다고 귀족들 사이에서 말이 나오는중즉 주인공은 의도치않게 세계에 혼란을 주는 위험한 던전을 계속 발전시키는중", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:18", "comment_id": "reply_li_17987211", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 초기에 나왔듯이, 던전들이 잘나가는 던전 무지성 복붙으로 서로 치킨런 하던 시절이 있어서특허같은게 생겨 다른던전의 주력요소를 똑같이 만들지못하게 서로들 암묵적 룰이 생겨서다른던전들도 다른세계의 이세계인을 소환하여 던전테마파크 계획이 이뤄지고있음.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:20", "comment_id": "reply_li_17987273", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 그리고 주인공은 끝까지 인간들과 교류할 수 없음.주인공과 페타는 동기화되어있고 둘 중 하나가 죽어도 던전이 붕괴함주인공은 이미 던전의 핵이기때문에 저세계의 인간들에겐 주인공은 그냥 던전의 보스같은걸로 취급되어 레이드대상이라뭐 제2의 주인공인 1기사단 및 특정 등장인물들과 주인공이 친교를 맺는다는 떡밥은 있긴함.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:24", "comment_id": "reply_li_17987362", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 원작 웹소설은 기준으론 아직 서로 만나서 친교를 나누진않았지만온천만 만들기엔 소재가 너무 한정적이라작가가 친교 떡밥을 남기긴했음", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:26", "comment_id": "reply_li_17987438", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(211.248) 웹연재는 지금 거의 연중상태긴한데올라 온 분량으론 코믹스 한 5~6권 분량은 될 거임.만화가가 스토리 좀 바꿀 수 있으면 주둥풍둔술화술사마냥 더 늘릴 수 있을지도?", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:28", "comment_id": "reply_li_17987487", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(114.200) (114.200)", "text": "@ㅇㅇ(211.248) 개소리야 최근화에 인간 모습으로 던전에 출몰했는데", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:29", "comment_id": "reply_li_17987514", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(1.212) (1.212)", "text": "흙은 땅을 가꾸면 되고, 식물은 가져오면 된다고 쳐도 물이 없는데 어떻게 마을이 생겨?", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:33", "comment_id": "reply_li_17987640", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(1.212) 온천수  식수로 사용", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:34", "comment_id": "reply_li_17987654", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(114.200) 그래서 친교떡밥 있다고 했잖냐", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:35", "comment_id": "reply_li_17987665", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "@ㅇㅇ(1.212) 던전내부는 던전마스터만 변형가능.인간들이 바꿔봐야 시간지나면 원상복국됨.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 15:36", "comment_id": "reply_li_17987696", "parent_comment_id": "comment_li_17984610"}, {"writer": "ㅇㅇ(211.250) (211.250)", "text": "재미뗘재미뗘 ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.14 12:56", "comment_id": "comment_li_18027457", "parent_comment_id": ""}, {"writer": "ㄷㅈㄷ", "text": "어따쓰나 했더니 마을이 생긴다는건가", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1pbO1k70xe367cLALaRyzCoaYtfFRtpd6", "date": "07.14 14:55", "comment_id": "comment_li_18031028", "parent_comment_id": ""}, {"writer": "ㅇㅇ(121.177) (121.177)", "text": "음음", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.14 22:42", "comment_id": "comment_li_18048651", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
