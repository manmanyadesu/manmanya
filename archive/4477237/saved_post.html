", "date": "05.24 07:59", "comment_id": "comment_li_15259375", "parent_comment_id": ""}, {"writer": "만갤러7(114.206) (114.206)", "text": "만순이가 비처녀 껍데기 속에 숨어있는 처녀내음을 낸다면, 얘는 그 반대임", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.24 08:00", "comment_id": "reply_li_15259393", "parent_comment_id": "comment_li_15259375"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "@만갤러7(114.206) 303호 만순이 미즈하라 사샤결국 전부 비처녀가 아닌가?", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.24 08:34", "comment_id": "reply_li_15259920", "parent_comment_id": "comment_li_15259375"}, {"writer": "만갤러7(114.206) (114.206)", "text": "@ㅇㅇ(118.235) 미즈하라는 뼛속까지 비처녀가 맞지만만순이 사샤는 생계형 비처녀라 사실상 명예 처녀임", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.24 08:52", "comment_id": "reply_li_15260318", "parent_comment_id": "comment_li_15259375"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(firstBtn);

                const prevBlockBtn = document.createElement('button');
                prevBlockBtn.className = 'page-btn';
                prevBlockBtn.innerText = '<';
                prevBlockBtn.onclick = () => { currentPage = startPage - 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBlockBtn = document.createElement('button');
                nextBlockBtn.className = 'page-btn';
                nextBlockBtn.innerText = '>';
                nextBlockBtn.onclick = () => { currentPage = endPage + 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.innerText = '>>';
                lastBtn.onclick = () => { currentPage = totalPages; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(lastBtn);
            }
        } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
