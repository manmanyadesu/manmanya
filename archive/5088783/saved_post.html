sercontent.com/d/1IfEEe9_V4Qs-H-tBe0r3Td_SY3lLDYDN", "date": "07.01 01:53", "comment_id": "comment_li_17378011", "parent_comment_id": ""}, {"writer": "로또3등당첨(차단)", "text": "털!ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1ntgZWfzQNKr61xMTU7BxcWwTub1FNqev", "date": "07.01 01:55", "comment_id": "comment_li_17378055", "parent_comment_id": ""}, {"writer": "만갤러1(118.220) (118.220)", "text": "고릴라가 구하러 간다", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.01 01:56", "comment_id": "comment_li_17378077", "parent_comment_id": ""}, {"writer": "ㅇㅇ(125.241) (125.241)", "text": "저 댕댕이가 바라는 인류관이 뭔지 궁금해지네. 좀 더 투쟁적인 거라도 바라나?", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.01 01:59", "comment_id": "comment_li_17378176", "parent_comment_id": ""}, {"writer": "만갤러12(121.167) (121.167)", "text": "인류를 뛰어넘는 수인의 완성", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 02:59", "comment_id": "reply_li_17379943", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ(180.83) (180.83)", "text": "댕댕이니까 인간좋아해서 인간처럼 되고싶은거 아님?", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 03:33", "comment_id": "reply_li_17380751", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ(121.143) (121.143)", "text": "그동안 봐온 개수인들은 머리 쓰다듬고 턱 긁어주면 바로 뒤집어서 배까고 항복함", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 07:33", "comment_id": "reply_li_17385239", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ(183.96) (183.96)", "text": "토너라서 인간이 되고 싶은 것도 있을테고 인간 입장에서야 귀엽지 지성 가진 생명체가 본능적인 특징(사람이 쓰다듬어준다고 까부러치는 수인들, 움직이는 물체 있으면 사냥본능 발휘되는 고양이 수인 등)이 있으면 그건 그거대로 자괴감도 존나 올듯 그러니까 지성으로 본능을 어느정도 억제할 수 있는 진짜 인류가 되려는거지", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 09:47", "comment_id": "reply_li_17388330", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ", "text": "개인적으로는 댕댕이의 비정상적인 동경의 눈을 표현한거 보면인간이 되려는 열망? 같은게 느껴졌음.강아지이라는 생물이 다른 동물들보다 훨씬 인간친화적으로 진화한 걸 생각해보면\"와 인간 쩐당! 나도 되고싶당!\" 또는 종교적 신념이 생길 거일수도 있지 않을까?", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1FWZdbe-tkeBSdLXRsd3IGex70q7EsJjp", "date": "07.01 14:31", "comment_id": "reply_li_17398164", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ(175.223) (175.223)", "text": "인간이 되고 싶다는거는 비유적 표현이고 미래 기술 원하는거겠지", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 17:10", "comment_id": "reply_li_17405166", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ", "text": "인가들중에도 수인되고 싶다고 팔다리 자르는 애들 있잖아 그런 부류인거임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1k7nGDJDd51WLb3Hve7k_DAewLyLvjTIo", "date": "07.03 06:37", "comment_id": "reply_li_17498445", "parent_comment_id": "comment_li_17378176"}, {"writer": "ㅇㅇ(1.241) (1.241)", "text": "솔직히 빼박 같이 온 탐사대 중에 군대나 병기 관련도 있겠지.거기서 병기 하나만 꺼내와도 쟤네 다 족치는 게 가능하긴 할듯.", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.01 02:00", "comment_id": "comment_li_17378190", "parent_comment_id": ""}, {"writer": "ㅇㅇ(220.124) (220.124)", "text": "탐사선 엔진 터트리기만 해도 행성 반절 초토화 가능할텐데 뭐적어도 반물질 수준의 기술력을 갖췄을텐데", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 02:08", "comment_id": "reply_li_17378437", "parent_comment_id": "comment_li_17378190"}, {"writer": "어사일럼", "text": "사자좌 볼때마다 맞는말만", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1ntgZWfzQNKr61xMTU7BxcWwTub1FNqev", "date": "07.01 02:01", "comment_id": "comment_li_17378207", "parent_comment_id": ""}, {"writer": "ㅇㅇ(222.97) (222.97)", "text": "백수의 왕 타이틀은 그냥 딴게 아니네ㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 02:02", "comment_id": "reply_li_17378260", "parent_comment_id": "comment_li_17378207"}, {"writer": "만갤러6(180.67) (180.67)", "text": "구구절절 팩트", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.01 02:09", "comment_id": "reply_li_17378458", "parent_comment_id": "comment_li_17378207"}, {"writer": "ㅇㅇ(211.36) -Yu22YE9BHExT", "comment_img": "https://lh3.googleusercontent.com/d/1A6oI3x6B9cAfW9uLrC5akYG3hIFXeucg", "date": "07.03 16:18", "comment_id": "comment_li_17514176", "parent_comment_id": ""}, {"writer": "껍스", "text": "두발달린자들은 개과 수인인가?  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1A6oI3x6B9cAfW9uLrC5akYG3hIFXeucg", "date": "07.04 13:20", "comment_id": "comment_li_17558128", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
