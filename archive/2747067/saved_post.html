e": "01.31 12:04"}, {"writer": "ㅇㅇ(218.38) (218.38)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1TM8H_XgbhwrWQVJq_Izik5OzjSpXo2Vh", "comment_img": "", "date": "01.31 12:10"}, {"writer": "만갤러44(211.212) (211.212)", "text": "결혼 가능하다는 새끼들은 뭐냐? 좆이 뇌를 지배함?", "is_reply": false, "dccon": "", "comment_img": "", "date": "01.31 12:12"}, {"writer": "ㅇㅇ", "text": "남탓을 하거나 세상을 증오하거나 표독함이 몸을 지배한것도 아니고, 견딜 수 없는 한계치 이상의 외부 스트레스를 자책으로만 해결하는 스타일인지라 멘탈케어 잘해주는 남자붙어서 가정꾸리면 외려 저런애들이 현모양처된다 ㅇㅇ 저런애들이 또 멘헤라 정병년들이나 표독한녀랑은 달라서 남편에게 의존을 해도 끊임없이 추궁하고 의심하는 스타일은 아닌지라 남자만 건실하면 둘이 잘 살 가능성이라도 있음", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xiy86ynm38tdi_JnTbhxdEFiAV5gC1K-", "date": "01.31 12:38"}, {"writer": "ㅇㅇ", "text": "방이 지저분하고 더러운것도 결국 일을 하면서 오는 체력적인 문제와 번아웃때문에 저리 보이는거지 번듯하게 직장에서도 일 잘하고 겉으로긴해도 가면쓰고 외부 사람들과 소통 잘하고 평판 나쁘지 않은거보면 쟤는 결국 자신에게 어느정도 시간이 주어진다면 가사 전반도 잘 해낼각이 보임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xiy86ynm38tdi_JnTbhxdEFiAV5gC1K-", "date": "01.31 12:39"}, {"writer": "ㅇㅇ", "text": "스트레스때문에 폭주해서 폭음하는 저런것도 결국 남자가 잘 달래주면서 섹스 잘 조져주고 어디 여행도 가고 같이 이야기도 나누고하면 자연스럽게 사라질애임 ㅋㅋㅋ 일에 치여서 별다른 방법으로 스트레스를 해소할 '시간'이 없고 약물을 할 용기도 없으니 합법적인 술에 기대어 스트레스를 푸는것 뿐임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xiy86ynm38tdi_JnTbhxdEFiAV5gC1K-", "date": "01.31 12:40"}, {"writer": "ㅇㅇ(218.52) (218.52)", "text": "쟤 상태가 한국 여자들 상태보다 백배 나음 걍 모든 걸 세상탓 남탓으로 돌리는 한국 여자들은 결국 페미니즘을 학습해서 문화로 만들었고 그걸 정치 세력이 이용하면서 여성할당제 같은 걸 도입하게 됐고 일본은 아니니까 해피 수준을 한국 여자들 수준과 비교하면 상위 10퍼 이내에 들어감", "is_reply": true, "dccon": "", "comment_img": "", "date": "01.31 14:06"}, {"writer": "ㅇㅇ(1.234) (1.234)", "text": "@ㅇㅇ(218.52) 니애미", "is_reply": true, "dccon": "", "comment_img": "", "date": "02.02 06:08"}, {"writer": "ㅇㅇ", "text": "주인공은 그냥 평범한데 노아선배랑 비교하는게 맞니", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xiy86ynm38tdi_JnTbhxdEFiAV5gC1K-", "date": " 23"}, {"writer": "단코", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1Cdh5AXl5vCR47WySfjRTCHLJ3SUKdMrK", "comment_img": "https://lh3.googleusercontent.com/d/1HmNcbV-C-JknAs8nlqnkpWekiEqE5ilY", "date": "01.31 00:24"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(firstBtn);

                const prevBlockBtn = document.createElement('button');
                prevBlockBtn.className = 'page-btn';
                prevBlockBtn.innerText = '<';
                prevBlockBtn.onclick = () => { currentPage = startPage - 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBlockBtn = document.createElement('button');
                nextBlockBtn.className = 'page-btn';
                nextBlockBtn.innerText = '>';
                nextBlockBtn.onclick = () => { currentPage = endPage + 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.innerText = '>>';
                lastBtn.onclick = () => { currentPage = totalPages; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(lastBtn);
