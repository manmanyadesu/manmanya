ext": "네일샵? 먹고 살려나...외국인 소꿉친구는 미련을 못 버리고 일본에 계속 있고...", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Nj5K_DFUw-RdD4NyE7W2z2AZyY15KsTm", "date": "06.02 03:25"}, {"writer": "하수의극에달한", "text": "야마하나 노리유키가 그린 妹〜あかね〜(여동생~아카네~)에서는 패배한 여자아이들이 열심히들 삽니다. 피가 한 방울도 안 섞인 동생보다 잘 나가는 여자아이도 있지만 주인공에 대한 아쉬움 미련은 평생 갑니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Nj5K_DFUw-RdD4NyE7W2z2AZyY15KsTm", "date": "06.02 03:28"}, {"writer": "ㅇㅇ(14.32) (14.32)", "text": "타츠키 드디어 1승", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.02 03:33"}, {"writer": "하수의극에달한", "text": "작가가 의도적으로 캐릭터들을 괴롭히는 것은 아니라고 할지라도 료나계 \"귀멸의 칼날\" 결말을 보는 것처럼 수긍이 안 갑니다.그 와중에 의붓 여동생 격인 츠키미 루나만 잘 나가고 주인공은 츠키미 루나가 먹여살리는 꼴이겠습니다. 妹〜あかね〜(여동생~아카네~)에서는 주인공이 열심히 공부해서 경주용 자동차 정비공으로 되었습니다.자동차 수리공으로는 출세한 것입니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Nj5K_DFUw-RdD4NyE7W2z2AZyY15KsTm", "date": "06.02 03:33"}, {"writer": "민트치킨", "text": "개지랄하네 아 시발 - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Nj5K_DFUw-RdD4NyE7W2z2AZyY15KsTm", "date": "06.02 03:33"}, {"writer": "ㅇㅇ(211.118) (211.118)", "text": "아니 물론 루나코가 히로인들 중 제일 나은건 맞는데... 이렇게 빌드업도 없이...?", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.02 03:33"}, {"writer": "ㅇㅇ(211.215) (211.215)", "text": "근데 루나코 말고 누굴선택함? 합리적으로 생각해봤을때 난자가 제일 싱싱한 루나코를 선택하는게 정배인데", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.02 03:34"}, {"writer": "ㅇㅇ(1.240) (1.240)", "text": "ㄹㅇ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.02 09:33"}, {"writer": "ㅇㅇ", "text": "루나코를 응원하긴 했지만 이런 식으로 우승하길 바라진 않았어. 아니 중간에 좀 더 떡밥을 뿌리고 이러던가 하지 ㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1z2ZfxvF8e3nM0FiY87diNmIWQyrquMBo", "date": "06.02 03:35"}, {"writer": "ㅇㅇ(118.217) (118.217)", "text": "깜보디아 유학에 독일6년유학이라........", "is_reply": false, "d IQ3EAQQHtTsapWNfP1ef8yw2Aq54X9Yz", "date": "06.02 02:15"}, {"writer": "ㅇㅇ", "text": "후반에 한 15화 정도 루나코한테 분량 몰빵이라도 했으면 몰라 끝까지 갈팡질팡 하다가 뜬금루나코 엔딩은 진짜", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1IQ3EAQQHtTsapWNfP1ef8yw2Aq54X9Yz", "date": "06.02 02:15"}, {"writer": "ㅇㅇ(110.15) (110.15)", "text": "한명 고른건 그럴수 있는데 클라이막스가 넘 병신이었우", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.02 02:15"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
