oogleusercontent.com/d/1N-1mGVg-RGjXzFp3NMogVWHSLaC0-e-f", "date": "06.15 00:53"}, {"writer": "ㅇㅇ(125.248) (125.248)", "text": "이거보고 배불러서 절식했가", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 00:53"}, {"writer": "ㅇㅇ(182.227) (182.227)", "text": "모치즈키가 작중 21살이라 아직 버티는거지저상태면 30도 못가서 뒤져..", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 00:55"}, {"writer": "백도어킹", "text": "저거 통풍아님..?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1N-1mGVg-RGjXzFp3NMogVWHSLaC0-e-f", "date": "06.15 00:57"}, {"writer": "ㅇㅇ(125.180) (125.180)", "text": "먹는거 조절 못하는애들은 머리 돌아가는거부터가 다르더라뭐 잘못먹어서 배탈났으면 위장 다비울때까지 째야하는데 먹어서 밀어내야 빨리낫는다고 음식을 더때려박음;", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 01:03"}, {"writer": "ㅇㅇ", "text": "다시는 면 요리를 환장하고 쳐먹지 않겠습니노", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1yYRLZMyuTcA6wQ9QqXWQ06k9W75Fsp-l", "date": "06.15 01:09"}, {"writer": "ㅇㅇ", "text": "이 만화가 현실성 높냐 아님 24시간 섹스하는 떡인지가 현실성 높냐", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1yYRLZMyuTcA6wQ9QqXWQ06k9W75Fsp-l", "date": "06.15 01:11"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "이 만화가 높아 현실에 충분히 있는 얘기임폭식장애도 정신질환이다", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 01:44"}, {"writer": "만갤러36(220.86) (220.86)", "text": "돼지내장 초무침은 뭘까 상상도 안가네ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 01:18"}, {"writer": "ㅇㅇ(211.234) (211.234)", "text": "ㄹㅇ 공포만화 ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 01:32"}, {"writer": "ㅇㅇ(115.39) (115.39)", "text": "근데 단기간에 많이 먹으면 살이 붓냐?", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 01:35"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "염분과다 부종임신장이랑 뇌세포가 망가지는 중", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 01:43"}, {"writer": "미쿠다요", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1g80lnn8VT6uLaAylK1AOa3LG-cQYo3z9", "comment_img": "https://lh3.googleusercontent.com/d/1N-1mGVg-RGjXzFp3NMogVWHSLaC0-e-f", "date": "06.15 01:38"}, {"writer": "ㅇㅇ(220.90) (220.90)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1sZtRhXaq2fjyYAhTU4T_TIf0VFzfA4fq", "comment_img": "", "date": "06.15 01:39"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "저렇게 퉁퉁 붓는 건 신장이 망가지는 중이란 얘기다염분과다가 진짜 위험한 거다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 01:40"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "성인(체중 60kg) 기준, 하루에 소금 약 12~24g(나트륨 4,600~9,200mg)을 한 번에 복용하면 치사량에 도달하지 않더라도 신장과 뇌에 직접적인 과부하와 손상을 주기 시작합니다.이는 국물 라면 3~5봉지 또는 일본식 라멘 2~3그릇을 한 자리에서 국물까지 모두 비웠을 때의 양입니다.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 01:53"}, {"writer": "ㅇㅇ(123.111) (123.111)", "text": "반수치사량은 체중 60kg 기준 소금으로 180g라면 한 개에 최대 소금 5g 라멘은 최대 10g", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 01:55"}, {"writer": "ㅇㅇ(122.37) (122.37)", "text": "떡치즈키양 떡감 지린다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 01:42"}, {"writer": "뉴구븽", "text": "기름막에 쌓여 김조차안올라오는 돈코츠라멘 존나맛있을거같네.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1N-1mGVg-RGjXzFp3NMogVWHSLaC0-e-f", "date": "06.15 01:43"}, {"writer": "ㅇㅇ", "text": "왜케 무섭노..", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1yYRLZMyuTcA6wQ9QqXWQ06k9W75Fsp-l", "date": "06.15 01:52"}, {"writer": "ㅇㅇ", "text": "실시간으로 말단부터 퉁퉁 붓기 시작하는거 존나 무섭다", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1yYRLZMyuTcA6wQ9QqXWQ06k9W75Fsp-l", "date": "06.15 02:00"}, {"writer": "ㅇㅇ(1.233) (1.233)", "text": "무슨 시발 밤새서 라멘만 10그릇 넘겨 쳐먹노;", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 02:09"}, {"writer": "만갤러37(39.119) (39.119)", "text": "진지하게 그냥 무섭노;;", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 02:13"}, {"writer": "만갤러37(39.119) (39.119)", "text": "먹방 만화인데 이렇게까지 과식의 위험성을 알리는 만화는 본적이 없다", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 02:13"}, {"writer": "ㅇㅇ(49.175) (49.175)", "text": "일본 라멘은 소금물같이 짜던데 어케 맛있게 먹는거임", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 02:20"}, {"writer": "ㅇㅇ(39.7) (39.7)", "text": "반대로 사실 일본아니라 앵간한 해외나가면 다 한국인 입맛에 짜게느껴짐. 한국은 찌개 탕 문화라서 염분섭취는 많은데 정작 짠맛에는 약한 독특한구조임", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 03:03"}, {"writer": "ㅇㅇ(39.7) (39.7)", "text": "글거 요즘 한식들 달다고 지랄하는데 정작 한국인들은 단맛에도 약함 한국인에게 세계적으로 유효한 맛은 감칠맛과 매운맛정도", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.15 03:04"}, {"writer": "ㅇㅇ", "text": "한국인들 미각 존나 나약함 ㅇㅇ 매운맛 안 섞이면 짜고 단거에 존나 허접임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1hI_UHX6XrN-xOV8Q5Yceqz0eMvlFwPSS", "date": "06.15 06:07"}, {"writer": "만갤러38(220.72) (220.72)", "text": "이게 가능하다고? 한밤중에 잠도 안 자고 라멘을 몇 그릇이고 처먹는다고? 너 진짜 그러다 급사한다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 02:29"}, {"writer": "하르페", "text": "내가 저정도는 아니어도 식탐이 꽤 있는편이라 보통 고민하면 먹는 쪽으로 선택하는데 갑자기 위기감 느껴지네 ㅅㅂ..", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1hI_UHX6XrN-xOV8Q5Yceqz0eMvlFwPSS", "date": "06.15 03:06"}, {"writer": "ㅇㅇ(58.72) (58.72)", "text": "이건 좀...", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.15 03:33"}, {"writer": "Seo", "text": "얼굴터지겠따", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Zc4jubCca0HJtM2QYttylka0NWSZS2iD", "date": "06.15 03:34"}, {"writer": "권땡땡", "text": "붓는거면 통풍이나 당뇨인건가? 무섭다...  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Zc4jubCca0HJtM2QYttylka0NWSZS2iD", "date": "06.15 03:35"}, {"writer": "ㅇㅇ", "text": "미친년 ㅋㅋㅋ 오늘이 ㄹㅇ 제삿날인줄", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1hI_UHX6XrN-xOV8Q5Yceqz0eMvlFwPSS", "date": "06.15 x;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
