arent_comment_id": ""}, {"writer": "하수의극에달한", "text": "본햏이 본 게시 글에서 번역된 만화를 그린 작가의 신상 명세 성별을 알 수는 없으나여자아이 살해하고 고어 연출로 도배하는 \"니들리스\"이지만 여류 작가가 보기에 주인공 만은 귀여워 보였을지도 모르겠습니다.\"다치게 한 거 에라리아 짱한테 사과해주세요!!\"", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kQGvobdsc4CcXvcMcF1O9bwDgOA0dPNw", "date": "07.13 03:27", "comment_id": "comment_li_17969850", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"귀멸의 칼날\" 주인공 성격입니다. 그리고대의를 위한 답시고 살인을 서슴치 않는 씹덕 료나계 \"니들리스\"에 대한 반발일 수도 있겠습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kQGvobdsc4CcXvcMcF1O9bwDgOA0dPNw", "date": "07.13 03:29", "comment_id": "comment_li_17969895", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"죽기 전에 어엿한 여자로 만들어 주마\"씹덕 료나계 \"니들리스\" 주인공이 막판에 변태 동료 때문에 불행하게도 TS 당합니다. 그리고 원래로 돌아가고 싶다고 하니까 여자아이들이 모두 항의합니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kQGvobdsc4CcXvcMcF1O9bwDgOA0dPNw", "date": "07.13 03:33", "comment_id": "comment_li_17969954", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "\"니들리스\"에서는 주인공의 여장이 그렇게 빨리 들통나지는 않습니다.그런데", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kQGvobdsc4CcXvcMcF1O9bwDgOA0dPNw", "date": "07.13 03:37", "comment_id": "comment_li_17970029", "parent_comment_id": ""}, {"writer": "하수의극에달한", "text": "유리스단 단장 학원장의 저 무흐흐한 표정을 보십시오. 남자 혐오는 말 뿐이었습니다.여자아이보다 더 예쁜 남동생이 나타나니까 누나의 본능이 꿈틀거리고 있습니다.저 무섭도록 무흐흐한 누나들 틈바구니에서 에라리아 짱은 과연 주인공을 지킬 수 있을지?번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kQGvobdsc4CcXvcMcF1O9bwDgOA0dPNw", "date": "07.13 03:40", "comment_id": "comment_li_17970079", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "이거 진짜 마지막에 끊는 능력이 예술이네", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1owAG4j3_UHKsz_mi8eQrTqNfFlFW80ub", "date": "07.13 07:57", "comment_id": "comment_li_17974783", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1JJJTAjQiPigNw4MKLShJlYbadafuQZut", "comment_img": "https://lh3.googleusercontent.com/d/1owAG4j3_UHKsz_mi8eQrTqNfFlFW80ub", "date": "07.13 08:03", "comment_id": "comment_li_17974930", "parent_comment_id": ""}, {"writer": "토우마_카즈사", "text": "개맛있다 걍 ㅋㅋㅋ ㅅㅂ ㅋㅋㅋㅋ  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kQGvobdsc4CcXvcMcF1O9bwDgOA0dPNw", "date": "07.13 08:57", "comment_id": "comment_li_17976323", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "한달동안 내 인생이 멈추겠구나", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1owAG4j3_UHKsz_mi8eQrTqNfFlFW80ub", "date": "07.13 09:10", "comment_id": "comment_li_17976631", "parent_comment_id": ""}, {"writer": "ㅇㅇ(106.101) (106.101)", "text": "만 신", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 09:38", "comment_id": "comment_li_17977517", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/11DCgl7Sd_M4Ztfp04o_5pgyITtd29fz3", "comment_img": "https://lh3.googleusercontent.com/d/1owAG4j3_UHKsz_mi8eQrTqNfFlFW80ub", "date": "07.13 12:45", "comment_id": "comment_li_17982592", "parent_comment_id": ""}, {"writer": "ㅇㅇ(1.242) (1.242)", "text": "전개에 벽느꼈다 어흐", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.13 14:12", "comment_id": "comment_li_17985004", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "어흐 재밌다!", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1ICAAsm1ntHfguOWlTyT09_og44rrUOK4", "date": "07.13 14:41", "comment_id": "comment_li_17986018", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
