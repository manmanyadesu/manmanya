, "date": "05.30 11:16"}, {"writer": "ㅇㅇ(222.100) (222.100)", "text": "개씨발 만신", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 11:31"}, {"writer": "ㅇㅇ(49.165) (49.165)", "text": "둘째는 일하다가 낳은 애인가보네  - dc App", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 12:35"}, {"writer": "쭉농증", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1RNjDtheTFD39J5SkMJstXcqhSFNzknPh", "date": "05.30 13:40"}, {"writer": "o o(211.106) (211.106)", "text": "５천만남녀노소불문한국국민들은단５－１０분만간주의기울일것．국가존망과전국민자유，생명，재산，기본인권등달린심각하고충격적인내용임．이내용잘숙지하고살면평생고생안해도되게，초등생이상정상지능있다면，아주이해하기쉽게해설함．반국가세력＝빨갱이／간첩，북한중공４천만댓글부대가이“한국적화위기경고”글한국국민들모르도록，삭제／차단중인심각한현실임．그러니본즉시복사후최대한널리빨리많이무작위로전파할것．자유대한민국심각한적화코앞상황이자현실임．어린이／학생들은친구，부모들과이정보필히공유하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:09"}, {"writer": "o o(211.106) (211.106)", "text": "이재명 김일성장학생 글로벌디펜스뉴스!한국 정상적국가관지닌 국민들중“김일성장학생”이 반국가세력임을 극구 부정할자,숨기려하는자,누구인가.그럼에도 극구 열성적으로 지지할수있을까.지지하는 그들?반국가세력=빨갱이/간첩임.정상/상식적국가관지닌 한국국민으로서,어찌 반국가세력“김일성장학생”을 옹호/지지할수있음?김일성장학생1800여명이라함.유튜브 신인균국방티비 증언내용임.이들이 한국입법/사법/행정부 어디침투해 한국적화공작하는지,악의적 적화흐름조장하는 그들행보,철저히 조사/색출하라. 한국전국민들이 김일성장학생+\"소수\"반국가세력때문에 적화로 개죽음당해서야 되겠음?유튜브장현식김일성 장학생! 대한민국의 헌법을 파괴하고, 국가에 반역하는 대역 죄인들입니다.애국청년들께서는 잊지마시고 이들을 반드시 심판하시기 바랍니다－명단나옴．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:09"}, {"writer": "o o(211.106) (211.106)", "text": "유튜브 장현식2 삭제 전 필수 시청!! 곽종근은 왜 토사구팽 당하나? CIA 녹취록 공개 (증거 동영상: 4분 46초, 출처: 미 정보국 첩보자료)- 과연 어느당, 누가 반국가세력인가.이래도 모를수 있을까.이번 비상계엄의 내란세력이 과연 누구였느냐?보고 듣고 정상／상식적 국가관으로 판단하라.방송언론계침투한 민노총산하 언론노조＝빨갱이/간첩들이 장악한 방송언론에 농락당하지만 말고.진정 누가 어느당들이 반국가세력인가.이 유튜브 채널에 더불빨갱이당의 실체와 부정선거,세월호,이태원사건등 진실에관한 자료많음.누가 내란 세력인가.이재명과의연관성자료보고도 모르면 전세계에 저지능으로 공인됨．극구부정한다？한국적화하는반국가세력＝빨갱이／간첩，북한중공４천만댓글부대확정됨", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "한국국민들은 한국이 \"자유만 사라질뿐\"인 적화되면 어떻게 되는지 모름?그렇다면 한국적화되지 않도록 막는 것이 최선아님?공산/사회주의자들이 전세계 및 한국내에서 수십년간 주장한 지상낙원,천국이 바로 지금의 공산/사회주의체제 국가현실임.한국국민들은 북한,중공등의 공산/사회주의체제국가모습이 과연 그들주장처럼 지상낙원이자,천국으로 보임?공개처형,강제수용소,성노예화등 일상인 그들국가현실임.그들주장이 얼마나 터무니없는 거짓말인지 금방 알수 있지않음?왜 그조차 상식적으로 생각도 못함?결국 국가체제만 바뀔뿐,전국민생활상은 더욱 참혹해지기만한 현실아님?한국국민들 너희가 얼마나 배운것없고,기껏 배운바조차도 얼마나 쉽게 망각하는 금붕어들인지 너희가 세뇌/선동당하는 모습만으로도 충분함.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "자유대한민국 적화되면,한국5천만 전국민들은 어찌되나.일베 (폭로) 중국과 북한, 남한공산화후 천만명 학살 비밀계획 누출,일베 적화통일 후 민주당원들 모습 검색-가족포함 제일먼저 제거됨.빨갱이들에게 철저히 이용만당하다 제거됨.이외 한국전국민의 모든 자유,재산,기본인권 등 모두박탈됨.호러블한 지금의 북한생활상 그대로됨.후덜덜하지?수십년째 왜 술취한 듯 오락가락하며 잊기만 함? 국가체제 핵심 기본원칙만 지키며 살아도 한국 사회전분야 선동하는 빨갱이/간첩=반국가세력 한눈에 파악할 수 있음. 유권자로서 너희가 선택한 역대선거결과만 보더라도,한국국민들인 너희가 너희현실과 미래에 얼마나 무관심한 바보들인지만 드러난것뿐임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "유튜브에서 북한에 관한 오토웜비어 사건,청소년 공개처형, 북한 중공 강제수용소,성노예화 현실,북한실체다룬 실화 비욘드유토피아 예고편,도토리 예고편만보라.한국국민들인 너희가 정신 안차리고, 못차리다,한국적화 완성되면 공포영화같이역겹도록 기괴한현실,너희눈앞에 곧바로 전개됨.문제는그런현실이언제끝날지모른다는점임．윤대통령이 왜 비상계엄을 시행할 수 밖에 없었는지,분단이후 한국사회전분야 암약했던 반국가세력실체와 역사적 배경을 그때까지,지금까지도 모른 바보들임?너희가 얼마나 세뇌/선동만 당할뿐인 무개념／무지성임이 충분히,명백히 드러난 이번비상계엄사태임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "너희가 한국국적지닌 국민으로 사는 한,한국적화에 혈안인 북한,중공등 공산/사회주의국가의 각종 도발과 적화공작도 끊임없이 계속되니,정신 똑바로 차리고 살것.“휴전”분단 현실임.한국적화되면 전국민 생활상과 그결과는 이미 공산/사회주의국가 생활상으로 검증된 귀착임.절대 망각치말고,“한국적화 막으라.”탈북자들이 왜 숱하게 목숨걸고 탈북하나.한국에서 목숨걸고 북한 갈 사람 몇이나 되겠나.그렇다면 상식적으로 “국가체제 비교우위”는 명확히 검증된것 아닌가.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "이하한국적화중인충격적인자세한내용은”디시인사이드 중도보수마이너갤러리[🚨뉴스]아이유·변우석 ‘대군부인’ OTT서 못 보나…“폐기” 청원 충족 ‘국회로［https://gall.dcinside.com/mgallery/board/view?id=centristconservatis&no=1905723］동일맥락장문댓글에있으니，적화싫고자유가좋은한국５천만국민들은필히보고최소１０인이상에게 무조건 최대한 널리/많이/빨리 전파하라．자유냐공산이냐＝사느냐죽느냐임．중간없고시간없다．이”한국적화위기경고“장문댓글적화싫고자유가좋다면，절대지우지마라．지금껏수없이한국적화혈안인반국가세력＝빨갱이／간첩, 북한,중공4천만 댓글부대들이삭제／차단해옴．왜？이”사실＆현실“을한국５천만국민들이모두알게되면，한국적화에방해되기때문임．다른이유전혀없음．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "왜모름？전파할 자유가 그나마있는 이시간 즉각 전파할것이 글 본 즉시”있는내용그대로만“ 복사전파하라.한국５천만전국민개죽음학살되는한국적화혈안인 빨갱이/간첩들 또한 한국５천만전국민들이심각한현실과사실을모르도록하기위해이 \"한국적화위기경고글\"을본즉시 빛삭/삭제/차단중인현실임.안믿겨지나．글쓰는 도중 또는 전체글작성후 삭제/차단/빛삭등 목격한 한국국민 최소한 수백명이상임.그래서글맥락중간에멈춘［끊긴］것임．이제이해되나？빨갱이들이글작성도중차단함．묻는다면，목격한그들이 증언할것임.적화된후 전국민 개죽음학살된다음에야 정신차릴것임？왜전파않고멀뚱멀뚱하기만함？시간없다．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "빨치산후손많은 전라도,김대중이 종교인 너희전라도 ”소수“빨갱이/간첩=반국가세력,들으라.너희”북한，중공내 한국간첩실증명단“밝혀짐.전국민극대노공분할 두려운뒷감당 어쩌려고 지금껏 적화로 한국전국민개죽음학살하려 반국가행태 자행함?그랬던너희，전세계 어디도 도망칠곳없다.그러니까 글지우지마라.그랬던너희,적화싫고 자유가 좋은 한국5천만국민들에게 둘러싸여 맞아죽든 밟혀죽든할 참혹한 최후예정됨.전라도의자유민주주의는전라도너희가지켜낼것．한국전국민들에게책임전가만하며，고통만초래하지말고．여타지역국민들은전라도빨갱이그들이그들지역살리든말든，그들지역사람들스스로전향토록둘것．전라도너희또한적화되면한국전국민개죽음학살대상에서절대예외아니니，너희가 너희지역 빨갱이들 정리하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:10"}, {"writer": "o o(211.106) (211.106)", "text": "전라도의 역대선거결과보라.이건 한국내 북한／중공임.너희가 한국반국가세력거점이자,한국적화숙주지역 아닌가.결국 전라도만 정리하면，모든 한국적화위기상황 클린해짐.자유대한민국의 밝은미래는 전라도빨갱이들이 있는한,절대 보장안됨．아직어린학생，청년들너희전라도골수극좌빨갱이들의악랄함과사악함，절대믿지마라．분단이후，수십년째그러고있음．늘동일한”［극］소수“로부터시작된한국모든국론분열，사회혼란상의난동이지않느냐？늘동일한미친”소수“그들이외，그누가전국민죽이려악의로사회혼란야기하나．항상동일이념행보의”빨갱이“그들이지 않은가.\"소수\"그들 말장난거짓말과 한국적화위한 위장선동에 절대 속지마라.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:11"}, {"writer": "o o(211.106) (211.106)", "text": "빨갱이들이 어찌 자유대한민국 국민인가. 적화로 한국 전국민 개죽음학살시키려는 \"주적 북한과 동일한 이념/사상지닌 공산/사회주의자들\"일뿐임. 이들은 한국 국적지녔더라도 한국국민 절대 아님. \"유사시\" 한국적화로 전국민죽이려는 그들 추호도 용서하면 안된다. 왜 이렇게 누차 강조하는지 이제 알겠느냐? 한국적화되면, 전국민개죽음학살당한다고！말귀를 왜 못알아듣느냐?분단이후 수십년째 변할 수 있던 전향기회와 전향시간 낭비만한 그들임. 수십년째 변치않는다면 더이상 무슨 할 말 있겠느냐? 그렇지?", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:11"}, {"writer": "o o(211.106) (211.106)", "text": "유튜브대한아재협회 (유야지)그는 정말 선량한 청년이었나? 이재명이 사랑하고 존경하고 애정하고 흠모하는 박종철의 숨겨진 이야기 l 대한아재협회－자，그의행적과지금자유대한민국정계 및사회전분야각계각층침투해적화흐름조장하는주사파[한총련,대진연] 운동권 빨갱이/간첩＝반국가세력들과어떤관계인지보라．투명하지않느냐？한국국민들너희，전국민개죽음학살되는귀착인무혈적화가그리먼일같더냐．보고정신차린채，”유사시“를대비하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:11"}, {"writer": "o o(211.106) (211.106)", "text": "무혈적화예방하기위해，이”한국적화위기경고“장문글 있는그대로복사만해서 전파만해도 쉬운일［구국＆애국행동］을, 굳이 전국민개죽음학살당하는적화예방위해적화싫고자유가좋은무수한한국5천만국민들과 \"소수\"반국가세력간 유혈충돌사태까지가려함？중공공산당정권에대항하는홍콩우산혁명보라．공산／사회주의집권당에대항하는네팔시위보라．자유대한민국지금어느체제국가 미래로향하나．자유대한민국또한예외일수없음．”유사시”때는 물리력총동원해추호도용서없이싸워야함. 무엇이 더쉽고간단한가.무엇이 더무혈적화예방위한 최선인가.그러니까 헛소리/변명/핑계만대지말고 지금 글본 즉각 \"글내용있는그대로만 복사후 전파하라.\"", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:11"}, {"writer": "o o(211.106) (211.106)", "text": "“더이상 한국 영토내에서 한국적화하려빨갱이/간첩짓하지 마라.” 분단이후 수십년동안 \"소수\"반국가세력 너희에 대해,관용으로 참고 용서만해온 적화싫고자유가좋은，무수한정상/상식적 국민들의 인내의 끝을 알린 것임. 너희가목숨건각오없이한국５천만전국민개죽음학살하려했던것임？너희가적화로전국민개죽음학살하려했듯，너희가반드시그리될것임．\"소수\"반국가세력 너희에 대한 너희 이외,나머지 무수한 5천만명의 한국국민들이 주는 최후경고임. 최후 경고! 절대 잊지마라.\"자유대한민국 적화되면, 남녀노소불문5천만 전국민개죽음학살되는 미래임을 정신깊이새기고, 한국국적지닌 국민이라면, 무조건 반공정신으로만 살라.\"", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:11"}, {"writer": "o o(211.106) (211.106)", "text": "탈북자 중 반국가세력과 함께하는 탈북자는 남파 이중간첩의심해라. 탈북자 중 그런 이상행보보이는 탈북자 있음. 진실로 \"자유와 행복\"찾아 탈북한 탈북자들은 절대 한국내에서 친 공산/사회주의적 행보나 그런종북주사파，친중적공산／사회주의이념성 주장들에 절대 찬동 안하고 못함. 왜? 북한의 참혹한 현실 직접뼈저리게겪었기때문임. 절대 잊지마라. 이 멍청한 한국국민들아. 너희 개죽음학살당하고 싶나．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:11"}, {"writer": "o o(211.106) (211.106)", "text": "너희 한국내 조직적으로활동／암약하는반국가세력=빨갱이,간첩, 북한 중공 4천만 빨갱이댓글부대들의 악랄함과 사악함은 이 \"한국적화위기경고\" 장문글에 대한 행패를 보고 깨닫거라. 이래도 모를 바보들인 것이냐?수없이삭제되고，수없이글작성중에도차단당함．그래서 절대 지우지마라는 것임. 본인들 개죽음학살되는 도살장＝적화되는현실로 스스로 걸어가는 정신나간 남녀노소불문 5천만 한국국민들이 이런 심각하고도 충격적인 현실 보고 깨달아야하기 때문임. 지금도 이럴진대 하물며，자유대한민국적화완성되면 그 참혹한 현실은 어떠하겠느냐? 이제 알겠느냐?", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:12"}, {"writer": "o o(211.106) (211.106)", "text": "한국전국민 너희 개죽음학살당한다고! 홍콩 민주화위한 홍콩 우산 혁명때 참혹히 살해된 피해자 여학생보라. 공산/사회주의국가로의 국가전복 적화찬동하는 무개념 한국여성들, 너희와 너희 딸들 미래임. 북한 성노예보라. 개념없이 더불빨갱이당과 여타 군소 공산/사회주의정당 지지/소속활동하며 적화 선동하다가 , 한국 적화이후 너희와 너희 딸들의 미래임. 아름다운가. 너희가 미친듯 아무 개념/생각없이 지지/선출하며, 공산/사회주의체제 국가가 최상의 이상향이라 꽃길망상가득함으로 선동한 정신나간 \"소수\"너희만의 천국,지상낙원인 공산/사회주의체제 중공,북한 아닌가. 할 말 있나.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:12"}, {"writer": "o o(211.106) (211.106)", "text": "그런 공산/사회주의체제 국가인 북한 중공 등이 너희 눈에는 지상 낙원이자 천국으로 보이나. 그렇게 보이고 말하는 자, 전세계에서 빼박 공산/사회주의자뿐이요, 한국내에서만큼은 그런 주장하는 자는 반국가세력=빨갱이/간첩 확정됨.“북한 중공내 한국간첩실증명단”에 있는 너희만의 천국이자, 지상낙원인 북한 중공등으로 왜 안감? 지상 낙원이자 천국이면, 목숨걸고 갈만한데， 왜 안감? 그만큼너희가보기에도아닌것이요，목숨걸만큼좋아하지않는다는뚯이지무엇임？그렇게좋지않거든，한국영토내에서만큼은그런미친짓안하면그만아님？그게더쉽지않음？안가고한국국민인채위장해살면서，국가전복선동만하는너희，그러니빼박간첩일뿐임．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:12"}, {"writer": "o o(211.106) (211.106)", "text": "자유대한민국 5천만 전국민 적화로 개죽음학살하려 혈안인그런 역겨운너희 위선자들이자，역겨운너희의악취가득한새빨간거짓말일뿐이니, “북한 중공내 한국간첩실증명단” 확보／발표시, 극대노 공분해 \"소수\"너희에게 달려갈 무시무시한“한국5천만명의 군중떼”를상상해보라．적화로한국５천만전국민개죽음학살하려는무모한시도， 이젠 그만하라. 루마니아 차우세스크, 이태리 무솔리니의 아름다운 최후를 보라．그게 한국적화로 전국민 죽이려한 \"소수\"의 미친 너희 반국가세력에게 닥칠，오직“소수”의미친너희에게만합당한，역겹도록기괴한아름다움이요，아름다운 미래임．빨갱이/간첩짓 안하면 그런 일 없지 않느냐? 그만하면 전국민 극대노 공분 살 일 전혀없지 않느냐? 그런데 왜 수십년째계속 적화로전국민 죽이려고만하나.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:12"}, {"writer": "o o(211.106) (211.106)", "text": "이 \"한국적화위기경고\"글 보고도, 지금 즉각 전파안하는 그는 정상/상식적 한국국민 절대 아님.왜?부정선거로 무혈적화 코앞 심각한 한국현실상황임.개죽음학살당하기 싫거든，그러니까 본 즉각 복사 전파하라.이렇게초등생조차이해하기쉬운글을이해못한다？전세계공인된바보임．그럼에도전파안한다？한국적화공작하는반국가세력＝빨갱이／간첩，북한중공４천만댓글부대뿐없음625북한의 기습남침처럼\"전쟁/내란\"은 예고없이 발발함.한국국민너희는\"유사시\"“자유수호”를위해，자유진영혈맹/우방국과함께공산/사회주의국가들과싸울것인가.아니면한국내 \"소수\"반국가세력이 되어,공산/사회주의국가들과 함께 적화로한국전국민죽이려 싸울 것인가.자유냐 공산이냐 중간없다.지금이순간결정하고살라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 18:12"}, {"writer": "o o(211.106) (211.106)", "text": "“한국적화위기경고”글전파도반드시이내용있는그대로만해야함．왜？동일내용으로구성된공통내용이라야만，연령세대불문한국５천만국민들이그어느누구도부정할수없는통합되고공통된２０２６년한국지금현상황인식이형성되어，올바른방향으로적화싫고자유가좋은５천만국민들이함께나아갈수있기때문임．이해되지？중구난방식내용은허사임．자유냐공산이냐＝사느냐죽느냐중간없는문제임．그래서전국민들이논란  return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
