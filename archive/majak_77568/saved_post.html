GroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';

                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
