YRey9ujeSyDnrKpGA-SZVmUd", "date": "06.14 01:59"}, {"writer": "하나둘셋스마일", "text": "언제 먹어도 정말 맛있는 만화입니다...", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 02:09"}, {"writer": "쭉농증", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1U2e_fNdV6zHnGO66B_N4StG3YbPSPXd8", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 02:17"}, {"writer": "만갤러18(220.81) (220.81)", "text": "메인히로인은 누구에게든 메인히로인이네", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 02:27"}, {"writer": "하수의극에달한", "text": "주인공이 이른바 \"보살\"이라", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 03:03"}, {"writer": "하수의극에달한", "text": "여자아이들이 저렇게 \"좋아해\"라고 대놓고 신호를 보내는데도 이른바 \"철벽\"을 치고 있고\"나는 게임 캐릭터에 관심없어\"를 시전하고", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 03:04"}, {"writer": "하수의극에달한", "text": "그런데현실에서 주인공이 저렇게 나오면 여자아이들한테 고통스럽습니다. 여자아이들은 그저 둔탱이라서 그런 줄 알고 아직까지 희망을 버리지 않는데 말입니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 03:07"}, {"writer": "하수의극에달한", "text": "현실에서 저런 경우가 있습니다.남을 위해 사는 사람이라 자신을 돌볼 겨를이 없는 사람인데 여자아이들이 죄다 반해서 고통스러워합니다. 론 하워드 감독이 제작한 \"분노의 역류\"에서 주인공 형이 그런데 부인이 견딜 수가 없어서 이혼했다가 장례식장에서 눈물을 펑펑 쏟습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 03:12"}, {"writer": "하수의극에달한", "text": "본 게시 글에서 번역된 만화는 근본적으로 \"니세코이\"라는 뽕빨물을 여류 작가가 해석한 버전인 것 같습니다.그리고 그 여류 작가에게는 에미야 시로 같은 이른바 \"보살\"이 이상형이고 말입니다.그런데", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 03:18"}, {"writer": "하수의극에달한", "text": "보아하니 여류 작가가 민감한 사람인 것 같고 열심히 그리고는 있는데 저리 무거운 소재를 어떻게 감당할지?참고로 적자면 오노데라 하루와 이어지는 \"애박소녀\"라는 단편도 있습니다. \"오게하\"를 그린 여류 작가가 그렸습니다.번역하신 분은 수고하셨습니다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1SDpoGpzkdPnB2kSgljBykT00uq6ouSnu", "date": "06.14 03:23"}, {"writer": "ㅇㅇ(210.113) (210.113)", "text": "구도가 왤케 흥미롭고 신선하냐 이거 ㄹㅇ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 04:57"}, {"writer": "ㅇㅇ(211.36) (211.36)", "text": "저따구로 권유하면 뭔가 하기싫은데", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 07:03"}, {"writer": "만갤러21(118.41) (118.41)", "text": "수인만 아녔어도", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 09:49"}, {"writer": "ㅇㅇ(211.185) (211.185)", "text": "ㄷㄷㄷㄷㄷㄷ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 10:22"}, {"writer": "ㅇㅇ(119.197) (119.197)", "text": "이거 남자주인공이 정신병이라...", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 11:22"}, {"writer": "에에에에에에", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1_ilCsws7d_38oAno2nECiFu2jhA1JhKW", "comment_img": "https://lh3.googleusercontent.com/d/1CBtfzWeT5E8oPYgqHacbhb2Cl40TK5pr", "date": "06.14 11:29"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "갑자기 왜 정상인척 하는거지? 두창회전으로 만신이라 부르던 작가 어디갔냐", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 12:20"}, {"writer": "복슬복슬토끼", "text": "머리는 패배 히로인 쪽인데 가슴은 수인을 외친다", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1mXElA0pAF14Sk7kBdC6tXfZpRGB9KCax", "date": "06.14 14:53"}, {"writer": "만갤러23(125.184) (125.184)", "text": "이거 뭔데 계속 념글감  - dc App", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.14 16:30"}, {"writer": "만갤러24(175.201) (175.201)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1dHN9SNola27bb0hVwe3Xaf21EXVfW-F6", "comment_img": "", "date": "06.15 02:10"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
