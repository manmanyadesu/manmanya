증이 심하다. 뭐 이건 지금도 보이는 모습6. 노아 선배는 친구가 없다. 인터넷으로 알게 된 동년배 여자 말고는 남주 정도다.7. 노아 선배가 남주에게 달라붙게 된 계기는남주는 노아를 여자로 안 보고 성욕 대상으로는 더더욱 안 보기 때문이다.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 10:54", "comment_id": "reply_li_17792918", "parent_comment_id": "comment_li_17792825"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "https://m.dcinside.com/board/thani/122467?page=2&recommend=1", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 11:46", "comment_id": "reply_li_17794864", "parent_comment_id": "comment_li_17792825"}, {"writer": "만갤러41(59.12) (59.12)", "text": "노아선배 수영장편에서 이미 개걸레 확정 났는데 먼 개소리지요?.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 12:57", "comment_id": "reply_li_17797308", "parent_comment_id": "comment_li_17792825"}, {"writer": "ㅇㅇ(14.47) (14.47)", "text": "의존증 존나 심하고 거유년인데 남자들이 놔뒀을리 없긴함", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 13:20", "comment_id": "reply_li_17797951", "parent_comment_id": "comment_li_17792825"}, {"writer": "ㅇㅇ(211.185) (211.185)", "text": "@ㅇㅇ(14.47) 스킨십 거부 철벽쳤다는 점그리고 본인이랑 친구가 처녀라고 확정 박음", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 18:59", "comment_id": "reply_li_17807904", "parent_comment_id": "comment_li_17792825"}, {"writer": "ㅇㅇ(211.185) (211.185)", "text": "@만갤러41(59.12) 수영장 편이 뭐지아 그거 얘기임 설마?바다 아니었나?아니면 수영장을 따로 갔나바다에서 헌팅당하니까 무서워서 굳다가 얼굴 붉히다가남주가 와서 데려가니까 엄청 좋아하던데", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 19:00", "comment_id": "reply_li_17807939", "parent_comment_id": "comment_li_17792825"}, {"writer": "ㅇㅇ(220.120) (220.120)", "text": "@ㅇㅇ(211.185) 이런 화제에 진지하게 대답하지 마라. 만갤에서 댓글로 처녀 인증 받으려면 남자가 쳐다보기만 해도 전 임자가 있으니까요 라고 선언하고 철벽 쳐도 될까 말까임", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.09 20:46", "comment_id": "reply_li_17811965", "parent_comment_id": "comment_li_17792825"}, {"writer": "ㅇㅇ(211.185) (211.185)", "text": "@ㅇㅇ(220.120) ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "" sById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
