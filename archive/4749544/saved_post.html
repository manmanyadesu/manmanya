.235) (118.235)", "text": "@마자용♂ 효도가 ㅈ으로 보이나보네ㅋㅋ 그냥 정신병자였으면 제애가 진작에 망했지. 미치광이 처럼만 보인다면 그냥 그만큼 밖에 못보는건데 그걸 자랑스럽게ㅋㅋㅋㅋㅋ 미치광이처럼 행동해도 그 근간에 합리성/논리적인거 보면 알 수 있구만ㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.10 13:37"}, {"writer": "ㅇㅇ", "text": "ㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1FWTZkVHK5cvxJhE0ayixOmXzWnypeZUZ", "date": "06.09 23:14"}, {"writer": "뚜니펭귄", "text": "진지하게 우동 물로켓임  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1A620JjtJmCQwm4gBoQQcUPvvB6piZ26f", "date": "06.09 23:14"}, {"writer": "토시노", "text": "우동 짤로 너프해도 과반 차지하는 게 레전드네 ㅋㅋㅋ (●` 3 ´●)", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1A620JjtJmCQwm4gBoQQcUPvvB6piZ26f", "date": "06.09 23:14"}, {"writer": "임루아", "text": "우동 부정선거 너무해  - dc App", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1FWTZkVHK5cvxJhE0ayixOmXzWnypeZUZ", "date": "06.10 02:16"}, {"writer": "만갤러52(183.104) (183.104)", "text": "우동 부정선거", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.09 23:16"}, {"writer": "ㅇㅇ(58.231) (58.231)", "text": "아오 투표 프로필이 좆동이라서 소바찍음", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.09 23:17"}, {"writer": "원챤", "text": "전자투표 도입", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1A620JjtJmCQwm4gBoQQcUPvvB6piZ26f", "date": "06.09 23:18"}, {"writer": "이기고또이긴다재가될때까..", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1JNfUohDWhIlN6SS7sr4aLUAHcpG46MD8", "comment_img": "https://lh3.googleusercontent.com/d/1A620JjtJmCQwm4gBoQQcUPvvB6piZ26f", "date": "06.09 23:22"}, {"writer": "ㅇㅇ", "text": "우동 = 면발 탱탱도르 하나로 먹고사는 범부이게 어떻게 소바가 아님?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1FWTZkVHK5cvxJhE0ayixOmXzWnypeZUZ", "date": "06.09 23:22"}, {"writer": "임루아", "text": "우동 부정선거 너무해 소바 어게인  - dc App", "is_r .length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
