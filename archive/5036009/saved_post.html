으로 봤음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 00:44", "comment_id": "reply_li_17217423", "parent_comment_id": "comment_li_17217276"}, {"writer": "ㅇㅇ(218.153) (218.153)", "text": "아니야 그래도 팔코니아 만들어지고 그리피스랑 마수기사단 다시 나올땐 옛날느낌 살짝 났음 그뒤로 얼마 안가서 죽어서 그렇지..", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 00:46", "comment_id": "reply_li_17217512", "parent_comment_id": "comment_li_17217276"}, {"writer": "ㅇㅇ(211.245) (211.245)", "text": "키르케 나오기 전까지는 만력 쩔었음 이 정도 재미 있는 만화 드물었음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 00:50", "comment_id": "reply_li_17217709", "parent_comment_id": "comment_li_17217276"}, {"writer": "ㅇㅇ", "text": "@ㅇㅇ(218.153) 걍 앞으로 전개도 좀 뻔하지 않음? 그냥 영웅이 타락해서 타락한애들 다 모아서 영웅 흉내내고 그거를 복수하는 스토리... 엄청 옛날 스토리라서 그 시대 기준으로 아무리 상상력을 펼쳐봐야 신박한건 없을거고. 꼭두각시 서커스마냥 2010년 전에라도 완결했으면 나름 대작이었을텐데 그 이후 이세계물 엄청 나오고 원나블도 완결하고 도박마도 끝나고 해서 지금은 큰 감흥은 없을 듯", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1JUqyJbZGk7wrdujNXXyJ9Vskv1jKX9QV", "date": "06.28 00:51", "comment_id": "reply_li_17217746", "parent_comment_id": "comment_li_17217276"}, {"writer": "ㅇㅇ(121.159) (121.159)", "text": "이거 정확한 평임. 재밌어서가 아니라 그림 빽빽하게 그리는게 신기해서 떴던거임.. 그림도 잘 그리는건 아닌데 신기하게 그려서", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 00:57", "comment_id": "reply_li_17218000", "parent_comment_id": "comment_li_17217276"}, {"writer": "ㅇㅇ", "text": "@만갤러19(211.186) 오히려 키르케 합류하고 나서 그 마을에서 켈피랑 오우거 상대로 싸울때가 최고점 아님? 가츠 단신으로 집체만한 오우거 상대하는게 카타르시스 개쩔었는데", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1JUqyJbZGk7wrdujNXXyJ9Vskv1jKX9QV", "date": "06.28 01:01", "comment_id": "reply_li_17218181", "parent_comment_id": "comment_li_17217276"}, {"writer": "두산중공업", "text": "@만갤러19(211.186) ㄹㅇ 단죄의 장까지는 각 장마다 질질 끄는 것 없이 기승전결 깔끔하고 갓만화 였는데 그 이후 부터 빌드업도 길고 그 빌드업 해결해도 별다른 스토리 진행은 없어서 카타르시스도 적고, 나오는 텀은 길고,  너말대로  본게 아까워서 계속 봤음. ㄹㅇ 작화 차력쇼 라도 없었으면 안봤다 .", "is_reply": true, "dccon": "", "com 28 08:43", "comment_id": "reply_li_17233335", "parent_comment_id": "comment_li_17233328"}, {"writer": "만갤러56(175.194) (175.194)", "text": "큰 맥락 자체는 작가가 알려준 내용이 맞는거 같은데 디테일을 몰라서 다 스킵스킵 하는거 아님? 그러다보니 설득력 없어서 망한거같은거고", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.28 08:47", "comment_id": "comment_li_17233409", "parent_comment_id": ""}, {"writer": "ㅇㅇ(221.146) (221.146)", "text": "디테일을 어시들끼리 채워봤자 욕만 더처먹으니 결말까지라도 빨리 빼자 택한거지 지금도 욕하고 사망 직후말고 전부 욕인데 친절하게 하나하나 묘사하면 과연 좋아할까 얘들이 - dc App", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 19:27", "comment_id": "reply_li_17258673", "parent_comment_id": "comment_li_17233409"}, {"writer": "ㅇㅇ", "text": "이전 화랑 이번 화가 존나 별로 인게, 이제까지 가츠가 인간으로서 발버둥치면서 발악을 해온 모든 것들이, 이미 태어나면서 그리피스같은 존재로 각성하기 위해 정해져있던 수순이라고 치부하는게 존나 별로임. 그냥 가츠는 태생부터 고드핸드들과 맞서 싸우기위해 태어난 존재라고 설명함. 저 유계의 여신같은 존재가 그렇게 설명했다. 조온나 짜치지. 가츠는 인과율 그딴거 없이, 그저 인간으로서 발버둥치고 유계의 존재들의해 휘말린 평범한 인간으로서 발악하던 존재였는데 그 발악하는 단순한 인간이 인과율을 뒤집어 찢어버린다는 의외성이 멋있는 거였는데, 그걸 그저 태생부터 정해져있는 선로를 달리는 열차로 표현하는게 조온나 짜친다.", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/17zX5T2TEv7Vkzr8K8qUh2BM66IQPiWSa", "date": "06.28 08:52", "comment_id": "comment_li_17233523", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "가츠는 정해져있는 인과율을 찢어발기는 광전사여야만 했는데, 무슨 씨발 인과율대로 정해져있는 고드핸드들과 같은 이미 정해져있었던 운명의 용사가 되버렸슴. 독자가 원하던 것은 그런게 아니야. 평범한 인간이, 광기에 사로잡힌 광전사가, 무수히 많은 사도들을 썰어버리다가 그 사도들의 피에 젖어버려 더이상 평범한 철몽둥이가 아니게된 드래곤 슬레이어처럼 더이상 평범한 인간이 아니게되는게 멋잇는 거란거임. 지금은 그냥... 드래곤퀘스트가 되버렸잖아. 갑자기 정령 여신이 태어날때부터 정해져있던 용사로 만들어버렸잖아.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/17zX5T2TEv7Vkzr8K8qUh2BM66IQPiWSa", "date": "06.28 08:59", "comment_id": "reply_li_17233662", "parent_comment_id": "comment_li_17233523"}, {"writer": "ㅇㅇ(58.231) (58.231)", "text": "약간 데빌맨 느낌 내려고 한듯? 알고보니 날때부터 선택 받은 강함을 지닌 그런ㅋㅋㅋ 근데 가츠가 그동안 개좆고생한게 어이없을 정도의 호소력이라 영 그렇긴 해ㅋㅋㅋㅋㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 09:11", "comment_id": "reply_li_17233893", "parent_comment_id": "comment_li_17233523"}, {"writer": "ㅇㅇ(58.231) (58.231)", "text": "맨몸의 인간으로 고드핸드라는 인간세상에 지대한 영향을 끼칠수있는 신과도 같은 마물들을 처단한다라는 인간찬가의 카타르시스를 보여줘야 하는데 신력각성 같은 딸깍버튼 눌러버린거 보니 솔직히 미우라 머릿속은 아니고 그냥 대충 마무리 지으려는 농간인 느낌이 커ㅋㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 09:13", "comment_id": "reply_li_17233935", "parent_comment_id": "comment_li_17233523"}, {"writer": "ㅇㅇ", "text": "@ㅇㅇ(58.231) 차라리 해골전사처럼 반쯤 사도화됐지만 인간성을 지닌 존재로 각성하는게 더 나았을거같음. 지금 저 각성은 갑자기 싸구려 천사날개 캐쉬템사서 달은거처럼 어색하다.", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/17zX5T2TEv7Vkzr8K8qUh2BM66IQPiWSa", "date": "06.28 09:16", "comment_id": "reply_li_17234004", "parent_comment_id": "comment_li_17233523"}, {"writer": "ㅇㅇ", "text": "@ㅇㅇ(58.231) 아무리 생각해도 미우라 본인이 생각한 각성은 저게 아닐거같음. 미우라는 광전사의 갑주에서 이미 힌트를 줬슴. 미우라 본인은 해골전사라는 단서도 줬고, 광전사의 갑주랑 합쳐져서 완전히 사도화되지만 인간성을 되찾는 방법의 각성으로 유도했을거임. 저런 개병신같은 각성은 여태까지 쌓아온 서사를 깡그리 무시함. 이건 그냥 미우라에대한 모욕임", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/17zX5T2TEv7Vkzr8K8qUh2BM66IQPiWSa", "date": "06.28 09:18", "comment_id": "reply_li_17234056", "parent_comment_id": "comment_li_17233523"}, {"writer": "만갤러72(175.120) (175.120)", "text": "걍 인간이었어야함 광전사갑주가 부서진뼈 맞춰주며 고통줘도 광기로 미치게해도 버티며 싸우는 인간이 좆간지인거지", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 16:50", "comment_id": "reply_li_17251473", "parent_comment_id": "comment_li_17233523"}, {"writer": "ㅇㅇ(121.140) (121.140)", "text": "@ㅇㅇ 니 말이 제일 적절하다, 시르케가 계속 광전사 갑옷 가츠의 자아를 통제하던 것도 그 과정이겠지, 마치 파르네제가 시르케를 통해 마법사로 각성하는것 처럼, 가가츠도 시르케와의 영적교감을 통해 광전사 모드, 즉 이후 사도화된 모드에서도 인간성을 잃지 않게 된 상태= 각성, 이게 미우라가 차곡차곡 쌓아가던 떡밥인데, 이거 싸고있는 친구라는 병신새끼가 그걸 이해못하고 걍 막 던지는중인거 같다.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 20:49", "comment_id": "reply_li_17263144", "parent_comment_id": "comment_li_17233523"}, {"writer": "ㅇㅇ(121.140) (121.140)", "text": "@ㅇㅇ 근데 내가 미우라 친구라고 해도 막던질거 같긴 함, 애초에 내 작품도 아닌데 뭣하러 그렇게 깊게 이해해서 작품 커뮤가 규제당해도 편들어주는 사람이 없지 앞으로 만화광들이랑 손절하고 일반인 코스프레 하는 게 정배다", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:16", "comment_id": "reply_li_17301097", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "커뮤랑 sns에서 지들끼리 모여서 갈드컵 억까 쳐하든 말든 손절 확 때리고 멀쩡하게 자기계발이나 해야지 사이버 고시원 장수생들의 말로와 비슷한 최악만을 보여주고 좋은 거 전수하지 않는 인터넷에 뭘 기대하겠음? 백날 쿨하다고 남들 까봐라 냉소주의만 하는 커뮤랑 달리 바깥 사람들은 이딴 갈드컵들 안 한다 원로 작가랑 한몸이라고 지지할 때는 언제고 조금만 마음에", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:21", "comment_id": "reply_li_17301336", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "안 들면 억까하는 커뮤 sns 사람들과 어떻게 함께 덕질하겠음? 비판만 받을 것을", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:22", "comment_id": "reply_li_17301366", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "설거지론 등이나 기성세대를 향한 비판을 지들이 10년 동안 해와서 억울해서 갈드컵 안 하면 못 살겠다는 건 이해하겠는데 그럴 거면 지들이 기성세대랑 똑같지 말아야 할 것을 뭐 다를 거 없으면서 냉소주의 메타 정배라고 우기기만 하면 다인 줄 알아?", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:25", "comment_id": "reply_li_17301508", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "솔직히 말해서 만화광들이나 게임광들은 북미 덕후들처럼 드래곤볼만 구매하는 게 대부분이라서 나머지는 안 구매하니까 산업 자체가 드래곤볼 하나에만 과의존한다며? 억까들 할 거면 드래곤볼말고 딴 것도 골고루 사게 구매력 높이고 까든가 만화업계 살릴 생각도 없으면서 억까들만 하면", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:40", "comment_id": "reply_li_17302017", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "상식적인 구매자들만 탈출하지 만화 시장 유입 모집 가망 쳐있겠냐고", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:41", "comment_id": "reply_li_17302031", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "앞으로 만화 소비 시장 유입시키나 봐라 가망도 없는 걸 팬심들로 억빠하면서 넘어가줬더니 억까로 배신하고 쳐보답하는 커뮤니티 시장은 필요없어", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.29 15:43", "comment_id": "reply_li_17302071", "parent_comment_id": "comment_li_17300940"}, {"writer": "ㅇㅇ(182.172) (182.172)", "text": "인과율이 끊어졌다...", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.29 16:25", "comment_id": "comment_li_17303630", "parent_comment_id": ""}, {"writer": "미리오", "text": "작화 그런건 넘어가고,대사도 잘 없고 너무 허전하네....", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1HewYrwXVU1yErsuNC41DUIH6vk2p235-", "date": "06.29 16:48", "comment_id": "comment_li_17304784", "parent_comment_id": ""}, {"writer": "ㅇㅇ(211.180) (211.180)", "text": "그냥 기존 베르세르크를 AI에 학습시켜서 미우라 로라 만든 뒤에 편집부에서 콘티 짜서 스테이블 디퓨전으로 뽑아내면 이거보다 훨씬 좋을 듯", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.29 17:17", "comment_id": "comment_li_17306050", "parent_comment_id": ""}, {"writer": "ㅇㅇ(116.46) (116.46)", "text": "작가 사망 후 지금까지 질질 끌었으면서 막상 한다는게 잠깐 드르렁한게 끝이노ㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.29 19:58", "comment_id": "comment_li_17313553", "parent_comment_id": ""}, {"writer": "만갤러88(1.177) (1.177)", "text": "근데 사실 저 새끼가 유계와 현실의 틈새의 초월체라 그만큼 싸울 수 있었던 게 아닐까?ㅋㅋㅋㅋ 일반 사람은 가츠같은 몸상태에서 빌빌대다 뒤질 거 같은데...저 새끼는 갑옷으로 중무장하고 ㅈㄴ 무거운 대검들고 댕기면서 사도조지고...그 뿐만 아니라 몸 이곳 저곳 부상도 많은데 피크 가루빨도 있겠지만 어찌저찌 회복하고 밤낮 바뀌어가면서 자율신경계 씹창나는데도 저만치 싸움. 만화긴 하지만 저 새끼 그간 행적만 보면 탈인간임. 뭐 물론 막판에 폐인돼서 멘탈 놓긴 했지만..", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.29 20:16", "comment_id": "comment_li_17314405", "parent_comment_id": ""}, {"writer": "ㅇㅇ(175.120) (175.120)", "text": "작가 죽었으면 작품도 죽은거지 그냥 치워야됨", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.29 20:44", "comment_id": "comment_li_17315817", "parent_comment_id": ""}, {"writer": "ㅇㅇ(59.21) (59.21)", "text": "미우라랑 달리 이야기 풀어나갈 자신이 없으니 인간 가츠론 갓핸드 못이길거같으니 가츠를 인간이 아니게 만들어버리네", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.29 21:24", "comment_id": "comment_li_17317528", "parent_comment_id": ""}, {"writer": "퐁크러쉬", "text": "광전사 갑주 끼고 좆뺑이 치면서 상위 사도 썰어내던 가츠는 어디가고 이게 무슨..", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/15Dmum_EErONOkB7RUW7_sFHGtZ6OWOgy", "date": "06.30 00:26", "comment_id": "comment_li_17325730", "parent_comment_id": ""}, {"writer": "ㅇㅇ(125.181) (125.181)", "text": "그리피스와 가츠의 대결이 흥미진진했던 이유는 인과율에 따라 정해진 운명에 순응한 자와 거스르는 자 사이에 생긴 파워갭을 세계관 내에서 어떻게 풀어낼까에 대한 작가의 상상력에 대한 기대였는데 결국 그 또한 운명이었다라고 하면 평범한 작품으로 마무리되겠네", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.30 04:07", "comment_id": "comment_li_17332855", "parent_comment_id": ""}, {"writer": "만갤러90(39.120) (39.120)", "text": "가츠 이제 초능력까지 사용하네 족쇄 기합으로 깨버리노", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.30 09:37", "comment_id": "comment_li_17338258", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된
