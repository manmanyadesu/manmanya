으로는 전략핵잠은 본토와 매우 떨어진 공해상에서 전략초계하는게 기본임 그리고 MIRV 탑재가 기본이라 최소 동시타격 목표가 백단위가 넘고 얼음을 뚫고 부상한거는 전략핵잠 위치가 북극해라는 것이고 육안으로 관측가능한 미사일 경로는 미국-러시아 핵전밖에 없음컷신으로 보이는 미사일 경로로 보면 상호확증파괴가 작동한걸로 보임1번은 알수 없음 전략초계는 각각의 전략핵잠은 요격 및 추적이 쉽지 않도록 멀리 떨어저 있는게 기본임 부상했다고 다른 전략핵잠이 발사한 미사일을 육안으로 관측할 수가 없음 하지만 미국과 러시아의 핵전쟁시에 본토에 있는 고정식 사일로에서 발사한 핵미사일은 북극해에서 일부 관측가능함2번은 미사일 날라가는 컷신으로 봐서는 적국도 발사했고 자국도 발사한거임 선후관계는 알 수 없음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.26 20:05", "comment_id": "reply_li_17153940", "parent_comment_id": "comment_li_17151149"}, {"writer": "ㅇㅇ(125.185) (125.185)", "text": "그거 둘다인 거지 그냥 명령 불복종한 곳도 몇개 있겠지만 대부분은 발사해버려서 세상 끝나는 장면을 표현한 거임. 딱히 특정 국가의 위치를 제한적으로 표현한 게 아니라", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.26 21:22", "comment_id": "reply_li_17157472", "parent_comment_id": "comment_li_17151149"}, {"writer": "도그풋", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/18NCQsvrAhLr-Qf-viI19wORSUGWYTn5_", "date": "06.26 19:12", "comment_id": "comment_li_17151550", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "저런식으로 몇번이고 문명 퇴화하고 완전 세기 말 된건가", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/10FLN62Y8qnV6w3dBAWAjXYYCU6usVvS0", "date": "06.26 19:56", "comment_id": "comment_li_17153572", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "기억이 맞다면 엄청나게 발전한 초고대 문명 - 멸망 - 적당히 발전한 문명 - 멸망 - 소종여 대충 이 순서인데 아마 적당히 발전한 문명 때쯤의 이야기인듯", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/10FLN62Y8qnV6w3dBAWAjXYYCU6usVvS0", "date": "06.27 09:42", "comment_id": "reply_li_17180162", "parent_comment_id": "comment_li_17153572"}, {"writer": "만갤러23(58.226) (58.226)", "text": "종말여행이 시작된다", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 20:35", "comment_id": "comment_li_17155189", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1RHvf8B1663YN-_Tn3oJ8FDnb8bs-3dp1", , "parent_comment_id": ""}, {"writer": "젤킹", "text": "역대최고걸작입니다...  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/15hnJL20a2Oes2C4oSiEcJqO9tpKx-0B3", "date": "06.26 23:19", "comment_id": "comment_li_17162486", "parent_comment_id": ""}, {"writer": "미쿠다요", "text": "", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/15hnJL20a2Oes2C4oSiEcJqO9tpKx-0B3", "date": "06.26 23:21", "comment_id": "comment_li_17162585", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "유튜브 본픽 한동훈 뒤에 있는 세력의 실체 검색하라. 그럼 그의 정체가 무엇인지 이해될 것임. 그가 왜 한국5천만 전국민 국론분열로 몰았는지를 보라.아무나지지／선출치마라．망국으로가는첩경임．어제는공산/사회주의체제 국가인 주적 북한이 자유대한민국을 기습남침한 625임. 5천만 한국국민들은 제2의 625는 언제든 발발할 수 있는 휴전 분단상태임을 절대 잊지마라. 북한은 지금도한국적화하려고 남침땅굴파고 있음. \"전쟁/반국가세력=빨갱이/간첩들의 내란\"은 예고없이 발발함. 또한 한국내 소수 반국가세력과 북한 중공 4천만 댓글부대가 지금껏여전히 한국적화 선동／공작하고 있는 실정임.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:41", "comment_id": "comment_li_17163733", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내공산/사회주의 이념표방 정당과 더불빨갱이당 지지/선출하는 무개념 정신나간 연령불문 한국국민들, 특히 한국여성들 보라. 너희한국적화되면 북한 중공 빨갱이들의 성노예됨. 또한 적화되면 한국전국민 개죽음학살당함. 지금 한국적화 코앞임.나는 솔로 갤러리 의사도 헬트한테 안되는거봐라 섹션에 초등생이상정상／상식수준지능있다면아주이해하기쉽게３-１０분분량적어두었으니 \"한국적화위기경고\"글 최대한 널리 빨리 많이 한국전국민들이 단1명도 예외없이 볼 수 있도록 한국내 모든 인터넷 사이트, 모든 국민들에게 전파하라. 자유냐 공산이냐=사느냐 죽느냐문제임． 중간없고 시간없다.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163738", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "북한 중공내 한국간첩실증명단 확보발표시 수십년간 전국민 우롱하며, 적화로 5천만 한국국민들 죽이려한 너희， 전세계 어디도 도망칠곳없다.한국내”소수“반국가세력너희가전국민적화로죽이려했듯，너희가반드시그꼴될것임．５천만국민들의극대노공분을어찌피할수있으랴．너희가자초한참혹한최후인데누굴탓할수있으랴．절대추호도용서없다．각오들하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163742", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 소수 반국가세력[빨갱이/간첩-이들은 한국국민 절대 아님]을 5천만 한국국민들 너희가 피아식별 못하면, 전국민 개죽음학살당함. 자유월남은 국가내 반국가세력때문에 무너진 것임. 명심하라.이미 한국내 거의 모든 빨갱이들 드러난 상황임. 왜 모름? 정상/상식적 국가관으로 조금 관심있게 살펴보면 그들을 바보 아닌 이상, 누구나 거의 어느 정도 식별가능함. 무관심했던 너희 탓일뿐임”유사시“는군경이한국국민모두보호못함．\"유사시\"때는 각개인 일반국민들모두 살기위해 물리력총동원해싸워야함. 누가 아군인지 적인지 그때모른다면,개죽음당함．그동안뭐한것임？그것을경고하기위함임．절대글지우지마라．정신 못차린 한국5천만국민들 봐야하기때문임", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:42", "comment_id": "comment_li_17163748", "parent_comment_id": ""}, {"writer": "ㅇㅇ(221.150) (221.150)", "text": "정신병원 가봐라", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 01:56", "comment_id": "reply_li_17221011", "parent_comment_id": "comment_li_17163748"}, {"writer": "ㅇㅇ", "text": "오와루마데와 오와라나이요 푸포파포파포파파", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/10FLN62Y8qnV6w3dBAWAjXYYCU6usVvS0", "date": "06.27 00:09", "comment_id": "comment_li_17165361", "parent_comment_id": ""}, {"writer": "ㅇㅇ(220.117) (220.117)", "text": "함장 씨발련 개트롤짓해놓고 뻔뻔한거 죽여버리고싶노", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 02:25", "comment_id": "comment_li_17170788", "parent_comment_id": ""}, {"writer": "여름밤하늘", "text": "세계관 첨 보는데 잠수함 내에 남녀가 같이 있네?  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/15hnJL20a2Oes2C4oSiEcJqO9tpKx-0B3", "date": "06.27 03:32", "comment_id": "comment_li_17173008", "parent_comment_id": ""}, {"writer": "사샤쨩", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/18IEPtHc48rOUScz0EwamwnfgSW63SKQM", "comment_img": "https://lh3.googleusercontent.com/d/15hnJL20a2Oes2C4oSiEcJqO9tpKx-0B3", "date": "06.27 04:24", "comment_id": "comment_li_17174438", "parent_comment_id": ""}, {"writer": "ㅇㅇ(169.210) (169.210)", "text": "함장 씹년 아님?ㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 04:57", "comment_id": "comment_li_17175126", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1ka3yvdb6edUgnbyWsQvPL1HfK d/1tVGgN_v4270u1lOGDhnIObDlCThn7BCi", "date": "06.27 15:51", "comment_id": "comment_li_17193291", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이렇게 한국5천만전국민 공익을 위한 취지의 글을 왜 삭제하겠느냐? 삭제하는 그들 실체가 그렇다면 명확하지 않느냐? 이미 한국5천만 전국민들 단1번도 못볼 글이 아니어야함. 그럴정도로 수없이 전파했음.그럼에도 못본 한국국민들 많지 않느냐? 한국국민들 너희 바보들인가.지금껏 수없이 경고해왔던 글임. 그럼에도 빨갱이들이 계속 삭제／차단함. 이 현상 목격한 한국국민들 많으니 증언하라．왜이렇게재차강조하는지그이유아직도모른다면，그는전세계공인된저지능임．또는자유대한민국국민절대아님．한국내 \"소수\"반국가세력=빨갱이/간첩들 그토록 악랄하고 사악함. 절대 그런 그들 믿지마라.”분단이후，수십년째임“．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:28", "comment_id": "comment_li_17196692", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "jtbc, mbc 아직도 보고있다? 아직도청취한다？그들 정체?좌파=빨갱이/간첩=반국가세력뿐 없음. 자유대한민국을 망국으로 이끄는 대표적 친종북친중 공산/사회주의적사회흐름조장하는 선동방송사임.전라도인만을위한,전라도를위한 방송사임.이런 선동방송언론만 보다보니,전라도너희가 극좌된것임.민노총［민노총＝골수빨갱이／간첩들임］산하언론노조＝빨갱이／간첩들이장악한방송언론들을 보이콧하지 않는한, 극좌 못벗어남.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:29", "comment_id": "comment_li_17196696", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 활보하는 소수 반국가세력+ 북한 중공 간첩 잡으라. 한국국민들 너희, 그들로 인해 적화되어 5천만 전국민 개죽음학살당함. 한국여성들은 적화되면 북한 중공 빨갱이들의 성노예됨.인터넷상에서는 한국내 소수 반국가세력+북한 중공4천만 댓글부대 대놓고 활동하니 그런 그들 식별하라．이런 적화 코앞 심각한 위기 현실을 한국 전국민들에게 알리기 위한 취지의 \"한국적화위기경고\"글임. 이 짧은 한국적화위기경고글 \"있는 내용 그대로만 복사후\"최소１０인이상에게최대한 널리 빨리 많이 전파하라.판단은글전달받은국민들몫임．시간없다. 한국국민들이 소수 반국가세력 식별못하면, 추후 유사시 그들때문에 적화되면 개죽음학살됨.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:29", "comment_id": "comment_li_17196699", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "5천만 한국국민들이 당장정신차리고 모두합세해서 한국내 빨갱이/간첩 잡는게 쉬운가. 멍청하게 유사시가 될때까지 정신 못차리다, 전국민 개죽음학살 목전에 이르러 피투성이 불구가 되어서야 정신차릴 것인가. 당장 정신 차리고 한국적화 막으라. 이미 한국내 \"소수\"반국가세력 가이드라인은 명확히 있고 대놓고 활동하는 그들 또한 소수임이 드러난 상황임. 무엇이 어려운가. 잡기만 하면 됨. 지금 고의로 국가 안보/첩보기관 해체시키는 그들 보라. 왜 모르나. 국가기관만 믿지 말고, 각계각층출신의 ”적화싫은“ 한국5천만 국민들이,적화로 전국민죽이려는 그들명단 작성해 국민들에게 전파하라.이미 국가기관내 침투한 빨갱이/간첩 많음. 그들 조사/색출해 내야함.시간없다. 전파하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 17:29", "comment_id": "comment_li_17196701", "parent_comment_id": ""}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "@ㅇㅇ(175.213) 벼어어어어어어엉신~~~~", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.27 19:15", "comment_id": "reply_li_17201416", "parent_comment_id": "comment_li_17142700"}, {"writer": "ㅇㅇ(221.150) (221.150)", "text": "정신병원이나 가라 ㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.28 01:56", "comment_id": "reply_li_17221031", "parent_comment_id": "comment_li_17196701"}, {"writer": "별랜", "text": "허무한 맛이 괜찮구만~", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Jf4MJewNkK36TPChbGFMsVNsSuOwZs_m", "date": "06.28 01:40", "comment_id": "comment_li_17220172", "parent_comment_id": ""}, {"writer": "별랜", "text": "아니 1화?? 단편이 아니라니...", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Jf4MJewNkK36TPChbGFMsVNsSuOwZs_m", "date": "06.28 01:40", "comment_id": "reply_li_17220190", "parent_comment_id": "comment_li_17220172"}, {"writer": "ㅇㅇ(211.235) (211.235)", "text": "@ㅇㅇ(175.213) 땅크로 자국민 밀어버린 독재자랑 계엄령 내린 새끼 지지하는 새끼가 짱깨 아니면 누가 짱깨임?ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ 누구보다도 짱깨스타일을 좋아하는거 같은데 혹시 좆족이노? ㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.26 18:13", "comment_id": "reply_li_17148830", "parent_comment_id": "comment_li_17142700"}, {"writer": "AI", "text": "@ㅇㅇ(175.213) 시진핑 마오쩌둥 개씨발새끼라는 말에 긁혀서 바로 패드립 박으시는 대국 중공 출신 똑똑한 175.213님께서 누추한 한국 저능아들 상대하신다고 고생이 많으십니다~~~ㅋ", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1hJoMY-l1T6NmLU6df055zIAMs04qiDBO", "date": "06.26 18:13", "comment_id": "reply_li_17148833", "parent_comment_id": "comment_li_17142700"}, {"writer": "AI", "text": "@ㅇㅇ(175.213) 시진핑 마오쩌둥 개씨발새끼라는 말에 긁혀서 바로 패드립 박으시는 대국 중공 출신 똑똑한 175.213님께서 누추한 한국 저능아들 상대하신다고 고생이 많으십니다~~~ㅋ", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1hJoMY-l1T6NmLU6df055zIAMs04qiDBO", ups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
