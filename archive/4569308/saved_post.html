"개 이쁘게 나오네", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 08:45"}, {"writer": "ㅇㅇ(183.96) (183.96)", "text": "지금으로 봐선 왜 정말 큰 한방이라는 건지 모르겠는데, 나중에 야요이가 크게 당하겠군", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 08:54"}, {"writer": "만갤러4(223.38) (223.38)", "text": "고쿠료야요이가 본 이상 이새끼 뒤질때까지 쫒아올듯", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 08:56"}, {"writer": "육이", "text": "유메가 성장했다는것을 알았으니까 토키코가 이제 야오이필요없어져서 아빠살려주는 방법듣고 통수지지않을까", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 09:16"}, {"writer": "ㅇㅇ", "text": "근데 유메 각성자체도 계획이었어서", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 10:45"}, {"writer": "만갤러4(223.38) (223.38)", "text": "재밌다", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 08:56"}, {"writer": "육이", "text": "아니 그러면 챠챠도 공존하는건가? 챠챠돌아올수있음?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 08:58"}, {"writer": "숫냥이", "text": "우라바이트 없이 모두가 살아나는 if 세계 엔딩 나지 않는 이상 살아나지는 않을듯", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 15:25"}, {"writer": "ㅇㅇ", "text": "ㄷㄷ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 09:06"}, {"writer": "ㅇㅇ", "text": "챠챠 죽진 않았을텐데 돌아오는 건가", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 09:16"}, {"writer": "응웅앵", "text": "차차도 살아잇을까?", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 09:17"}, {"writer": "밥던똥", "text": "ㄷㄷ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 09:21"}, {"writer": "만갤러5(122.38) (122.38)", "text": "저주 의식따라 간거아님?", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 09:27"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "시리어스 꿀잼", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 09:28"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "완결나면 정발판도 살듯 너무재밌어", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 09:32"}, {"writer": "양말", "text": "@ㅇㅇ(223.38) 정발했어?", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 10:17"}, {"writer": "세엑스피스톨즈", "text": "@ㅇㅇ(223.38) 비밀알바로 2권까지 정발하고 찍쌈", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 10:39"}, {"writer": "ㅇㅇ(221.141) (221.141)", "text": "얘는 진짜 에피소드가 옴니버스 스타일인데 알고보니 다 이어지는 맛이 쏠쏠함", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 09:29"}, {"writer": "ㅇㅇ(106.146) (106.146)", "text": "챠챠는 살아난거?", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 09:38"}, {"writer": "pinkhip.", "text": "토키코 의식이 고쿠료랑 반반이라는거보면 나중에 토키코가 통수쳐버리는거 아니냐", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 09:39"}, {"writer": "이케나나시", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1qwhjqP451Pz5WEUfInWHvun4v9u8Y3it", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 09:46"}, {"writer": "여름밤하늘", "text": "유메는 저주 영상 보네?  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 09:50"}, {"writer": "ㅇㅇ", "text": "끝까지 보지만 않으면 상관없는듯함그래서 잡은 고쿠료는 강제로 보게 눈 억지로 뜨게만들고있고자기들은 눈감아서 괜찮은듯아마 도망간 다른 직원들도 괜찮을듯?", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 10:08"}, {"writer": "여름밤하늘", "text": "@ㅇㅇ 아하   - dc App", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 10:08"}, {"writer": "ㅇㅇ(147.47) (147.47)", "text": "애초에 저 아저씨만 안보면 상관없는데 유메니까 아저씨 나올때면 9처럼 눈감으면 됨", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 11:00"}, {"writer": "ㅇㅇ", "text": "토키코 통수각 보겠네  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 10:10"}, {"writer": "ㅇㅇ(221.164) (221.164)", "text": "이거 최신화에서 능력자배틀됨", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 10:15"}, {"writer": "평민", "text": "설마 한동안 계속 다른 고쿠료 야요이들 사냥하러 다니는건가 ㅋㅋ 뭔가 여러개 몸 가지고 있을것같은 느낌", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1xgyVTLDHfNVWOLsc35Xa3CRqKH3wbf9k", "date": "05.30 10:30"}, {"writer": "만갤러6(211.246) (211.246)", "text": "비디오 저주가 증폭됐다는게 무슨말인지 모르겠다", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 11:00"}, {"writer": "만갤러6(211.246) (211.246)", "text": "전편보면 \"마지막 비디오\"를 본 사람만 저주받는다. 마지막 비디오만 안보면 괜찮다. 마지막 비디오를 복제해야된다. 이렇게 말하고 이번에도 마지막비디오라는것에 초점을 맞추는데 그럼 쟤가 가지고 있던 \"마지막 비디오\"말고 판매상에게 줬던 다른 비디오들은 평범한 비디오가 됐다는거잖아. 그럼 그동안 본사람이 없었다는걸텐데 왜 저주가 증폭되었다고 한거지?", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 11:06"}, {"writer": "ㅇㅇ(147.47) (147.47)", "text": "마지막 비디오를 보면 쌓인 스택에 뒈진다는 뜻이고 스택은 복제된 평범한 비디오들만 봐도 쌓이나봄실시간으로 마지막이 아니게되는 비디오를 보는데도 증폭은 된거니까", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 11:13"}, {"writer": "만갤러6(211.246) (211.246)", "text": "@ㅇㅇ(147.47) \"쿄코가 마지막 비디오를 숨겨두고 있었으니 그 연쇄는 계속 이어져서 지금은 무서울 정도의 저주가 되어있을 거야\" 비디오를 숨겨두고 있었다는게 저주가 강해진 원인인것처럼 말하는데 그냥 늬앙스 차이인가?", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 11:17"}, {"writer": "ㅇㅇ(147.47) (147.47)", "text": "@만갤러6(211.246) 여러가지로 말이 되는 경우가 있는거같은데터지면 사라지고 다시 쌓이는 스택이라 마지막 꽁쳐놔서 스택을 아무도 못터트리고 복제된거로 스택은 주구장창 쌓였단 얘기거나사라지는 스택은 아닌데 스택이 너무 쌓이면 뒈지거나 다른 모종의 이유로 유통이 불가능해진다거나", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 11:23"}, {"writer": "ㅇㅇ(220.74) (220.74)", "text": "게임 같은 데도 이런 거 봤던 거 같음 뭔가 디버프나 버프로 스택 존나 쌓은 다음에 큰 기술 한 방 날려서 싹 쓸어버리는 오르가즘 ㅈ되는 플레이 느낌ㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 13:21"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "@만갤러6(211.246) [완벽한설명]쿄코가 반납한 다른 비디오들은 세월이 흐른만큼 일부는 복사당해 퍼져나감과 동시에 일부는 저주로 계속 쓰여왔을 것. 쿄코가 삥땅친 비디오는 과거에 복제되긴했지만 마지막 비디오라 어쨌든 저주로는 유효하고, 긴 세월간 다른 마지막 비디오들이 이뤄놓은 저주 경험치까지 받아서 파워업한거임", "is_reply": true, "dccon": "", "comment_img": "", "date": "05.30 22:01"}, {"writer": "Figue", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1sMTNAJAGoJJrb7Jh0LPpSVwiS2XwuaTq", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 11:03"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "진 선글라스 쓰니까 왤케 범부같냐", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 11:04"}, {"writer": "ㅇㅇ(147.47) (147.47)", "text": "기상관측에서 애비 죽으니까 진심으로 좆같아하는거 같았는데 애비 살리고 싶어하는건 맞을듯?", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 11:14"}, {"writer": "Ketron", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1XbDn4DQPMVO6WapqpGIA2_SaWu-xOhfS", "comment_img": "https://lh3.googleusercontent.com/d/1noN47cf2xj78RT3BxuHfhuv4XjWIH0Sw", "date": "05.30 11:21"}, {"writer": "ㅇㅇ(175.127) (175.127)", "text": "개재밌자나", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 11:22"}, {"writer": "만갤러7(106.101) (106.101)", "text": "저주 성공이라는 거 보면 언젠가 야요이 덮치겠네", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.30 11:25"}, {"writer": "Posyel", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1UD8xybjfXO7pH64c2k_YAPK4CMU0lzzI", "comment_img": "https://lh3.googleusercontent.co currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
