일영구권의 수준 차이가 이렇게 컸던가", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1YSV_enLNbOmxpKH3vN87zspka4U9NTPG", "date": "06.10 22:18"}, {"writer": "ㅇㅇ(14.7) (14.7)", "text": "쟤가 일영구권 하위권임. 양산박은 최소라인이 저쪽 중간라인.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.10 22:37"}, {"writer": "ㅇㅇ(125.241) (125.241)", "text": "쟤가 사실상 이치에이큐켄 첫빠따&2판 연속 코우에츠지한테 지면서 최약체로 점치는 놈이긴 함.(엄밀히 따지면 바소게츠가 첫빠따는 맞는데 걘 당시 그 설정 넣기 전&연출 뻥뛰기전이라서 그냥 바켄세랑 호각으로 싸웠지만 패했다 정도임.)심지어 같은 약체로 꼽히는 디에고는 패배는 했는데 걔는 쇼맨십에 미친 놈이라는 패널티는 있는데 쟨 그런거 없음", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.10 22:40"}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "일단 저놈들중에서 무적초인 잡을만한놈이 없음오죽하면 지들이 하는게 아니라 연장파 대빵을 대려다가 발묶기를 시전할정도면...", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.10 22:48"}, {"writer": "만갤러11(59.9) (59.9)", "text": "양산박은 영감 제외 죄다 1티어고 일영구권은 0티어~2티어 포진", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.10 23:00"}, {"writer": "연오", "text": "@ㅇㅇ(125.241) 하긴 홈그라운드에서도 코우에즈치한테 깨졌으니", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1YSV_enLNbOmxpKH3vN87zspka4U9NTPG", "date": "06.10 23:01"}, {"writer": "ㅇㅇ", "text": "@ㅇㅇ(118.235) 할배급은 오히려 큐겐쪽이 권마사신 미쿠모 둘이었음 둘 다 잘쳐줘야 동급 정도긴하겠다만", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1oZvwGIQDZpVSDAC_hlqzzR2oqAo9W1e9", "date": "06.10 23:04"}, {"writer": "ㅇㅇ(114.199) (114.199)", "text": "@ㅇㅇ(118.235) 일영구권에 초인 둘있고 무기조에 초인하나 있고 압도적인 전력임.달인맘 쳐도 양산박 몇배됨", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.10 23:12"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
