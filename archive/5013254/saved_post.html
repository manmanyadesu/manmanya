mment_img": "", "date": "06.26 16:59", "comment_id": "reply_li_17145214", "parent_comment_id": "comment_li_17135730"}, {"writer": "ㅇㅇ(106.242) (106.242)", "text": "한국은 수급자는 식량은 풍족하게 받는다. 근데 그게 맛없다고 안먹고 버림.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.26 17:09", "comment_id": "reply_li_17145579", "parent_comment_id": "comment_li_17135730"}, {"writer": "ㅇㅇ(121.183) (121.183)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1X5AlsbJny-TjfYb5SPTztKGNSUE3Dowe", "comment_img": "", "date": "06.26 12:40", "comment_id": "comment_li_17135770", "parent_comment_id": ""}, {"writer": "ㅇㅇ(182.227) (182.227)", "text": "대 근 담", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 12:40", "comment_id": "comment_li_17135786", "parent_comment_id": ""}, {"writer": "ㅇㅇ(39.7) (39.7)", "text": "만화는 재밌어", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 12:40", "comment_id": "comment_li_17135790", "parent_comment_id": ""}, {"writer": "ㅇㅇ(58.236) (58.236)", "text": "왜 고아들은 디자인이 비슷한거냐?", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 12:41", "comment_id": "comment_li_17135808", "parent_comment_id": ""}, {"writer": "만갤러7(14.42) (14.42)", "text": "왜냐면 터치할 어른이 없으니 주변 애들 보고 따라하기 때문이야", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.26 12:50", "comment_id": "reply_li_17136141", "parent_comment_id": "comment_li_17135808"}, {"writer": "화롯불", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1CzJEnJQyXDr83kNBkxXJmYZwWL-dpjt4", "comment_img": "https://lh3.googleusercontent.com/d/19ylTIQc0yI9O5K0ubQqSXBMODiUoK9CF", "date": "06.26 12:42", "comment_id": "comment_li_17135840", "parent_comment_id": ""}, {"writer": "만갤러6(121.129) (121.129)", "text": "요즘 식빵은 꼬다리 없이 만들더라 낭만 뒤진 더러운 자본주의 돼지들...", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 12:44", "comment_id": "comment_li_17135921", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
