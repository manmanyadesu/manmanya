은 정발작이라 일부러 안건드리는거같은데 만갤 지금 vpn으로 글 못씀", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.12 20:59", "comment_id": "reply_li_17954241", "parent_comment_id": "comment_li_17953328"}, {"writer": "만갤러142(221.143) (221.143)", "text": "원펀맨 원작은 작가가 지 블로그에 취미삼아 무료로 올리는거고헌헌은 출판사와 엮여있는거고", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 02:07", "comment_id": "reply_li_17967435", "parent_comment_id": "comment_li_17953328"}, {"writer": "ㅇㅇ(175.121) (175.121)", "text": "클로드 해석본", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.12 20:47", "comment_id": "comment_li_17953573", "parent_comment_id": ""}, {"writer": "ㅇㅇ(175.121) (175.121)", "text": "\"메탈릭의 속삭임이 … 공기청정기의 마음은 이곳에 없네\" - '메탈릭의 속삭임'은 귀 피어싱을 통해 흘러들어온 쿠세노의 목소리(=세뇌 명령)로 읽혀. '공기청정기'는 사이타마 집에서 밥하고 청소하던 '가전제품 같은 생활자 제노스'의 자조적 은유고, \"마음은 이곳에 없네\"는 지금 이 몸 안에 그 제노스의 마음이 부재하다는 자기 보고. 첫 대사부터 사실상 \"나는 조종당하고 있고, 진짜 나는 여기 없다\"는 상황 요약이야.\"검은 상자에 파묻힌 결과물이 복수의 공허를 감싸는…\" - '검은 상자(블랙박스)'는 조작된 기억이 든 자기 뇌, '복수의 공허'는 그의 복수 자체가 쿠세노의 자작극이었다는 게 밝혀지며 텅 비어버린 인생의 목적. 자기 존재의 근거가 무너진 상태를 말로 뱉는 거지.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.12 20:47", "comment_id": "reply_li_17953576", "parent_comment_id": "comment_li_17953573"}, {"writer": "ㅇㅇ(175.121) (175.121)", "text": "\"…폭우 속에 있는 사이타마를 죽일 결정적인 수배로 승인된 환상\" - 헛소리 한가운데에 주입된 지령('사이타마를 죽여라')이 그대로 노출되는 부분. 흥미로운 건 그 명령을 스스로 \"환상\"이라고 부른다는 것. 억눌린 본체가 이 명령이 가짜라는 걸 인식하고 있다는 암시로 읽을 수 있어.\"…인연을 짓밟아버릴 이유가 납득되지 않으면 안 되니까\" - 4번째 이미지의 이 문장이 전체에서 가장 또렷해. \"전례 없는 외부 압력(=세뇌)에 강요당해 싸우고는 있는데, 이 인연(사이타마와의)을 짓밟을 납득되는 이유가 나한테는 없다\"는 갈등의 직접 토로. 핵심 감정이 여기서 터져 나와.", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.12 20:48", "comment_id": "reply_li_17953602", "parent_comment_id": "comment_li_17953573"}, {"writer": "만갤러132(220.119) (220.119)", "text": "@ㅇㅇ(175.121) 야 이거 해석좋네", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.13 01:25", "comment_id": "reply_li_17966146", "parent_comment_id": "comment_li_17953573"}, {"writer": "샤프심" ngRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
