 그런 느낌 같기도 했음) 일본의 프로레스 또한 여기에 큰 영향을 받은 것인지 더 오래된 경기를 찾아볼수록 이렇게 엔트런스에서도 뭔가를 보여주려는 경향이 짙게 느껴졌기 때문임. 심한 경우에는 과장 좀 섞어서 청코너 입장이 1/3, 홍코너 입장이 1/3, 경기가 나머지 1/3인 경우도 있었음.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.19 03:30"}, {"writer": "ㅇㅇ(222.113) (222.113)", "text": "https://www.youtube.com/watch?v=IGFTcQYKYB0 오니타 vs 쵸노의 전류폭파 데스매치로 예를 들 수 있겠는데, 메인스트림과는 정반대의 길을 걸으며 '사도' 라는 닉네임을 얻은 오니타는 wild thing이 울려퍼지는 가운데 도쿄돔이라는 일본 프로레슬링 씬의 가장 큰 무대에서 관객들의 야유 섞인 환호를 등진 채 느긋하게 걸어들어오다가 하나미치 한가운데에서 의자를 펴고 앉아 담배를 한 대 피워제끼면서 자신이 어떤 캐릭터이고 어떤 게임플랜을 가져왔는지를 강조함. 반대로 메인스트림에서도 한 스테이블의 수장격이었던 쵸노는 시가를 꼬나문 채 허머를 끌고 나타나서는 로프 대신 전류가 흐르는 가시철선이 둘러쳐진 살벌한 링을 앞에 두고 사나이 부랄 두 쪽만 차고서 보무도 당당하게 입장.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.19 03:34"}, {"writer": "ㅇㅇ(222.113) (222.113)", "text": "이쯤 되면 눈치챘겠지만 레슬러에게 마이크를 직접 달아줄 수도 없는 이상 이러한 퍼포먼스의 오디오 파트는 당연히 먼 옛날 무성영화를 해설하던 변사의 그것처럼 고스란히 해설의 몫으로 떨어졌고, 위에 링크 건 영상을 보면 바로 알겠지만 일프쪽 아나운서들은 예나 지금이나 선수가 입장할 때 '이것은 더 이상 경기가 아니다. 이념과 이념이 부딪히는 싸움이다아앗!(wk13 케니 오메가 vs 타나하시 히로시였던 걸로 기억함)' 하는 식으로 정말 있는 표현 없는 미사여구 죄다 갖다붙이면서 시청자들의 귀를 즐겁게 해주고 있음. 바키 특유의 뭐만 하면 ~~다아아아앗! 하고 호들갑떠는 코멘트가 이 동네에서는 디폴트기도 하고.", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.19 03:35"}, {"writer": "ㅇㅇ(222.113) (222.113)", "text": "여기에는 이미지에 목숨줄이 달렸다 해도 과언이 아닌 프로레슬링의 특이성도 한몫하는데 이 주제를 다루려면 해설이라는 존재가 맡는 역할과 그 지분에 대해서까지 다뤄야 하겠지만 이야기가 너무 길어질 것 같아 생략하겠음. 솔직히 너무 장대한 주제라서 내 깜냥으로는 글발이 서지도 않음 ㅜㅜ아무튼 이런 동네 출신인 캐릭터가 능력만은 업계 초일류라는 설정이라면 앞으로도 작가의 상상력이라는 한도 안에서 저런 멘트가 술술 튀어나올 것임. 나처럼 어중간한 일프 팬들에게도 너무 익숙한 맛이어서 놀라울 정도인데 아마 진짜 올드팬일수록 신선함이 더할 듯. 저번 에피소드에서 선수가 입장할 때 뜬금없이 또르륵 하고 감읍한 할배 역시 아무래도 이노키 선생님께서 현역으로 뛰시던 황금시대가 떠올라서 그런 게 아닐까...", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.19 03:38"}, {"writer": "연오", "text": "더 쓸데없는것도 좋으니까 아는거 다 이야기해달라고!!!!", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1G7ExsG2pTlZ4isx0dugACA6VqAYgo9WT", "date": "06.19 03:52"}, {"writer": "만갤러18(14.53) (14.53)", "text": "해설좌의 지식은 진짜 미식이구나.. rse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
