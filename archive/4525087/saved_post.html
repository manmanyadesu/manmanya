reply": false, "dccon": "", "comment_img": "", "date": "05.27 13:51"}, {"writer": "쿠이쿠이", "text": "10일 뒤 죽는 피노", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1VLskMpPYy5utyzmHw7JipJgFE8xj1_WL", "date": "05.27 15:36"}, {"writer": "ㅇㅇ(1.226) (1.226)", "text": "채색 왜캐 이쁘냐", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.27 17:18"}, {"writer": "만붕만붕(211.201) (211.201)", "text": "마음을 얻게 되면서 수명도 생기는 것일까?", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.27 17:42"}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "죽음을 자각한 피노가 마음을 가지게 된다라... 첫 피노가 생명이 명멸하는 공간에서 만들어 진 점은 우연이 아니겠군.", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.27 17:49"}, {"writer": "만갤러12(39.114) (39.114)", "text": "와 시1발 나 진짜 눈물나옴. 인간처럼 \"목숨\" \"한정된 시간\" 가지니까 \"마음\"이 생긴다.........캬 시1발", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.27 17:57"}, {"writer": "만붕만붕(211.201) (211.201)", "text": "바이센터니얼맨 생각나네. 끝없이 인간이 되기를 추구했던 로봇은 결국 수명을 가지게 된다는...", "is_reply": false, "dccon": "", "comment_img": "", "date": "05.27 18:13"}, {"writer": "ㅇㅇ(121.140) (121.140)", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/1oB_7kFWb1HpiRpVkevOkPIrxmBfJ1TQM", "comment_img": "", "date": "05.27 23:08"}, {"writer": "ㅇㅇ", "text": "", "is_reply": false, "dccon": "", "comment_img": "", "date": ""}, {"writer": "ㅇㅇ(14.45) (14.45)", "text": "그래서언제나옴다음화는", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.01 03:07"}, {"writer": "세념의R.A.N.", "text": "이제 '피노(모델명 PO3-385)'에게 남은 시간은 약 '249시간 15분 = 10일 하고도 9시간 15분'", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1Yr3lnk_mQKf4Js8MohFges7_RwovE46E", "date": "06.01 14:19"}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null; rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); } else { if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
