JLvbhXa_H1jy", "date": "07.08 09:52", "comment_id": "comment_li_17746737", "parent_comment_id": ""}, {"writer": "만갤러7(175.125) (175.125)", "text": "당시 검술 비기라 불리는 것들은 소위 '모르면 못 막는' 기술들이 많았음. 지금도 유튜브서 서양, 일본 검술들 보면 진짜 모르면 죽어야하는 기술들이 꽤 있음.근데 옆에서 한 두번 지켜보면 대충 원리는 이해하는 것들...그래서 옛날 무협에도 누가 수련하는거 보면 죽이는 클리셰가 있고, 실제로 일본 검술도장도 진짜 중요한 기술은 몇몇 후계자 아니면 절대로 안 가르쳐주고 실전 위험할때밖에 안 씀. 새어나가면 위력이 반감되니까", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 11:25", "comment_id": "reply_li_17748997", "parent_comment_id": "comment_li_17746737"}, {"writer": "퐁당쇼콜라", "text": "@만갤러7(175.125) 초견이면 무조건 죽이는 필살이지만 알면 얼마든지 대처 가능한 그정도구나", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vI4032pQuXaV11tjvKW4JLvbhXa_H1jy", "date": "07.08 11:33", "comment_id": "reply_li_17749208", "parent_comment_id": "comment_li_17746737"}, {"writer": "kola", "text": "머리띄우기술같은거지", "is_reply": true, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vI4032pQuXaV11tjvKW4JLvbhXa_H1jy", "date": "07.08 12:57", "comment_id": "reply_li_17751639", "parent_comment_id": "comment_li_17746737"}, {"writer": "ㅇㅇ(121.140) (121.140)", "text": "그렇겠네, 어짜피 그 시대의 무사들이라면 기본기는 성장과정에서 다 다져졌고, 이제 남은건 그걸 어떻게 실전에서 활용하느냐인데, 저런 ~류 xx류 기술들이 전부 실전을 상정한 변환초식들이니, 한번 보는것 만으로도 센스있는 무사는 충분히 카피하고도 남겠네 ㅇㅇ", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 13:18", "comment_id": "reply_li_17752326", "parent_comment_id": "comment_li_17746737"}, {"writer": "ㅇㅇ(121.140) (121.140)", "text": "말하자면 마술사들이 남의 마술 트릭들 한번 훔쳐보고 '아 그거였노 ㅋㅋ' 하고 카피하는거랑 비슷한거네", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 13:19", "comment_id": "reply_li_17752354", "parent_comment_id": "comment_li_17746737"}, {"writer": "만갤러8(155.2) (155.2)", "text": "현실 철권의 시대 ㄷㄷ;;", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 13:36", "comment_id": "reply_li_17752779", "parent_comment_id": "comment_li_17746737"}, {"writer": "ㅇㅇ(14.51) (14.51)", "text": "@만갤러7(175.125) 하긴 거합술도 처음에는 비기였다더라", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 14:08", "comment_id": "reply_li_17753792", "parent_comment_id": "comment_li_17746737"}, {"writer": "ㅇㅇ(121.135) (121.135)", "text": "모르면 죽는 시대라 상향 평준화가 안됨", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 16:59", "comment_id": "reply_li_17758880", "parent_comment_id": "comment_li_17746737"}, {"writer": "축구의 신 메시(112.219) (112.219)", "text": "@ㅇㅇ(121.135) ㄹㅇ기술 종류가 늘수록 다른거 다알고 그거 모르는 애들이 죽을테니...", "is_reply": true, "dccon": "", "comment_img": "", "date": "07.08 18:37", "comment_id": "reply_li_17762105", "parent_comment_id": "comment_li_17746737"}, {"writer": "만갤러5(221.147) (221.147)", "text": "질풍검 하니까 무지나느낌", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.08 09:53", "comment_id": "comment_li_17746774", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "검격  시원시원하게 잘그리네", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1kuphG3IuzpM-uCuAn-tC8KDjpZ0ZS008", "date": "07.08 10:05", "comment_id": "comment_li_17747111", "parent_comment_id": ""}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "재미가 약간 있습니다", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.08 10:22", "comment_id": "comment_li_17747498", "parent_comment_id": ""}, {"writer": "개미친엉살", "text": "아무리봐도 주인공 속눈썹도 있고 여자같네 아흐 귀여워", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vI4032pQuXaV11tjvKW4JLvbhXa_H1jy", "date": "07.08 10:30", "comment_id": "comment_li_17747659", "parent_comment_id": ""}, {"writer": "oo(69.242) (69.242)", "text": "카게류 음류가 아니라", "is_reply": false, "dccon": "", "comment_img": "", "date": "07.08 10:33", "comment_id": "comment_li_17747776", "parent_comment_id": ""}, {"writer": "단코", "text": "어우 구수해", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1vI4032pQuXaV11tjvKW4JLvbhXa_H1jy", "date": "07.08 10:35", "comment_id": "comment_li_17747807", "parent_comment_id": ""}, {"writer": "윾동닉 p = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
