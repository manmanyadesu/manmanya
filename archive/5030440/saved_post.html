찌피할수있으랴．너희가자초한참혹한최후인데누굴탓할수있으랴．절대추호도용서없다．각오들하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 21:10", "comment_id": "comment_li_17206571", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 5천만전국민대비 소수 반국가세력[빨갱이/간첩-이들은 한국국민 절대 아님]을 5천만한국국민들 너희가 피아식별 못하면,전국민 개죽음학살당함.자유월남은 국가내 반국가세력때문에 적화된것임.명심하라.이미 한국내 거의모든 빨갱이들 드러난상황임.왜 모름?정상/상식적 국가관으로 조금 관심있게 살펴보면 그들을 바보아닌 이상, 누구나어느정도 식별가능함.무관심했던 너희탓일뿐임”유사시“때는군경이한국국민모두보호못함\"유사시\"때는 각개인일반국민들모두 살기위해 물리력총동원해싸워야함.누가 아군인지 적인지 그때모른다면,개죽음당함그동안뭐한것임？그것을”최후경고“하기위함임．절대글지우지마라．정신 못차린 한국5천만국민들 봐야하기때문임", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 21:10", "comment_id": "comment_li_17206580", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "이렇게 한국5천만전국민 공익을 위한 취지의 글을 왜 삭제하겠느냐? 삭제하는 그들 실체가 그렇다면 명확하지 않느냐? 이미 한국5천만 전국민들 단1번도 못볼 글이 아니어야함. 그럴정도로 수없이 전파했음.그럼에도 못본 한국국민들 많지 않느냐? 한국국민들 너희 바보들인가.지금껏 수없이 경고해왔던 글임. 그럼에도 빨갱이들이 계속 삭제／차단함. 이 현상 목격한 한국국민들 많으니 증언하라．왜이렇게재차강조하는지그이유아직도모른다면，그는전세계공인된저지능임．또는자유대한민국국민절대아님．한국내 \"소수\"반국가세력=빨갱이/간첩들 그토록 악랄하고 사악함. 절대 그런 그들 믿지마라.”분단이후，수십년째임“．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 21:11", "comment_id": "comment_li_17206587", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "jtbc, mbc 아직도 보고있다? 아직도청취한다？그들 정체?좌파=빨갱이/간첩=반국가세력뿐 없음. 자유대한민국을 망국으로 이끄는 대표적 친종북친중 공산/사회주의적사회흐름조장하는 선동방송사임.전라도인만을위한,전라도를위한 방송사임.이런 선동방송언론만 보다보니,전라도너희가 극좌된것임.민노총［민노총＝골수빨갱이／간첩들임］산하언론노조＝빨갱이／간첩들이장악한방송언론들을 보이콧하지 않는한, 극좌 못벗어남.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 21:11", "comment_id": "comment_li_17206593", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 활보하는 소수 반국가세력+ 북한 중공 간첩 잡으라. 한국국민들 너희, 그들로 인해 적화되어 5천만 전국민 개죽음학살당함. 한국여성들은 적화되면 북한 중공 빨갱이들의 성노예됨.인터넷상에서는 한국내 소수 반국가세력+북한 중공4천만 댓글부대 대놓고 활동하니 그런 그들 식별하라．이런 적화 코앞 심각한 위기 현실을 한국 전국민들에게 알리기 위한 취지의 \"한국적화위기경고\"글임. 이 짧은 한국적화위기경고글 \"있는 내용 그대로만 복사후\"최소１０인이상에게최대한 널리 빨리 많이 전파하라.판단은글전달받은국민들몫임．시간없다. 한국국민들이 소수 반국가세력 식별못하면, 추후 유사시 d) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
