y": true, "dccon": "", "comment_img": "", "date": "12.10 16:30", "comment_id": "reply_li_3072610", "parent_comment_id": "comment_li_2977120"}, {"writer": "쉬불탱", "text": "죽일만했노 ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1LQLW1vJe6yXFB1nfCZixPlTiuXn90FeL", "date": "12.08 19:55", "comment_id": "comment_li_2980813", "parent_comment_id": ""}, {"writer": "노다니온", "text": "믿는다잖아 좆간들아", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1LQLW1vJe6yXFB1nfCZixPlTiuXn90FeL", "date": "12.08 21:49", "comment_id": "comment_li_2986351", "parent_comment_id": ""}, {"writer": "ㅇ?ㅈ", "text": "ㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1LQLW1vJe6yXFB1nfCZixPlTiuXn90FeL", "date": "12.08 22:14", "comment_id": "comment_li_2987278", "parent_comment_id": ""}, {"writer": "Chatluge", "text": "", "is_reply": false, "dccon": "https://lh3.googleusercontent.com/d/137KRsfr1JdYdVZrt6DupWM3ohCl-xA_1", "comment_img": "https://lh3.googleusercontent.com/d/1LQLW1vJe6yXFB1nfCZixPlTiuXn90FeL", "date": "12.08 22:50", "comment_id": "comment_li_2988545", "parent_comment_id": ""}, {"writer": "ㅇㅇ(39.120) (39.120)", "text": "먹는거냐", "is_reply": false, "dccon": "", "comment_img": "", "date": "12.09 01:26", "comment_id": "comment_li_2995944", "parent_comment_id": ""}, {"writer": "ㅇㅇ(223.38) (223.38)", "text": "아벨이 저지랄하니까 카인이 아벨죽이니까 야훼가 카인한테 버프걸어준거였노 ㅋㅋㅋㅋㅋㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "12.09 11:50", "comment_id": "comment_li_3011270", "parent_comment_id": ""}, {"writer": "ㅇㅇ(121.101) (121.101)", "text": "맛있고 건강에 좋은 걸 먹는데 뭐가 문제라는 거냐!!", "is_reply": false, "dccon": "", "comment_img": "", "date": "12.09 12:41", "comment_id": "comment_li_3013117", "parent_comment_id": ""}, {"writer": "Stellarhazel", "text": "아벨 죽여야 한다", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1LQLW1vJe6yXFB1nfCZixPlTiuXn90FeL", "date": "12.11 18:58", "comment_id": "comment_li_3142568", "parent_comment_id": ""}]; let currentSort = 'old', commentsPerPage = 50, currentPage = 1, commentGroups = [], currentGroup = null, parentGroupsById = new Map(), pendingRepliesByParent = new Map(); rawComments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) {
            const pageBlockSize = 10;
            const currentBlock = Math.floor((currentPage - 1) / pageBlockSize);
            const startPage = currentBlock * pageBlockSize + 1;
            const endPage = Math.min(startPage + pageBlockSize - 1, totalPages);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.innerText = '<<';
                firstBtn.onclick = () => { currentPage = 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(firstBtn);

                const prevBlockBtn = document.createElement('button');
                prevBlockBtn.className = 'page-btn';
                prevBlockBtn.innerText = '<';
                prevBlockBtn.onclick = () => { currentPage = startPage - 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(prevBlockBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBlockBtn = document.createElement('button');
                nextBlockBtn.className = 'page-btn';
                nextBlockBtn.innerText = '>';
                nextBlockBtn.onclick = () => { currentPage = endPage + 1; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(nextBlockBtn);

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.innerText = '>>';
                lastBtn.onclick = () => { currentPage = totalPages; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); };
                pageArea.appendChild(lastBtn);
