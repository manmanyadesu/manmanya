 빨갱이들의 성노예됨. 또한 적화되면 한국전국민 개죽음학살당함. 지금 한국적화 코앞임.나는 솔로 갤러리 의사도 헬트한테 안되는거봐라 섹션에 초등생이상정상／상식수준지능있다면아주이해하기쉽게３-１０분분량적어두었으니 \"한국적화위기경고\"글 최대한 널리 빨리 많이 한국전국민들이 단1명도 예외없이 볼 수 있도록 한국내 모든 인터넷 사이트, 모든 국민들에게 전파하라. 자유냐 공산이냐=사느냐 죽느냐문제임． 중간없고 시간없다.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:45", "comment_id": "comment_li_17163959", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "북한 중공내 한국간첩실증명단 확보발표시 수십년간 전국민 우롱하며, 적화로 5천만 한국국민들 죽이려한 너희， 전세계 어디도 도망칠곳없다.한국내”소수“반국가세력너희가전국민적화로죽이려했듯，너희가반드시그꼴될것임．５천만국민들의극대노공분을어찌피할수있으랴．너희가자초한참혹한최후인데누굴탓할수있으랴．절대추호도용서없다．각오들하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:45", "comment_id": "comment_li_17163968", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 소수 반국가세력[빨갱이/간첩-이들은 한국국민 절대 아님]을 5천만 한국국민들 너희가 피아식별 못하면, 전국민 개죽음학살당함. 자유월남은 국가내 반국가세력때문에 무너진 것임. 명심하라.이미 한국내 거의 모든 빨갱이들 드러난 상황임. 왜 모름? 정상/상식적 국가관으로 조금 관심있게 살펴보면 그들을 바보 아닌 이상, 누구나 거의 어느 정도 식별가능함. 무관심했던 너희 탓일뿐임”유사시“는군경이한국국민모두보호못함．\"유사시\"때는 각개인 일반국민들모두 살기위해 물리력총동원해싸워야함. 누가 아군인지 적인지 그때모른다면,개죽음당함．그동안뭐한것임？그것을경고하기위함임．절대글지우지마라．정신 못차린 한국5천만국민들 봐야하기때문임", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.26 23:45", "comment_id": "comment_li_17163976", "parent_comment_id": ""}, {"writer": "ㅇㅇ(118.235) (118.235)", "text": "이딴 개소리나 지껄이는 네가 정신을 차려야 하지 않을까 ㅋㅋㅋ", "is_reply": true, "dccon": "", "comment_img": "", "date": "06.27 20:14", "comment_id": "reply_li_17203798", "parent_comment_id": "comment_li_17163976"}, {"writer": "골방철학자", "text": "진지하게 뭔가 진행되고있는데? 재밌네  - dc App", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1S9pOSwGqHjufLgNarqED6B6IcV6pw8pS", "date": "06.26 23:54", "comment_id": "comment_li_17164500", "parent_comment_id": ""}, {"writer": "ㅇㅇ(111.91) (111.91)", "text": "꾸르잼 ㅋㅋㅋ", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 01:52", "comment_id": "comment_li_17169571", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "만력 오지네", "is_re 수없이 전파했음.그럼에도 못본 한국국민들 많지 않느냐? 한국국민들 너희 바보들인가.지금껏 수없이 경고해왔던 글임. 그럼에도 빨갱이들이 계속 삭제／차단함. 이 현상 목격한 한국국민들 많으니 증언하라．왜이렇게재차강조하는지그이유아직도모른다면，그는전세계공인된저지능임．또는자유대한민국국민절대아님．한국내 \"소수\"반국가세력=빨갱이/간첩들 그토록 악랄하고 사악함. 절대 그런 그들 믿지마라.”분단이후，수십년째임“．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 18:03", "comment_id": "comment_li_17198113", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "jtbc, mbc 아직도 보고있다? 아직도청취한다？그들 정체?좌파=빨갱이/간첩=반국가세력뿐 없음. 자유대한민국을 망국으로 이끄는 대표적 친종북친중 공산/사회주의적사회흐름조장하는 선동방송사임.전라도인만을위한,전라도를위한 방송사임.이런 선동방송언론만 보다보니,전라도너희가 극좌된것임.민노총［민노총＝골수빨갱이／간첩들임］산하언론노조＝빨갱이／간첩들이장악한방송언론들을 보이콧하지 않는한, 극좌 못벗어남.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 18:03", "comment_id": "comment_li_17198115", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "한국내 활보하는 소수 반국가세력+ 북한 중공 간첩 잡으라. 한국국민들 너희, 그들로 인해 적화되어 5천만 전국민 개죽음학살당함. 한국여성들은 적화되면 북한 중공 빨갱이들의 성노예됨.인터넷상에서는 한국내 소수 반국가세력+북한 중공4천만 댓글부대 대놓고 활동하니 그런 그들 식별하라．이런 적화 코앞 심각한 위기 현실을 한국 전국민들에게 알리기 위한 취지의 \"한국적화위기경고\"글임. 이 짧은 한국적화위기경고글 \"있는 내용 그대로만 복사후\"최소１０인이상에게최대한 널리 빨리 많이 전파하라.판단은글전달받은국민들몫임．시간없다. 한국국민들이 소수 반국가세력 식별못하면, 추후 유사시 그들때문에 적화되면 개죽음학살됨.", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 18:03", "comment_id": "comment_li_17198121", "parent_comment_id": ""}, {"writer": "o o(211.106) (211.106)", "text": "5천만 한국국민들이 당장정신차리고 모두합세해서 한국내 빨갱이/간첩 잡는게 쉬운가. 멍청하게 유사시가 될때까지 정신 못차리다, 전국민 개죽음학살 목전에 이르러 피투성이 불구가 되어서야 정신차릴 것인가. 당장 정신 차리고 한국적화 막으라. 이미 한국내 \"소수\"반국가세력 가이드라인은 명확히 있고 대놓고 활동하는 그들 또한 소수임이 드러난 상황임. 무엇이 어려운가. 잡기만 하면 됨. 지금 고의로 국가 안보/첩보기관 해체시키는 그들 보라. 왜 모르나. 국가기관만 믿지 말고, 각계각층출신의 ”적화싫은“ 한국5천만 국민들이,적화로 전국민죽이려는 그들명단 작성해 국민들에게 전파하라.이미 국가기관내 침투한 빨갱이/간첩 많음. 그들 조사/색출해 내야함.시간없다. 전파하라．", "is_reply": false, "dccon": "", "comment_img": "", "date": "06.27 18:03", "comment_id": "comment_li_17198130", "parent_comment_id": ""}, {"writer": "ㅇㅇ", "text": "재밌네 포텐 있는듯", "is_reply": false, "dccon": "", "comment_img": "https://lh3.googleusercontent.com/d/1I2P1xQMGACLuykuqJjiFK Comments.forEach(c => { if (!c.is_reply) { currentGroup = { parent: c, replies: [] }; commentGroups.push(currentGroup); const commentId = String(c.comment_id || '').trim(); if (commentId) { parentGroupsById.set(commentId, currentGroup); const pendingReplies = pendingRepliesByParent.get(commentId); if (pendingReplies) { currentGroup.replies.push(...pendingReplies); pendingRepliesByParent.delete(commentId); } } } else { const parentId = String(c.parent_comment_id || '').trim(); if (parentId) { const parentGroup = parentGroupsById.get(parentId); if (parentGroup) parentGroup.replies.push(c); else { if (!pendingRepliesByParent.has(parentId)) pendingRepliesByParent.set(parentId, []); pendingRepliesByParent.get(parentId).push(c); } } else if (currentGroup) currentGroup.replies.push(c); else { currentGroup = { parent: null, replies: [c] }; commentGroups.push(currentGroup); } } }); pendingRepliesByParent.forEach(replies => commentGroups.push({ parent: null, replies })); function buildWriterHTML(writerStr) { let match = writerStr.match(/(.+)\s(\([0-9.]+\))$/); return match ? `${match[1]} <span class="ip">${match[2]}</span>` : writerStr; } function buildContentHTML(c) { if (c.text.includes("삭제된 댓글")) return `<span class="deleted-text">${c.text}</span>`; let html = c.text.replace(/\n/g, "<br>"); if (c.dccon) html += `<br><img src="${c.dccon}" style="width:85px; height:85px; margin-top:5px;">`; if (c.comment_img) html += `<br><img src="${c.comment_img}" style="margin-top:5px; max-width:200px; border-radius:4px;">`; return html; } function renderComments() { const listArea = document.getElementById('comment-list'); const pageArea = document.getElementById('pagination-buttons'); listArea.innerHTML = ''; pageArea.innerHTML = ''; document.getElementById('total-count').innerText = rawComments.filter(c => !c.text.includes("삭제된 댓글")).length; if (rawComments.length === 0) return; let sortedGroups = [...commentGroups]; if (currentSort === 'new') sortedGroups.reverse(); else if (currentSort === 'reply') sortedGroups.sort((a, b) => b.replies.length - a.replies.length); const totalPages = Math.ceil(sortedGroups.length / commentsPerPage); if (currentPage > totalPages) currentPage = totalPages; if (currentPage < 1) currentPage = 1; const startIndex = (currentPage - 1) * commentsPerPage; const pageGroups = sortedGroups.slice(startIndex, startIndex + commentsPerPage); pageGroups.forEach(g => { if (g.parent) { const pDiv = document.createElement('div'); pDiv.className = 'comment-row'; if (g.parent.text.includes("삭제된 댓글")) pDiv.innerHTML = `<div class="comment-writer-box"></div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box"></div>`; else pDiv.innerHTML = `<div class="comment-writer-box">${buildWriterHTML(g.parent.writer)}</div><div class="comment-content-box">${buildContentHTML(g.parent)}</div><div class="comment-date-box">${g.parent.date}</div>`; listArea.appendChild(pDiv); } g.replies.forEach(r => { const rDiv = document.createElement('div'); rDiv.className = 'comment-row reply-row'; if (r.text.includes("삭제된 댓글")) rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span></div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box"></div>`; else rDiv.innerHTML = `<div class="comment-writer-box"><span class="reply-icon">ㄴ</span>${buildWriterHTML(r.writer)}</div><div class="comment-content-box">${buildContentHTML(r)}</div><div class="comment-date-box">${r.date}</div>`; listArea.appendChild(rDiv); }); }); if (totalPages > 1) { for (let i = 1; i <= totalPages; i++) { const btn = document.createElement('button'); btn.className = 'page-btn'; if (i === currentPage) btn.classList.add('active'); btn.innerText = i; btn.onclick = () => { currentPage = i; renderComments(); window.scrollTo(0, document.getElementById('comment-section').offsetTop - 20); }; pageArea.appendChild(btn); } } } function changeSort(type) { currentSort = type; document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('sort-' + type).classList.add('active'); currentPage = 1; renderComments(); } function changeLimit(val) { commentsPerPage = parseInt(val); currentPage = 1; renderComments(); } document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); }); renderComments();</script></body></html>
